<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Center Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a1a;
            color: #fff;
            margin: 0;
            padding: 20px;
        }

        .mixer-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .channel-strip {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            width: 120px;
            text-align: center;
            border: 1px solid #444;
        }

        .channel-strip h3 {
            font-size: 14px;
            margin: 0 0 10px 0;
            color: #888;
        }

        .fader-container {
            height: 200px;
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }

        input[type=range][orient=vertical] {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            width: 30px;
        }

        .mute-btn {
            width: 100%;
            padding: 8px;
            background: #444;
            border: none;
            color: #fff;
            border-radius: 4px;
            cursor: pointer;
        }

        .mute-btn.muted {
            background: #c0392b;
        }

        .status-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #000;
            margin: 0 auto 10px auto;
        }

        .status-led.connected {
            background: #2ecc71;
            box-shadow: 0 0 5px #2ecc71;
        }

        .master-strip {
            border: 1px solid #2ecc71;
        }

        #add-device-btn {
            background: #2980b9;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <h1>Audio Center <span style="font-size:12px; color:#888;">(Web Audio Mixer)</span></h1>
    <button id="add-device-btn" onclick="addDevice()">+ Add Device (IP)</button>

    <div class="mixer-container" id="mixer">
        <!-- Master Output -->
        <div class="channel-strip master-strip">
            <h3>MASTER</h3>
            <div class="status-led connected"></div>
            <div class="fader-container">
                <input type="range" orient="vertical" min="0" max="100" value="80"
                    oninput="setMasterVolume(this.value)">
            </div>
            <button class="mute-btn" onclick="toggleMute('master')">MUTE</button>
        </div>
    </div>

    <script>
        // Web Audio Context
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const ctx = new AudioContext({ latencyHint: 'interactive' }); // Let OS decide output rate (usually 48k or 44.1k)
        const masterGain = ctx.createGain();
        masterGain.connect(ctx.destination);

        let devices = [];

        function addDevice() {
            const ip = prompt("Enter Device IP (e.g., 192.168.1.5):", "192.168.1.");
            if (ip) createChannel(ip);
        }

        function createChannel(ip) {
            const id = 'dev_' + ip.replace(/\./g, '_');
            const html = `
                <div class="channel-strip" id="${id}">
                    <h3>${ip}</h3>
                    <div class="status-led" id="led_${id}"></div>
                    <div class="fader-container">
                        <input type="range" orient="vertical" min="0" max="100" value="70" oninput="setVolume('${id}', this.value)">
                    </div>
                    <button class="mute-btn" onclick="toggleMute('${id}')">MUTE</button>
                    <div style="font-size:10px; margin-top:5px; color:#666;" id="msg_${id}">Disconnected</div>
                </div>
            `;
            // Insert before Master
            const master = document.querySelector('.master-strip');
            master.insertAdjacentHTML('beforebegin', html);

            // Init Audio Logic
            connectDevice(ip, id);
        }

        function connectDevice(ip, id) {
            const url = `ws://${ip}:8085/stream/audio`;
            const ws = new WebSocket(url);
            ws.binaryType = 'arraybuffer';

            const gainNode = ctx.createGain();
            gainNode.gain.value = 0.7;
            gainNode.connect(masterGain);

            // Jitter Buffer State
            let nextTime = 0;
            const BUFFER_MS = 150; // 150ms Initial Buffer for WAN
            let isBuffering = true;

            function scheduleChunk(buffer) {
                // simple monotonic clock logic
                const duration = buffer.duration;
                const now = ctx.currentTime;

                if (isBuffering) {
                    // Initial buffering or Re-buffering after starvation
                    nextTime = now + (BUFFER_MS / 1000.0);
                    isBuffering = false;
                    console.log(`[${ip}] Buffering... Starting at ${nextTime}`);
                }

                // Check for starvation (network lag)
                if (nextTime < now) {
                    console.warn(`[${ip}] Underrun! Resyncing (Lag: ${(now - nextTime).toFixed(3)}s)`);
                    nextTime = now + (BUFFER_MS / 1000.0); // Reset buffer
                }

                const source = ctx.createBufferSource();
                source.buffer = buffer;
                source.connect(gainNode);
                source.start(nextTime);

                nextTime += duration;
            }

            ws.onopen = () => {
                document.getElementById('led_' + id).classList.add('connected');
                document.getElementById('msg_' + id).innerText = "Live";
                isBuffering = true;
            };

            ws.onclose = () => {
                document.getElementById('led_' + id).classList.remove('connected');
                document.getElementById('msg_' + id).innerText = "Reconnecting...";
                setTimeout(() => connectDevice(ip, id), 3000); // Auto reconnect
            };

            ws.onmessage = (e) => {
                if (ctx.state === 'suspended') ctx.resume();
                playPcmChunk(e.data, scheduleChunk);
            };

            devices.push({ id, ws, gainNode });
        }

        function playPcmChunk(data, scheduleCallback) {
            // Decode 16-bit PCM (Little Endian)
            const int16 = new Int16Array(data);
            const float32 = new Float32Array(int16.length);

            for (let i = 0; i < int16.length; i++) {
                float32[i] = int16[i] / 32768.0;
            }

            // Create AudioBuffer (Mono, 16kHz)
            const buffer = ctx.createBuffer(1, float32.length, 16000);
            buffer.copyToChannel(float32, 0);

            scheduleCallback(buffer);
        }

        function setVolume(id, val) {
            const dev = devices.find(d => d.id === id);
            if (dev) dev.gainNode.gain.value = val / 100;
        }

        function toggleMute(id) {
            // ... mute logic implementation if needed ...
        }

        function setMasterVolume(val) {
            masterGain.gain.value = val / 100;
        }
    </script>
</body>

</html>
