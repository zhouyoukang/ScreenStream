version: '3.8'

services:
  # API网关服务
  gateway:
    build:
      context: ./api-services/gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MJPEG_URL=http://mjpeg-server:8081
      - RTSP_URL=http://rtsp-server:8082
      - WEBRTC_URL=http://webrtc-server:8083
      - INPUT_URL=http://input-server:8084
    depends_on:
      - mjpeg-server
      - rtsp-server
      - webrtc-server
      - input-server
    restart: unless-stopped
    networks:
      - screenstream-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MJPEG流媒体服务
  mjpeg-server:
    build:
      context: ./api-services/mjpeg-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8081:8081"  # localhost only, access via gateway
    environment:
      - SERVER_PORT=8081
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped
    networks:
      - screenstream-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # RTSP流媒体服务
  rtsp-server:
    build:
      context: ./api-services/rtsp-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8082:8082"  # localhost only, access via gateway
      - "8554:8554"  # RTSP端口 - 需要直连
    environment:
      - SERVER_PORT=8082
      - RTSP_PORT=8554
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped
    networks:
      - screenstream-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # WebRTC信令服务
  webrtc-server:
    build:
      context: ./api-services/webrtc-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8083:8083"  # localhost only, access via gateway
    environment:
      - SERVER_PORT=8083
      - JAVA_OPTS=-Xmx512m
    restart: unless-stopped
    networks:
      - screenstream-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 输入控制服务
  input-server:
    build:
      context: ./api-services/input-server
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8084:8084"  # localhost only, access via gateway
    environment:
      - SERVER_PORT=8084
      - JAVA_OPTS=-Xmx256m
    restart: unless-stopped
    networks:
      - screenstream-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis缓存 (可选，用于会话管理)
  redis:
    image: redis:7-alpine
    # ports:  # 不暴露到主机，仅内部网络访问
    #   - "6379:6379"
    command: redis-server --appendonly yes --requirepass screenstream_redis_secret
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - screenstream-network

  # Nginx反向代理 (可选，生产环境)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl:ro
    depends_on:
      - gateway
    restart: unless-stopped
    networks:
      - screenstream-network
    profiles:
      - production

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped
    networks:
      - screenstream-network
    profiles:
      - monitoring

  # Grafana仪表板
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - screenstream-network
    profiles:
      - monitoring

networks:
  screenstream-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
