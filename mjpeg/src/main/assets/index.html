<html lang="en">

<head>
    <meta charset=utf-8>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico">
    <style>
        body,
        html {
            width: 100%;
            height: 100%;
            margin: 0;
            border: 0;
            overflow: hidden;
            display: block;
            font-family: sans-serif;
            font-size: 16px
        }

        body {
            background-color: BACKGROUND_COLOR
        }

        #connectDiv,
        #pinDiv,
        #blockedDiv,
        #errorDiv {
            min-width: 350px;
            border-radius: 16px;
            color: #eee;
            top: 45%;
            left: 50%;
            padding: 30px;
            transform: translate(-50%, -50%);
            text-align: center;
            position: absolute;
            box-shadow: 0 0 8px 8px rgba(0, 0, 0, .2);
            background: linear-gradient(#144A74, #001D34);
        }

        .logo {
            width: 160px;
            height: 160px;
            -webkit-filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, .4));
            filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, .4));
        }

        #streamDiv {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 48px;
            /* 留出底部导航栏空间 */
            background-color: #000;
            /* Flexbox 居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Prevent Selection */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        /* VR Fullscreen Mode - hides navbar and fills entire screen */
        body.vr-fullscreen #streamDiv {
            bottom: 0 !important;
        }

        body.vr-fullscreen #navBar {
            display: none !important;
        }

        body.vr-fullscreen #streamDiv img {
            max-width: none !important;
            max-height: none !important;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: fill !important;
        }

        #streamDiv img {
            /* 移除 absolute 定位 */
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            /* 禁用选中 */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #buttonsDiv {
            display: none !important;
        }

        #navBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            border-top: 1px solid #333;
        }

        #navBar button {
            background: none;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        #navBar button:hover {
            opacity: 1;
        }

        #navBar button:active {
            opacity: 0.5;
        }

        #navBar .divider {
            width: 1px;
            height: 28px;
            background: #444;
        }

        body {
            padding-bottom: 48px;
        }

        #pinDiv input {
            background-color: #FFF;
            padding: 4px;
            width: 4em;
            font-family: monospace;
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #controlStatus {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 2000;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        input {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }

        #pinDiv button {
            background-color: #32628D;
            border-radius: 6px;
            border: none;
            color: white;
            padding: 8px 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block
        }

        #pipStreamDiv video {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            max-height: 100vh;
            max-height: -webkit-fill-available;
            max-height: 100dvh;
            max-width: 100%;
            z-index: -10;
        }



        pointer-events: none;
        z-index: 1000;
        transform: translate(-50%, -50%);
        }

        @media screen and (max-width:850px) {

            #connectDiv,
            #pinDiv,
            #blockedDiv,
            #errorDiv {
                padding: 30px;
                width: 55%
            }
        }

        @media screen and (max-width:650px) {

            #connectDiv,
            #pinDiv,
            #blockedDiv,
            #errorDiv {
                padding: 30px 20px;
                width: 85%
            }
        }

        .loading {
            margin: 20px 0 10px 0;
        }

        .loading span {
            display: inline-block;
            vertical-align: middle;
            width: .6em;
            height: .6em;
            margin: .19em;
            background: #fff;
            border-radius: .6em;
            animation: loading 1s infinite alternate
        }

        .loading span:nth-of-type(2) {
            background: #fff;
            animation-delay: .2s
        }

        .loading span:nth-of-type(3) {
            background: #fff;
            animation-delay: .4s
        }

        .loading span:nth-of-type(4) {
            background: #fff;
            animation-delay: .6s
        }

        .loading span:nth-of-type(5) {
            background: #fff;
            animation-delay: .8s
        }

        .loading span:nth-of-type(6) {
            background: #fff;
            animation-delay: 1s
        }

        .loading span:nth-of-type(7) {
            background: #fff;
            animation-delay: 1.2s
        }

        @keyframes loading {
            0% {
                opacity: 0
            }

            100% {
                opacity: 1
            }
        }
    </style>

    <script>
        var navMode = 0; // 0=导航模式, 1=控制模式

        function updateNavButtons() {
            var btn1 = document.getElementById("dynBtn1");
            var btn2 = document.getElementById("dynBtn2");
            var icon1 = document.getElementById("dynBtn1Icon");
            var icon2 = document.getElementById("dynBtn2Icon");
            var modeBtn = document.getElementById("modeToggle");

            if (navMode === 0) {
                // 导航模式：后台 + 主页
                btn1.title = "最近任务";
                btn2.title = "主页";
                icon1.innerHTML = '<rect x="4" y="4" width="16" height="16" rx="2" fill="none" stroke="#FFF" stroke-width="2"/>';
                icon2.innerHTML = '<circle cx="12" cy="12" r="10" fill="none" stroke="#FFF" stroke-width="2"/>';
                modeBtn.style.background = "rgba(255,255,255,0.1)";
            } else {
                // 控制模式：全屏 + 暂停
                btn1.title = "全屏";
                btn2.title = "暂停/画中画";
                icon1.innerHTML = '<path fill="#FFF" d="M5,5H10V7H7V10H5V5M14,5H19V10H17V7H14V5M17,14H19V19H14V17H17V14M10,17V19H5V14H7V17H10Z"/>';
                icon2.innerHTML = '<path fill="#FFF" d="M3,5V19L11,12M13,19H16V5H13M18,5V19H21V5"/>';
                modeBtn.style.background = "rgba(100,180,255,0.3)";
            }
        }

        function toggleNavMode() {
            navMode = navMode === 0 ? 1 : 0;
            updateNavButtons();
        }

        function dynBtn1Click() {
            if (navMode === 0) {
                sendNavAction('/recents');
            } else {
                toggleFullscreen();
            }
        }

        function dynBtn2Click() {
            if (navMode === 0) {
                sendNavAction('/home');
            } else {
                toggleStartStop();
            }
        }

        // 初始化
        updateNavButtons();
    </script>

    <script>
        "use strict";

        var clientId = RandomString(16);
        window.DD_LOGS && DD_LOGS.setGlobalContextProperty("clientId", clientId);

        var buttonsDiv = document.getElementById("buttonsDiv");
        var buttonPiP = document.getElementById("PiP");
        var streamDiv = document.getElementById("streamDiv");
        var stream = document.getElementById("stream");
        var connectDiv = document.getElementById("connectDiv");
        var pinDiv = document.getElementById("pinDiv");
        var pin = document.getElementById("pin");
        var sendPin = document.getElementById("sendPin");
        var pinWrongMsg = document.getElementById("pinWrongMsg");
        var blockedDiv = document.getElementById("blockedDiv");
        var errorDiv = document.getElementById("errorDiv");
        var pipStreamDiv = document.getElementById("pipStreamDiv");

        // Get port from URL or default to 8085
        var urlParams = new URLSearchParams(window.location.search);
        var inputApiPort = urlParams.get('input_port') || 8085;
        var inputApiBase = null;

        // VR fullscreen mode: add ?vr=1 to URL or press F11 to toggle
        var vrFullscreen = urlParams.get('vr') === '1' || urlParams.get('fullscreen') === '1';
        if (vrFullscreen) {
            document.body.classList.add('vr-fullscreen');
        }
        // F11 toggles VR fullscreen mode
        document.addEventListener('keydown', function (e) {
            if (e.key === 'F11') {
                e.preventDefault();
                document.body.classList.toggle('vr-fullscreen');
            }
        });

        var isPointerDown = false;
        var pointerMoved = false;
        var suppressClickOnce = false;
        var downPoint = null;
        var lastPoint = null;
        var lastPointerSendTs = 0;
        var pointerThrottleMs = 30;

        function getInputApiBase() {
            if (inputApiBase) return inputApiBase;
            inputApiBase = window.location.protocol + "//" + window.location.hostname + ":" + inputApiPort;
            return inputApiBase;
        }

        function getStreamImagePoint(clientX, clientY) {
            var rect = stream.getBoundingClientRect();
            if (!rect.width || !rect.height || !stream.naturalWidth) return null;

            // Calculate active image area (simulating object-fit: contain)
            var naturalRatio = stream.naturalWidth / stream.naturalHeight;
            var clientRatio = rect.width / rect.height;

            var displayWidth, displayHeight, offsetX, offsetY;

            if (clientRatio > naturalRatio) {
                // Client is wider (Pillarbox)
                displayHeight = rect.height;
                displayWidth = displayHeight * naturalRatio;
                offsetX = (rect.width - displayWidth) / 2;
                offsetY = 0;
            } else {
                // Client is taller (Letterbox)
                displayWidth = rect.width;
                displayHeight = displayWidth / naturalRatio;
                offsetX = 0;
                offsetY = (rect.height - displayHeight) / 2;
            }

            // Coordinates relative to the ACTIVE image area
            var x = clientX - rect.left - offsetX;
            var y = clientY - rect.top - offsetY;

            // Clamp and Normalize
            var nx = x / displayWidth;
            var ny = y / displayHeight;

            // Optional: Ignore clicks outside the active area? 
            // The user says "click outside to trigger", so maybe we should clamp?
            // Clamping is safer.
            nx = Math.max(0.0, Math.min(1.0, nx));
            ny = Math.max(0.0, Math.min(1.0, ny));

            var pixelX = Math.round(nx * displayWidth);
            var pixelY = Math.round(ny * displayHeight);

            return {
                x: pixelX, y: pixelY,
                nx: nx, ny: ny,
                clientX: clientX, clientY: clientY
            };
        }

        function showTouchFeedback(x, y) {
            var dot = document.createElement("div");
            dot.className = "touch-point";
            dot.style.left = x + "px";
            dot.style.top = y + "px";
            document.body.appendChild(dot);
            setTimeout(function () { document.body.removeChild(dot); }, 200);
        }



        function sendInputJson(path, payload) {
            try {
                return fetch(getInputApiBase() + path, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                return null;
            }
        }

        function mapButtonsToMask(buttons) {
            var mask = 0;
            if (buttons & 1) mask |= 1;
            if (buttons & 2) mask |= 4;
            return mask;
        }

        function sendPointer(mask, x, y) {
            return sendInputJson("/pointer", { buttonMask: mask, x: Math.round(x), y: Math.round(y) });
        }

        function sendTap(nx, ny) {
            return sendInputJson("/tap", { nx: nx, ny: ny });
        }

        function sendNavAction(action) {
            try {
                return fetch(getInputApiBase() + action, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: "{}"
                });
            } catch (e) {
                return null;
            }
        }

        // ========== 简化的事件处理：使用 tap/swipe API ==========
        var touchStartTime = 0;
        var touchStartPoint = null;
        var isTouching = false;
        var tapThreshold = 20; // 这里的阈值需要适配归一化坐标吗？
        // 不，计算dx/dy还是用像素比较好，或者用归一化距离。
        // 为了简单，我们可以在事件处理里重新计算像素距离用于阈值判断，或者直接把tapThreshold转换成近似的归一化值？
        // 其实在 getStreamImagePoint 里我们已经丢失了像素信息吗？不，我们可以保留 rect 信息或者再次获取。
        // 让我们修改逻辑：在事件处理中保留像素坐标用于判断距离，或者...
        // 简单点：getStreamImagePoint 返回包含像素x,y和归一化nx,ny的对象

        function sendTap(nx, ny) {
            return sendInputJson("/tap", { nx: nx, ny: ny });
        }

        function sendSwipe(nx1, ny1, nx2, ny2, duration) {
            return sendInputJson("/swipe", {
                nx1: nx1,
                ny1: ny1,
                nx2: nx2,
                ny2: ny2,
                duration: duration || 300
            });
        }


        stream.addEventListener("contextmenu", function (e) {
            e.preventDefault();
            return false;
        });

        // 鼠标事件 (仅左键)
        stream.addEventListener("mousedown", function (e) {
            if (!enableButtons) return;
            if (e.button !== 0) return; // 只处理左键
            var p = getStreamImagePoint(e.clientX, e.clientY);
            if (!p) return;
            isTouching = true;
            touchStartTime = Date.now();
            touchStartPoint = p;
            e.preventDefault();
        });

        window.addEventListener("mouseup", function (e) {
            if (!enableButtons) return;
            if (e.button !== 0) return; // 只处理左键
            if (!isTouching) return;
            isTouching = false;

            var p = getStreamImagePoint(e.clientX, e.clientY);
            var endPoint = p || touchStartPoint;
            var duration = Date.now() - touchStartTime;

            if (!touchStartPoint) return;

            var dx = Math.abs(endPoint.x - touchStartPoint.x);
            var dy = Math.abs(endPoint.y - touchStartPoint.y);

            if (dx < tapThreshold && dy < tapThreshold) {
                // 短距离 = 点击 (使用归一化坐标)
                sendTap(touchStartPoint.nx, touchStartPoint.ny);
            } else {
                // 长距离 = 滑动 (使用归一化坐标)
                sendSwipe(touchStartPoint.nx, touchStartPoint.ny, endPoint.nx, endPoint.ny, Math.min(duration, 500));
            }

            touchStartPoint = null;
            e.preventDefault();
        });

        // 触摸事件
        stream.addEventListener("touchstart", function (e) {
            if (!enableButtons) return;
            if (!e.touches || !e.touches.length) return;
            var t = e.touches[0];
            var p = getStreamImagePoint(t.clientX, t.clientY);
            if (!p) return;
            isTouching = true;
            touchStartTime = Date.now();
            touchStartPoint = p;
            e.preventDefault();
        }, { passive: false });

        window.addEventListener("touchend", function (e) {
            if (!enableButtons) return;
            if (!isTouching) return;
            isTouching = false;

            var endPoint = touchStartPoint;
            if (e.changedTouches && e.changedTouches.length) {
                var t = e.changedTouches[0];
                var p = getStreamImagePoint(t.clientX, t.clientY);
                if (p) endPoint = p;
            }

            var duration = Date.now() - touchStartTime;

            if (!touchStartPoint) return;

            var dx = Math.abs(endPoint.x - touchStartPoint.x);
            var dy = Math.abs(endPoint.y - touchStartPoint.y);

            if (dx < tapThreshold && dy < tapThreshold) {
                // 点击
                sendTap(touchStartPoint.nx, touchStartPoint.ny);
            } else {
                // 滑动
                sendSwipe(touchStartPoint.nx, touchStartPoint.ny, endPoint.nx, endPoint.ny, Math.min(duration, 500));
            }

            touchStartPoint = null;
            e.preventDefault();
        }, { passive: false });

        // 滚轮事件 (Throttled)
        var vScrollAccumulator = 0.0;
        var vScrollTimer = null;
        var hScrollAccumulator = 0.0;
        var hScrollTimer = null;

        // Right Click Interaction State
        var rightClickDownTime = 0;
        var hasScrolledDuringRightHold = false;

        // Prevent context menu
        stream.addEventListener("contextmenu", function (e) { e.preventDefault(); }, false);

        stream.addEventListener("mousedown", function (e) {
            if (e.button === 2) {
                rightClickDownTime = Date.now();
                hasScrolledDuringRightHold = false;
            }
        });

        stream.addEventListener("mouseup", function (e) {
            if (e.button === 2) {
                var duration = Date.now() - rightClickDownTime;
                // If short click (< 300ms) AND no scroll happened, treat as BACK
                if (duration < 300 && !hasScrolledDuringRightHold) {
                    sendInputJson("/back", {});
                }
            }
        });

        stream.addEventListener("wheel", function (e) {
            if (!enableButtons) return;
            var p = getStreamImagePoint(e.clientX, e.clientY);
            if (!p) return;

            e.preventDefault();

            // 检查是否按住右键 (buttons 属性: bit 2 is right button)
