<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset=utf-8>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScreenStream</title>
    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico">
    <style>
        body,
        html {
            width: 100%;
            height: 100%;
            margin: 0;
            border: 0;
            overflow: hidden;
            display: block;
            font-family: sans-serif;
            font-size: 16px
        }

        body {
            background-color: BACKGROUND_COLOR
        }

        #connectDiv,
        #pinDiv,
        #blockedDiv,
        #errorDiv {
            min-width: 350px;
            border-radius: 16px;
            color: #eee;
            top: 45%;
            left: 50%;
            padding: 30px;
            transform: translate(-50%, -50%);
            text-align: center;
            position: absolute;
            box-shadow: 0 0 8px 8px rgba(0, 0, 0, .2);
            background: linear-gradient(#144A74, #001D34);
        }

        .logo {
            width: 160px;
            height: 160px;
            -webkit-filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, .4));
            filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, .4));
        }

        #streamDiv {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 48px;
            /* 留出底部导航栏空间 */
            background-color: #000;
            /* Flexbox 居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Prevent Selection */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #streamDiv img {
            /* 移除 absolute 定位 */
            display: block;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            /* 禁用选中 */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #buttonsDiv {
            display: none !important;
        }

        #navBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background-color: #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            border-top: 1px solid #333;
        }


        #navBar button {
            background: none;
            border: none;
            padding: 8px 20px;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        #navBar button:hover {
            opacity: 1;
        }

        #navBar button:active {
            opacity: 0.5;
        }

        #navBar .divider {
            width: 1px;
            height: 28px;
            background: #444;
        }

        body {
            padding-bottom: 48px;
        }

        #pinDiv input {
            background-color: #FFF;
            padding: 4px;
            width: 4em;
            font-family: monospace;
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #controlStatus {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 2000;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        input {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }

        #pinDiv button {
            background-color: #32628D;
            border-radius: 6px;
            border: none;
            color: white;
            padding: 8px 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block
        }

        #pipStreamDiv video {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            max-height: 100vh;
            max-height: -webkit-fill-available;
            max-height: 100dvh;
            max-width: 100%;
            z-index: -10;
        }

        @media screen and (max-width:850px) {

            #connectDiv,
            #pinDiv,
            #blockedDiv,
            #errorDiv {
                padding: 30px;
                width: 55%
            }
        }

        @media screen and (max-width:650px) {

            #connectDiv,
            #pinDiv,
            #blockedDiv,
            #errorDiv {
                padding: 30px 20px;
                width: 85%
            }
        }

        .loading {
            margin: 20px 0 10px 0;
        }

        .loading span {
            display: inline-block;
            vertical-align: middle;
            width: .6em;
            height: .6em;
            margin: .19em;
            background: #fff;
            border-radius: .6em;
            animation: loading 1s infinite alternate
        }

        .loading span:nth-of-type(2) {
            background: #fff;
            animation-delay: .2s
        }

        .loading span:nth-of-type(3) {
            background: #fff;
            animation-delay: .4s
        }

        .loading span:nth-of-type(4) {
            background: #fff;
            animation-delay: .6s
        }

        .loading span:nth-of-type(5) {
            background: #fff;
            animation-delay: .8s
        }

        .loading span:nth-of-type(6) {
            background: #fff;
            animation-delay: 1s
        }

        .loading span:nth-of-type(7) {
            background: #fff;
            animation-delay: 1.2s
        }

        @keyframes loading {
            0% {
                opacity: 0
            }

            100% {
                opacity: 1
            }
        }
    </style>
    <script>
        "use strict";

        window.DD_LOGS && DD_LOGS.init({

</head>

            </svg>

        <!-- 动态按钮4（仅控制模式显示） -->

            <svg id="dynBtn4Icon" width="24" height="24" viewBox="0 0 24 24">
                <path fill="#FFF"
                    d="M5,5H10V7H7V10H5V5M14,5H19V10H17V7H14V5M17,14H19V19H14V17H17V14M10,17V19H5V14H7V17H10Z" />
            </svg>

    <script>
        var navMode = 0; // 0=导航模式, 1=控制模式

        function updateNavButtons() {
            var btn1 = document.getElementById("dynBtn1");
            var btn2 = document.getElementById("dynBtn2");
            var btn3 = document.getElementById("dynBtn3");
            var btn4 = document.getElementById("dynBtn4");
            var icon1 = document.getElementById("dynBtn1Icon");
            var icon2 = document.getElementById("dynBtn2Icon");
            var icon3 = document.getElementById("dynBtn3Icon");
            var icon4 = document.getElementById("dynBtn4Icon");
            var modeBtn = document.getElementById("modeToggle");

            if (navMode === 0) {
                // 导航模式：最近任务 + 主页 + 返回（3个按钮）
                btn1.title = "最近任务";
                btn2.title = "主页";
                btn3.title = "返回";
                icon1.innerHTML = '<rect x="4" y="4" width="16" height="16" rx="2" fill="none" stroke="#FFF" stroke-width="2"/>';
                icon2.innerHTML = '<circle cx="12" cy="12" r="10" fill="none" stroke="#FFF" stroke-width="2"/>';
                icon3.innerHTML = '<path fill="#FFF" d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/>';
                btn3.style.display = "block";
                btn4.style.display = "none";
                modeBtn.style.background = "rgba(255,255,255,0.1)";
            } else {
                // 控制模式：画中画 + 音频 + 全屏（3个按钮）
                btn1.title = "画中画";
                btn2.title = "音频";
                btn3.title = "全屏";
                // 画中画图标
                icon1.innerHTML = '<path fill="#FFF" d="M19 11h-8v6h8v-6m4 8V5c0-1.12-.9-2-2-2H3a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h18a2 2 0 0 0 2-2m-2 0H3V4.97h18V19Z"/>';
                // 音频图标
                icon2.innerHTML = '<path fill="#FFF" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.84 14,18.7V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.76 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/>';
                // 全屏图标
                icon3.innerHTML = '<path fill="#FFF" d="M5,5H10V7H7V10H5V5M14,5H19V10H17V7H14V5M17,14H19V19H14V17H17V14M10,17V19H5V14H7V17H10Z"/>';
                btn3.style.display = "block";
                btn4.style.display = "none"; // 隐藏第4个按钮
                modeBtn.style.background = "rgba(100,180,255,0.3)";
            }
        }

        function toggleNavMode() {
            navMode = navMode === 0 ? 1 : 0;
            updateNavButtons();
        }

        function dynBtn1Click() {
            if (navMode === 0) {
                sendNavAction('/recents');
            } else {
                togglePiP();
            }
        }

        function dynBtn2Click() {
            if (navMode === 0) {
                sendNavAction('/home');
            } else {
                toggleAudio();
            }
        }

        function dynBtn3Click() {
            if (navMode === 0) {
                sendNavAction('/back');
            } else {
                toggleFullscreen();
            }
        }

        function dynBtn4Click() {
            // 仅在控制模式下可用
            toggleFullscreen();
        }

        // 初始化
        updateNavButtons();
    </script>

    <script src="jmuxer.min.js"></script>
    <script>
        "use strict";

        // === DEBUG CONSOLE ===
        var debugDiv = document.createElement('div');
        debugDiv.style.cssText = "position:fixed;top:0;left:0;width:100%;background:rgba(255,0,0,0.5);color:white;z-index:99999;pointer-events:none;font-size:12px;display:none;";
        document.body.appendChild(debugDiv);
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            debugDiv.style.display = "block";
            debugDiv.innerHTML += "Error: " + msg + " at " + lineNo + ":" + columnNo + "<br>";
            return false;
        };
        console.error = function (msg) {
            debugDiv.style.display = "block";
            debugDiv.innerHTML += "Err: " + msg + "<br>";
        };
        // =====================

        // === VR INPUT DEBUG PANEL ===
        // 启用方式: URL 加 ?debug=1
        var urlParamsDebug = new URLSearchParams(window.location.search);
        var showInputDebug = urlParamsDebug.get('debug') === '1';

        var inputDebugDiv = document.createElement('div');
        inputDebugDiv.id = 'inputDebugPanel';
        inputDebugDiv.style.cssText = "position:fixed;top:10px;left:10px;width:300px;max-height:50%;overflow-y:auto;background:rgba(0,0,0,0.8);color:#0f0;z-index:99998;font-family:monospace;font-size:11px;padding:8px;border-radius:8px;display:" + (showInputDebug ? "block" : "none") + ";";
        inputDebugDiv.innerHTML = "<b style='color:yellow'>VR Input Debug (最近20条)</b><br><span style='color:#888'>按下手柄按钮查看事件...</span><br>";
        document.body.appendChild(inputDebugDiv);

        var debugLogs = [];
        function logInputEvent(type, detail) {
            if (!showInputDebug) return;
            var now = new Date();
            var time = now.toTimeString().split(' ')[0].substr(3); // MM:SS
            var log = time + " <b>" + type + "</b> " + detail;
            debugLogs.unshift(log);
            if (debugLogs.length > 20) debugLogs.pop();
            inputDebugDiv.innerHTML = "<b style='color:yellow'>VR Input Debug</b><br>" + debugLogs.join("<br>");
        }

        // 监听各种可能的输入事件
        ['keydown', 'keyup', 'keypress'].forEach(function (evtType) {
            document.addEventListener(evtType, function (e) {
                logInputEvent(evtType, "key=" + e.key + " code=" + e.code + " which=" + e.which);
            }, true);
        });

        ['mousedown', 'mouseup', 'click', 'dblclick', 'contextmenu'].forEach(function (evtType) {
            document.addEventListener(evtType, function (e) {
                logInputEvent(evtType, "btn=" + e.button + " btns=" + e.buttons + " x=" + Math.round(e.clientX) + " y=" + Math.round(e.clientY));
            }, true);
        });

        ['pointerdown', 'pointerup', 'pointermove'].forEach(function (evtType) {
            document.addEventListener(evtType, function (e) {
                if (evtType === 'pointermove') return; // 太频繁，不记录
                logInputEvent(evtType, "ptrType=" + e.pointerType + " btn=" + e.button + " btns=" + e.buttons);
            }, true);
        });

        // Gamepad API 轮询 (用于检测 Quest 手柄)
        var lastGamepadState = {};
        function pollGamepads() {
            if (!showInputDebug) return;
            var gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            for (var i = 0; i < gamepads.length; i++) {
                var gp = gamepads[i];
                if (!gp) continue;
                var key = "gp" + i;
                if (!lastGamepadState[key]) lastGamepadState[key] = { buttons: [] };

                for (var b = 0; b < gp.buttons.length; b++) {
                    var pressed = gp.buttons[b].pressed;
                    var wasPressed = lastGamepadState[key].buttons[b] || false;
                    if (pressed !== wasPressed) {
                        logInputEvent("GAMEPAD", "pad=" + i + " btn[" + b + "]=" + (pressed ? "DOWN" : "UP") + " val=" + gp.buttons[b].value.toFixed(2));
                    }
                    lastGamepadState[key].buttons[b] = pressed;
                }
            }
            requestAnimationFrame(pollGamepads);
        }
        if (showInputDebug) {
            requestAnimationFrame(pollGamepads);
            logInputEvent("INIT", "Debug panel active. isVR=" + (/Quest|OculusBrowser/i.test(navigator.userAgent)));
        }
        // === END VR INPUT DEBUG ===

        var clientId = RandomString(16);
        window.DD_LOGS && DD_LOGS.setGlobalContextProperty("clientId", clientId);

        var buttonsDiv = document.getElementById("buttonsDiv");

        var streamDiv = document.getElementById("streamDiv");
        var stream = document.getElementById("stream");
        var streamCanvas = document.getElementById("streamCanvas");
        var videoPlayerEl = document.getElementById("videoPlayer");
        var activeStreamElement = stream; // Default to IMG
        var connectDiv = document.getElementById("connectDiv");
        var pinDiv = document.getElementById("pinDiv");
        var pin = document.getElementById("pin");
        var sendPin = document.getElementById("sendPin");
        var pinWrongMsg = document.getElementById("pinWrongMsg");
        var blockedDiv = document.getElementById("blockedDiv");
        var errorDiv = document.getElementById("errorDiv");
        var pipStreamDiv = document.getElementById("pipStreamDiv");

        // Get port from URL or default to 8085
        var urlParams = new URLSearchParams(window.location.search);
        var inputApiPort = urlParams.get('input_port') || 8085;
        var inputApiBase = null;

        // VR fullscreen mode: 
        // ?vr=1 or ?vr=contain = fit with letterbox (default)
        // ?vr=fill = stretch to fill (may distort)
        // ?vr=cover = fill with crop (may cut edges)
        var vrMode = urlParams.get('vr') || urlParams.get('fullscreen');
        var allowVrKeyboardFocus = urlParams.get('vr_kb') === '1';
        var allowKeyboardFocus = urlParams.get('kb') === '1'; // 通用键盘开关，适用于所有移动设备
        var isVrBrowser = /OculusBrowser|Quest/i.test(navigator.userAgent || "");
        var isMobileBrowser = /Android|iPhone|iPad|iPod|Mobile|Tablet/i.test(navigator.userAgent || "");
        function isVrEnv() { return document.body.classList.contains('vr-fullscreen') || isVrBrowser; }
        function isMobileEnv() { return isMobileBrowser && !isVrBrowser; } // 移动设备但非 VR
        // 仅在桌面浏览器自动聚焦，移动/VR 设备需通过 ?kb=1 或 ?vr_kb=1 参数手动启用
        function canAutoFocusHiddenInput() {
            if (allowKeyboardFocus || allowVrKeyboardFocus) return true;
            if (isVrEnv() || isMobileEnv()) return false;
            return true; // 桌面浏览器默认启用
        }
        if (vrMode) {
            document.body.classList.add('vr-fullscreen');
            if (vrMode === 'fill') {
                document.body.classList.add('vr-fill');
            } else if (vrMode === 'cover') {
                document.body.classList.add('vr-cover');
            }
            // Hide all UI elements in VR mode
            document.body.style.overflow = 'hidden';
        }

        // F11 toggles VR fullscreen mode
        document.addEventListener('keydown', function (e) {
            if (e.key === 'F11') {
                e.preventDefault();
                document.body.classList.toggle('vr-fullscreen');
            }
        });

        var isPointerDown = false;
        var pointerMoved = false;
        var suppressClickOnce = false;
        var downPoint = null;
        var lastPoint = null;
        var lastPointerSendTs = 0;
        var pointerThrottleMs = 30;

        function getInputApiBase() {
            if (inputApiBase) return inputApiBase;
            // Use the same port as the stream server (control routes are now integrated)
            inputApiBase = window.location.origin;
            return inputApiBase;
        }

        function getStreamImagePoint(clientX, clientY) {
            var rect = activeStreamElement.getBoundingClientRect();
            var natW, natH;

            // Handle different element types
            if (activeStreamElement.tagName === 'CANVAS') {
                natW = activeStreamElement.width;
                natH = activeStreamElement.height;
            } else if (activeStreamElement.tagName === 'VIDEO') {
                natW = activeStreamElement.videoWidth;
                natH = activeStreamElement.videoHeight;
            } else {
                // IMG element
                natW = activeStreamElement.naturalWidth;
                natH = activeStreamElement.naturalHeight;
            }

            if (!rect.width || !rect.height || !natW) return null;

            // Calculate active image area (simulating object-fit: contain)
            var naturalRatio = natW / natH;
            var clientRatio = rect.width / rect.height;

            var displayWidth, displayHeight, offsetX, offsetY;

            if (clientRatio > naturalRatio) {
                // Client is wider (Pillarbox)
                displayHeight = rect.height;
                displayWidth = displayHeight * naturalRatio;
                offsetX = (rect.width - displayWidth) / 2;
                offsetY = 0;

                    this.debugDataShown = true;
                    var hex = "";
                    var len = Math.min(8, nalData.length);
                    for (var i = 0; i < len; i++) {
                        var b = nalData[i].toString(16);
                        if (b.length < 2) b = "0" + b;
                        hex += b + " ";
                    }
                    console.log("[VideoPlayer] First NAL data:", hex);
                    showToast("Rx:" + nalData.length + " Header:" + hex, 5000);
                }

                this.jmuxer.feed({
                    video: nalData
                });
            }

            stop() {
                if (this.ws) {
                    this.ws.onmessage = null;
                    this.ws.onclose = null;
                    this.ws.onerror = null;
                    try { this.ws.close(); } catch (e) { }
                    this.ws = null;
                }
                if (this.jmuxer) {
                    try { this.jmuxer.destroy(); } catch (e) { }
                    this.jmuxer = null;
                }
            }
        }

        // ===== toggleH264 (manual toggle, now mostly unused due to auto-switching) =====
        function toggleH264() {
            // This function is now deprecated since the server controls the codec.
            console.log("H264 toggle is controlled by server settings.");
        }

        // ===== Audio =====
        var audioUnlockArmed = false;
        var audioHintDiv = null;
        var audioHintHideTimeout = null;

        function ensureAudioHintDiv() {
            if (audioHintDiv) return;
            audioHintDiv = document.createElement('div');
            audioHintDiv.style.cssText = "position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 14px;border-radius:8px;z-index:10001;font-size:14px;max-width:80%;text-align:center;pointer-events:none;display:none;";
            audioHintDiv.innerText = "点击屏幕以开启音频";
            document.body.appendChild(audioHintDiv);
        }

        function showAudioHint() {
            ensureAudioHintDiv();
            try {
                audioHintDiv.innerText = isVrEnv()
                    ? "VR：请点击底部导航栏（三大金刚键区域）以开启音频"
                    : "点击屏幕以开启音频";
            } catch (e) { }
            audioHintDiv.style.display = 'block';

            try {
                if (audioHintHideTimeout) clearTimeout(audioHintHideTimeout);
                audioHintHideTimeout = setTimeout(function () {
                    hideAudioHint();
                }, 5000);
            } catch (e) { }
        }

        function hideAudioHint() {
            if (!audioHintDiv) return;
            audioHintDiv.style.display = 'none';
            try {
                if (audioHintHideTimeout) clearTimeout(audioHintHideTimeout);
                audioHintHideTimeout = null;
            } catch (e) { }
        }

        function armAudioUnlock() {
            if (audioUnlockArmed) return;
            audioUnlockArmed = true;

            var unlockOnce = function () {
                try {
                    if (audioPlayer && audioPlayer.ctx && audioPlayer.ctx.state === 'suspended') {
                        audioPlayer.ctx.resume().then(function () {
                            if (audioPlayer && audioPlayer.resetSchedule) audioPlayer.resetSchedule();
                            try {
                                if (audioPlayer && audioPlayer.lastData) {
                                    var d = audioPlayer.lastData;
                                    audioPlayer.lastData = null;
                                    audioPlayer.handleAudio(d);
                                }
                            } catch (e) { }
                            hideAudioHint();
                        }).catch(function () { });
                    }
                } catch (e) { }
            };

            document.addEventListener('pointerdown', unlockOnce, { capture: true, once: true });
            document.addEventListener('touchstart', unlockOnce, { capture: true, once: true });
            document.addEventListener('click', unlockOnce, { capture: true, once: true });
            document.addEventListener('keydown', unlockOnce, { capture: true, once: true });
        }

        function requestAutoStartAudio() {
            if (audioPlayer) return;
            try {
                console.log("Auto-starting audio...");
                toggleAudio();
            } catch (e) {
                console.warn("Auto-start audio failed:", e);
            }

            // If autoplay policy blocks audio, arm an unlock so the FIRST user gesture will resume it.
            try {
                if (audioPlayer && audioPlayer.ctx && audioPlayer.ctx.state === 'suspended') {
                    showAudioHint();
                    armAudioUnlock();
                }
            } catch (e) { }
        }

        function toggleAudio() {
            var btn = document.getElementById('audioToggle');
            if (audioPlayer) {
                audioPlayer.stop();
                audioPlayer = null;
                btn.innerText = "AUDIO: OFF";
                btn.style.backgroundColor = "#333";
            } else {
                audioPlayer = new AudioPlayer();
                audioPlayer.start();
                btn.innerText = "AUDIO: ON";
                btn.style.backgroundColor = "#e74c3c";
            }
        }

        class AudioPlayer {
            constructor() {
                this.socket = null;
                this.ctx = null;
                this.nextTime = 0;
                this.running = false;
                this.lastData = null;
                this.resumePending = false;
            }
            resetSchedule() {
                try {
                    if (this.ctx) this.nextTime = this.ctx.currentTime;
                } catch (e) { }
            }
            start() {
                this.running = true;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext({ sampleRate: 48000 });
                this.resetSchedule();

                // Best-effort: if start() was called from a user gesture, this will immediately unlock audio.
                // If it was not, most browsers will keep it suspended; we handle that via armAudioUnlock().
                try {
                    if (this.ctx.state === 'suspended') {
                        showAudioHint();
                        this.ctx.resume().catch(function () { });
                    }
                } catch (e) { }

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                this.socket = new WebSocket(protocol + '//' + window.location.host + '/stream/audio');
                this.socket.binaryType = 'arraybuffer';

                this.socket.onmessage = (e) => {
                    if (!this.running) return;
                    this.handleAudio(e.data);
                };
                this.socket.onopen = () => console.log("Audio Connected");
                this.socket.onclose = () => console.log("Audio Disconnected");
            }
            stop() {
                this.running = false;
                if (this.socket) this.socket.close();
                if (this.ctx) this.ctx.close();
                hideAudioHint();
            }
            handleAudio(data) {
                // If audio is blocked (autoplay policy / VR), keep ONLY the latest chunk
                // and try to resume. Do NOT queue old audio.
                if (this.ctx.state !== 'running') {
                    this.lastData = data;
                    showAudioHint();
                    if (!this.resumePending) {
                        this.resumePending = true;
                        try {
                            this.ctx.resume().then(() => {
                                this.resumePending = false;
                                this.resetSchedule();
                                hideAudioHint();
                                if (this.lastData && this.ctx.state === 'running') {
                                    const d = this.lastData;
                                    this.lastData = null;
                                    this.handleAudio(d);
                                }
                            }).catch(() => {
                                this.resumePending = false;
                            });
                        } catch (e) {
                            this.resumePending = false;
                        }
                    }
                    return;
                }

                hideAudioHint();

                // Live sync: prevent building up latency
                if (this.nextTime - this.ctx.currentTime > 0.3) this.resetSchedule();

                const int16 = new Int16Array(data);
                const float32 = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

                const left = new Float32Array(float32.length / 2);
                const right = new Float32Array(float32.length / 2);
                for (let i = 0; i < left.length; i++) {
                    left[i] = float32[2 * i];
                    right[i] = float32[2 * i + 1];
                }

                const buffer = this.ctx.createBuffer(2, left.length, 48000);
                buffer.copyToChannel(left, 0);
                buffer.copyToChannel(right, 1);

                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                source.connect(this.ctx.destination);

                if (this.nextTime < this.ctx.currentTime) this.nextTime = this.ctx.currentTime;
                source.start(this.nextTime);
                this.nextTime += buffer.duration;
            }
        }
    </script>
</body>
