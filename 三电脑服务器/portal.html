<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>三电脑服务器 · 道生万物</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e17;--card:#111827;--border:#1e293b;--text:#e2e8f0;--dim:#64748b;--accent:#3b82f6;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--purple:#a855f7;--cyan:#06b6d4}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

/* Header */
.header{background:linear-gradient(135deg,#0f172a,#1e1b4b);padding:20px 24px;border-bottom:1px solid var(--border)}
.header h1{font-size:22px;font-weight:600;display:flex;align-items:center;gap:10px}
.header h1 span{font-size:28px}
.header .sub{color:var(--dim);font-size:13px;margin-top:4px}
.stats-bar{display:flex;gap:20px;margin-top:12px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.04);padding:6px 14px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:6px}
.stat .v{font-weight:700;color:var(--cyan)}
.stat .label{color:var(--dim)}

/* Tabs */
.tabs{display:flex;gap:2px;padding:8px 24px;background:#0d1117;border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:8px 16px;font-size:13px;color:var(--dim);cursor:pointer;border-radius:6px 6px 0 0;white-space:nowrap;transition:.2s}
.tab:hover{color:var(--text);background:rgba(255,255,255,.04)}
.tab.active{color:var(--accent);background:rgba(59,130,246,.1);border-bottom:2px solid var(--accent)}

/* Content */
.content{padding:16px 24px;max-width:1400px;margin:0 auto}
.section{display:none}.section.active{display:block}

/* 八卦 Grid */
.gua-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-top:12px}
.gua-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.gua-card .gua-header{padding:12px 16px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.gua-card .gua-header .gua-icon{font-size:20px}
.gua-card .gua-header .gua-title{font-size:14px;font-weight:600}
.gua-card .gua-header .gua-desc{font-size:11px;color:var(--dim);margin-left:auto}
.svc-list{padding:8px}
.svc-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;font-size:13px;transition:.15s}
.svc-item:hover{background:rgba(255,255,255,.04)}
.svc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.svc-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}
.svc-dot.off{background:var(--red);box-shadow:0 0 6px var(--red)}
.svc-dot.unknown{background:var(--dim)}
.svc-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svc-port{color:var(--dim);font-size:11px;font-family:monospace}
.svc-ms{color:var(--dim);font-size:11px;min-width:40px;text-align:right}
.svc-loc{font-size:10px;color:var(--purple);background:rgba(168,85,247,.1);padding:1px 6px;border-radius:4px}

/* Devices Grid */
.dev-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:12px}
.dev-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;gap:12px;align-items:center}
.dev-card .dev-icon{font-size:28px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.04);border-radius:10px}
.dev-card .dev-info{flex:1;min-width:0}
.dev-card .dev-name{font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dev-card .dev-meta{font-size:11px;color:var(--dim);margin-top:2px}

/* Dashboard Grid */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;cursor:pointer;transition:.2s}
.dash-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 12px rgba(59,130,246,.15)}
.dash-card .dash-name{font-size:14px;font-weight:500;margin-bottom:4px}
.dash-card .dash-port{font-size:11px;color:var(--dim);font-family:monospace}

/* Machines */
.machine-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:12px}
@media(max-width:800px){.machine-grid{grid-template-columns:1fr}}
.machine-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative}
.machine-card .m-gua{position:absolute;top:12px;right:16px;font-size:24px;opacity:.3}
.machine-card .m-name{font-size:16px;font-weight:600;margin-bottom:8px}
.machine-card .m-role{font-size:12px;color:var(--accent);margin-bottom:10px}
.machine-card table{width:100%;font-size:12px}
.machine-card td{padding:2px 0;color:var(--dim)}
.machine-card td:last-child{color:var(--text);text-align:right;font-family:monospace}

/* Topology */
.topo{text-align:center;padding:20px;font-family:monospace;font-size:13px;color:var(--dim);line-height:1.8;background:var(--card);border-radius:12px;margin-top:16px;white-space:pre;overflow-x:auto}

/* Loading */
.loading{text-align:center;padding:40px;color:var(--dim)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{text-align:center;padding:16px;color:var(--dim);font-size:11px;border-top:1px solid var(--border);margin-top:24px}
</style>
</head>
<body>

<div class="header">
  <h1><span>☰</span> 三电脑服务器 · 道生万物</h1>
  <div class="sub">道生一(注册表) → 一生二(探测+API) → 二生三(三机协同) → 三生万物(全服务覆盖)</div>
  <div class="stats-bar" id="statsBar">
    <div class="stat"><span class="v" id="sOnline">—</span><span class="label">服务在线</span></div>
    <div class="stat"><span class="v" id="sTotal">—</span><span class="label">服务总数</span></div>
    <div class="stat"><span class="v" id="dOnline">—</span><span class="label">设备在线</span></div>
    <div class="stat"><span class="v" id="dTotal">—</span><span class="label">设备总数</span></div>
    <div class="stat"><span class="v" id="dashCount">—</span><span class="label">Dashboard</span></div>
    <div class="stat"><span class="v" id="probeTime">—</span><span class="label">探测时间</span></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="gua">☰ 八卦全景</div>
  <div class="tab" data-tab="devices">📱 设备矩阵</div>
  <div class="tab" data-tab="dashboards">📊 Dashboard</div>
  <div class="tab" data-tab="machines">🖥 三机矩阵</div>
  <div class="tab" data-tab="topology">🌐 拓扑架构</div>
</div>

<div class="content">
  <!-- 八卦全景 -->
  <div class="section active" id="sec-gua">
    <div class="gua-grid" id="guaGrid"></div>
  </div>

  <!-- 设备矩阵 -->
  <div class="section" id="sec-devices">
    <div class="dev-grid" id="devGrid"></div>
  </div>

  <!-- Dashboards -->
  <div class="section" id="sec-dashboards">
    <div class="dash-grid" id="dashGrid"></div>
  </div>

  <!-- 三机矩阵 -->
  <div class="section" id="sec-machines">
    <div class="machine-grid" id="machineGrid"></div>
  </div>

  <!-- 拓扑 -->
  <div class="section" id="sec-topology">
    <div class="topo" id="topoView"></div>
  </div>
</div>

<div class="footer">
  伏羲画卦以通神明之德，以类万物之情 · 道可道，非常道 · 苦集灭道，中道不二
  <br>三电脑服务器 · 资源注册表 :9000 · <span id="updateTime"></span>
</div>

<script>
const API = location.port == '9000' ? '' : 'http://localhost:9000';
const GUA_COLORS = {'☰乾':'#f59e0b','☷坤':'#8b5cf6','☲离':'#ef4444','☳震':'#22c55e','☴巽':'#06b6d4','☵坎':'#3b82f6','☶艮':'#f97316','☱兑':'#ec4899'};
const DEV_ICONS = {'手机':'📱','VR':'🥽','AR':'👓','手表':'⌚','机器人':'🤖','3D打印':'🖨️','电源':'🔋','路由器':'📡','网关':'🏠'};

// Tab switching
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.section').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('sec-' + t.dataset.tab).classList.add('active');
  });
});

function renderGua(data) {
  const grid = document.getElementById('guaGrid');
  grid.innerHTML = '';
  const svcs = data.services || {};
  for (const [gua, items] of Object.entries(svcs)) {
    const info = data._registry?.[gua] || {};
    const card = document.createElement('div');
    card.className = 'gua-card';
    card.style.borderTopColor = GUA_COLORS[gua] || '#333';
    card.style.borderTopWidth = '2px';
    let html = `<div class="gua-header"><span class="gua-icon">${gua.charAt(0)}</span><span class="gua-title">${gua}</span><span class="gua-desc">${info.desc || ''}</span></div><div class="svc-list">`;
    for (const s of items) {
      const dot = s.online === null ? 'unknown' : s.online ? 'on' : 'off';
      const port = s.port > 0 ? `:${s.port}` : '';
      const ms = s.ms > 0 ? `${s.ms}ms` : '';
      const link = s.port > 0 && s.online && s.proto !== 'tcp' ? `http://${s.host === '0.0.0.0' ? '127.0.0.1' : s.host}:${s.port}${s.path || '/'}` : '';
      html += `<div class="svc-item">
        <div class="svc-dot ${dot}"></div>
        <span class="svc-name">${link ? `<a href="${link}" target="_blank">${s.name}</a>` : s.name}</span>
        <span class="svc-port">${port}</span>
        <span class="svc-ms">${ms}</span>
        <span class="svc-loc">${s.loc || ''}</span>
      </div>`;
    }
    html += '</div>';
    card.innerHTML = html;
    grid.appendChild(card);
  }
}

function renderDevices(devices) {
  const grid = document.getElementById('devGrid');
  grid.innerHTML = '';
  for (const d of devices) {
    const icon = DEV_ICONS[d.type] || '📦';
    const dot = d.online ? '🟢' : '🔴';
    grid.innerHTML += `<div class="dev-card">
      <div class="dev-icon">${icon}</div>
      <div class="dev-info">
        <div class="dev-name">${dot} ${d.name}</div>
        <div class="dev-meta">${d.ip} · ${d.interface}</div>
      </div>
    </div>`;
  }
}

function renderDashboards(dashes) {
  const grid = document.getElementById('dashGrid');
  grid.innerHTML = '';
  for (const d of dashes) {
    const url = d.port > 0 ? `http://localhost:${d.port}${d.path || '/'}` : '#';
    grid.innerHTML += `<div class="dash-card" onclick="if('${url}'!=='#')window.open('${url}')">
      <div class="dash-name">${d.name}</div>
      <div class="dash-port">${d.port > 0 ? ':' + d.port : '静态文件'} ${d.path || ''}</div>
    </div>`;
  }
}

function renderMachines(machines) {
  const grid = document.getElementById('machineGrid');
  grid.innerHTML = '';
  for (const [name, m] of Object.entries(machines)) {
    const dot = m.online ? '🟢' : '🔴';
    grid.innerHTML += `<div class="machine-card">
      <div class="m-gua">${m.gua}</div>
      <div class="m-name">${dot} ${name}</div>
      <div class="m-role">${m.role} · ${m.hours}</div>
      <table>
        <tr><td>IP</td><td>${m.ip}</td></tr>
        <tr><td>OS</td><td>${m.os}</td></tr>
        <tr><td>CPU</td><td>${m.cpu}</td></tr>
        <tr><td>RAM</td><td>${m.ram}</td></tr>
        <tr><td>GPU</td><td>${m.gpu}</td></tr>
      </table>
    </div>`;
  }
}

function renderTopology() {
  document.getElementById('topoView').textContent = `
                        ┌─────────────────────────┐
                        │   ☰ 阿里云 (aiotvr.xyz)  │
                        │   Nginx + frps + SSL     │
                        │   2C / 1.6GB / 永驻      │
                        └────────┬────────────────┘
                                 │
                    ┌────────────┼────────────┐
                    │ FRP×9      │ FRP×2      │
                    ▼            ▼            ▼
        ┌───────────────┐  ┌───────────────┐
        │ ☷ 台式机 141   │  │ ☲ 笔记本 179  │
        │ R7-9700X/62GB │  │ R7-7840HS/15G │
        │ RTX 4070S     │  │ Caddy统一入口  │
        │ 白天 8-23     │  │ 24h在线       │
        │               │  │               │
        │ 24个Hub服务   │←→│ 静态serve     │
        │ 20个Dashboard │  │ 动态代理→141  │
        │ Docker×21     │  │ watchdog自愈  │
        └───────┬───────┘  └───────────────┘
                │
    ┌───────────┼───────────────────────┐
    │           │           │           │
    ▼           ▼           ▼           ▼
 📱手机×3   🥽VR/AR×2   🤖机器狗    🏠智能家居
 OnePlus    Quest 3     Go1        HA+MQTT
 Samsung    RayNeo V3   Bambu A1   12×eWeLink
 OPPO SE    VP99手表    EcoFlow    11×MiIO
                        Insta360
                        DJI Neo
                        ORS6
`;
}

async function refresh() {
  try {
    const r = await fetch(API + '/api/probe');
    const data = await r.json();
    // Merge registry info
    const r2 = await fetch(API + '/api/registry');
    const reg = await r2.json();
    data._registry = {};
    for (const [g, v] of Object.entries(reg.registry)) data._registry[g] = v;

    // Stats
    const st = data.stats || {};
    document.getElementById('sOnline').textContent = st.online || 0;
    document.getElementById('sTotal').textContent = st.total || 0;
    document.getElementById('dOnline').textContent = st.devices_online || 0;
    document.getElementById('dTotal').textContent = st.devices_total || 0;
    document.getElementById('dashCount').textContent = st.dashboards || 0;
    document.getElementById('probeTime').textContent = new Date(data.timestamp).toLocaleTimeString();
    document.getElementById('updateTime').textContent = new Date().toLocaleString();

    renderGua(data);
    renderDevices(data.devices || []);
    renderDashboards(reg.dashboards || []);
    renderMachines(data.machines || {});
    renderTopology();
  } catch (e) {
    document.getElementById('guaGrid').innerHTML = `<div class="loading">连接资源注册表失败 (localhost:9000)<br><br>启动: <code>python resource_registry.py</code></div>`;
  }
}

refresh();
setInterval(refresh, 60000);
</script>
</body>
</html>
