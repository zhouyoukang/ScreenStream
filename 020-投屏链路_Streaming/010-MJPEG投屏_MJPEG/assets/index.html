<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset=utf-8>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ScreenStream</title>
    <link rel="icon" type="image/x-icon" sizes="any" href="/favicon.ico">
    <style>
        body,
        html {
            width: 100%;
            height: 100%;
            margin: 0;
            border: 0;
            overflow: hidden;
            display: block;
            font-family: sans-serif;
            font-size: 16px
        }

        body {
            background-color: BACKGROUND_COLOR
        }

        #connectDiv,
        #pinDiv,
        #blockedDiv,
        #errorDiv {
            min-width: 350px;
            border-radius: 16px;
            color: #eee;
            top: 45%;
            left: 50%;
            padding: 30px;
            transform: translate(-50%, -50%);
            text-align: center;
            position: absolute;
            box-shadow: 0 0 8px 8px rgba(0, 0, 0, .2);
            background: linear-gradient(#144A74, #001D34);
        }

        .logo {
            width: 160px;
            height: 160px;
            -webkit-filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, .4));
            filter: drop-shadow(3px 3px 2px rgba(0, 0, 0, .4));
        }

        #streamDiv {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 48px;
            /* 留出底部导航栏空间 */
            background-color: #000;
            /* Flexbox 居中 */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Prevent Selection */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #streamDiv img,
        #streamDiv video,
        #streamDiv canvas {
            /* 填满容器并保持比例 */
            display: block;
            min-width: 0;
            min-height: 0;
            flex: 1 1 auto;
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* 禁用选中 */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #streamDiv img,
        #streamDiv video,
        #streamDiv canvas {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
        }

        #streamDiv video::-webkit-media-controls,
        #streamDiv video::-webkit-media-controls-enclosure,
        #streamDiv video::-webkit-media-controls-panel,
        #streamDiv video::-webkit-media-controls-overlay-enclosure,
        #streamDiv video::-webkit-media-controls-play-button,
        #streamDiv video::-webkit-media-controls-fullscreen-button {
            display: none !important;
            opacity: 0 !important;
        }

        #buttonsDiv {
            display: none !important;
        }

        /* VR 16:9 裁剪模式 */
        #streamDiv.crop-16-9 img,
        #streamDiv.crop-16-9 video,
        #streamDiv.crop-16-9 canvas {
            object-fit: cover !important;
            aspect-ratio: 16 / 9 !important;
        }

        /* 手机端全屏沉浸模式 */
        body.mobile-mode {
            padding-bottom: 0;
            overscroll-behavior: none;
            -webkit-overflow-scrolling: auto;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        body.mobile-mode #streamDiv {
            bottom: 0;
        }

        body.mobile-mode #navBar {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        body.mobile-mode #navBar.visible {
            opacity: 1;
            pointer-events: auto;
        }

        body.mobile-mode #mobileToggle {
            display: block;
        }

        #mobileToggle {
            display: none;
            position: fixed;
            bottom: 8px;
            right: 8px;
            z-index: 200;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
            font-size: 20px;
            backdrop-filter: blur(4px);
            cursor: pointer;
            opacity: 0.5;
        }

        #mobileToggle:active {
            opacity: 1;
        }

        /* 手机端手势提示区 */
        #mobileGestureHint {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.3));
            z-index: 150;
            pointer-events: none;
        }

        body.mobile-mode #mobileGestureHint {
            display: block;
        }

        /* Touch Visual Feedback */
        .touch-ripple {
            position: fixed;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(100, 180, 255, 0.35);
            border: 2px solid rgba(100, 180, 255, 0.6);
            transform: translate(-50%, -50%) scale(0.3);
            pointer-events: none;
            z-index: 9999;
            animation: ripple-expand 0.4s ease-out forwards;
        }

        @keyframes ripple-expand {
            0% {
                transform: translate(-50%, -50%) scale(0.3);
                opacity: 1;
            }

            100% {
                transform: translate(-50%, -50%) scale(1.8);
                opacity: 0;
            }
        }

        .touch-dot {
            position: fixed;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(100, 180, 255, 0.5);
            border: 1px solid rgba(100, 180, 255, 0.8);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9998;
            transition: opacity 0.15s;
        }

        .touch-trail {
            position: fixed;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(100, 180, 255, 0.25);
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 9997;
            animation: trail-fade 0.3s ease-out forwards;
        }

        @keyframes trail-fade {
            0% {
                opacity: 0.6;
                transform: translate(-50%, -50%) scale(1);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
        }

        /* Shortcut Help Panel */
        #shortcutHelpPanel {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 20, 0.96);
            color: #eee;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 24px;
            z-index: 100000;
            max-width: 520px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            font-size: 13px;
            line-height: 1.6;
        }

        #shortcutHelpPanel h3 {
            margin: 12px 0 6px;
            color: #7af;
            font-size: 14px;
        }

        #shortcutHelpPanel table {
            width: 100%;
            border-collapse: collapse;
        }

        #shortcutHelpPanel td {
            padding: 3px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        #shortcutHelpPanel td:first-child {
            color: #fd0;
            font-family: monospace;
            white-space: nowrap;
            width: 140px;
        }

        #shortcutHelpPanel .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 20px;
            cursor: pointer;
        }

        /* FPS / Latency / Stats Overlay */
        #perfOverlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.6);
            color: #0f0;
            padding: 4px 10px;
            font-family: monospace;
            font-size: 12px;
            z-index: 10000;
            pointer-events: none;
            border-radius: 6px;
            display: none;
            line-height: 1.5;
        }

        /* Display rotation classes */
        #streamDiv.rotate-90 img,
        #streamDiv.rotate-90 video,
        #streamDiv.rotate-90 canvas {
            transform: rotate(90deg);
        }

        #streamDiv.rotate-180 img,
        #streamDiv.rotate-180 video,
        #streamDiv.rotate-180 canvas {
            transform: rotate(180deg);
        }

        #streamDiv.rotate-270 img,
        #streamDiv.rotate-270 video,
        #streamDiv.rotate-270 canvas {
            transform: rotate(270deg);
        }

        /* Ctrl+click pinch simulation cursor */
        body.pinch-sim-mode {
            cursor: crosshair !important;
        }

        #navBar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: rgba(18, 18, 22, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 2px;
            z-index: 100;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        #navBar button {
            background: none;
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            opacity: 0.7;
            transition: all 0.15s ease;
            border-radius: 8px;
        }

        #navBar button:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.08);
        }

        #navBar button:active {
            opacity: 0.5;
            transform: scale(0.92);
        }

        body {
            padding-bottom: 48px;
        }

        #pinDiv input {
            background-color: #FFF;
            padding: 4px;
            width: 4em;
            font-family: monospace;
        }

        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #controlStatus {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-family: sans-serif;
            pointer-events: none;
            z-index: 2000;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        input {
            -webkit-user-select: text !important;
            -moz-user-select: text !important;
            -ms-user-select: text !important;
            user-select: text !important;
        }

        #pinDiv button {
            background-color: #32628D;
            border-radius: 6px;
            border: none;
            color: white;
            padding: 8px 16px;
            text-align: center;
            text-decoration: none;
            display: inline-block
        }

        #pipStreamDiv video {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            margin: auto;
            max-height: 100vh;
            max-height: -webkit-fill-available;
            max-height: 100dvh;
            max-width: 100%;
            z-index: -10;
        }

        @media screen and (max-width:850px) {

            #connectDiv,
            #pinDiv,
            #blockedDiv,
            #errorDiv {
                padding: 30px;
                width: 55%
            }
        }

        @media screen and (max-width:650px) {

            #connectDiv,
            #pinDiv,
            #blockedDiv,
            #errorDiv {
                padding: 30px 20px;
                width: 85%
            }
        }

        .loading {
            margin: 20px 0 10px 0;
        }

        .loading span {
            display: inline-block;
            vertical-align: middle;
            width: .6em;
            height: .6em;
            margin: .19em;
            background: #fff;
            border-radius: .6em;
            animation: loading 1s infinite alternate
        }

        .loading span:nth-of-type(2) {
            background: #fff;
            animation-delay: .2s
        }

        .loading span:nth-of-type(3) {
            background: #fff;
            animation-delay: .4s
        }

        .loading span:nth-of-type(4) {
            background: #fff;
            animation-delay: .6s
        }

        .loading span:nth-of-type(5) {
            background: #fff;
            animation-delay: .8s
        }

        .loading span:nth-of-type(6) {
            background: #fff;
            animation-delay: 1s
        }

        .loading span:nth-of-type(7) {
            background: #fff;
            animation-delay: 1.2s
        }

        @keyframes loading {
            0% {
                opacity: 0
            }

            100% {
                opacity: 1
            }
        }

        .screen-off-mode img,
        .screen-off-mode video,
        .screen-off-mode canvas {
            filter: none;
        }
    </style>

</head>

<body>
    <div id="connectDiv">
        <img src="logo.svg" class="logo" />
        <p style="font-weight:500">%CONNECTING%</p>
        <div class="loading">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <div id="streamDiv">
        <img id="stream" FIT_WINDOW />
        <canvas id="streamCanvas" style="display: none; width: 100%; height: 100%; object-fit: contain;"></canvas>
        <video id="videoPlayer" autoplay muted playsinline webkit-playsinline x5-playsinline x-webkit-airplay="deny"
            x5-video-player-type="h5-page" x5-video-player-fullscreen="false"
            controlslist="nodownload noremoteplayback noplaybackrate" disablepictureinpicture disableremoteplayback

    <div id="buttonsDiv">
        <input type="image" id="fullscreen" style="width:24px;height:24px;margin:4px;"
            src="data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23FFF' d='M5,5H10V7H7V10H5V5M14,5H19V10H17V7H14V5M17,14H19V19H14V17H17V14M10,17V19H5V14H7V17H10Z' /%3E%3C/svg%3E"
            onclick="toggleFullscreen()" title="全屏" />
        <input type="image" style="width:24px;height:24px;margin:4px;"

    <!-- 手机端浮动按钮 & 手势提示 -->
    <button id="mobileToggle" onclick="toggleMobileNav()">☰</button>

    <!-- 底部工具栏：固定导航 + 命令菜单 -->
    <div id="navBar">
        <!-- 返回 -->
        <button onclick="sendNavAction('/back');showStatus('Back')" title="返回 (Alt+B / 右键)">

    <script>
        // ==================== Command Menu (replaces 6-mode cycling) ====================
        var commandMenuVisible = false;

        function toggleCommandMenu() {
            commandMenuVisible = !commandMenuVisible;
            var menu = document.getElementById('commandMenu');
            if (!menu) {
                menu = document.createElement('div');
                menu.id = 'commandMenu';
                menu.style.cssText = 'position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(15,15,20,0.96);color:#eee;border-radius:16px;border:1px solid rgba(255,255,255,0.12);z-index:9998;width:380px;max-width:92vw;max-height:75vh;overflow-y:auto;font-family:-apple-system,system-ui,sans-serif;font-size:13px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.5);padding:16px;';
                menu.innerHTML = buildMenuHTML();
                document.body.appendChild(menu);
                // click outside to close
                document.addEventListener('click', function (e) {
                    if (commandMenuVisible && !menu.contains(e.target) && e.target.id !== 'menuBtn' && !e.target.closest('#menuBtn')) {
                        hideCommandMenu();
                    }
                });
            }
            menu.style.display = commandMenuVisible ? 'block' : 'none';
        }

        function hideCommandMenu() {
            commandMenuVisible = false;
            var menu = document.getElementById('commandMenu');
            if (menu) menu.style.display = 'none';
        }

        function menuAction(fn) {
            hideCommandMenu();
            if (typeof fn === 'string') { sendNavAction(fn); showStatus(fn.replace('/', '')); }
            else if (typeof fn === 'function') { fn(); }
        }

        function buildMenuHTML() {
            var s = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">';
            s += '<span style="font-size:15px;font-weight:600;letter-spacing:0.3px;">ScreenStream</span>';
            s += '<span id="sessionTimerDisplay" style="font-size:11px;color:rgba(255,255,255,0.4);">v33+ · Alt+M</span></div>';

            // --- 系统控制 ---
            s += menuSection('📱 系统控制', [
                ['🔊', 'Vol +', "menuAction('/volume/up')", 'Alt+↑'],
                ['🔉', 'Vol -', "menuAction('/volume/down')", 'Alt+↓'],
                ['🔒', '锁屏', "menuAction('/lock')", 'Alt+O'],
                ['📢', '通知栏', "menuAction('/notifications')", 'Alt+N'],
                ['⚙️', '快捷设置', "menuAction('/quicksettings')", 'Alt+NN'],
                ['⏻', '电源', "menuAction('/power')", 'Alt+P'],
            ]);

            // --- 设备控制 (NEW: 竞品功能) ---
            s += menuSection('🎮 设备控制', [
                ['⏯', '播放/暂停', "menuAction(function(){sendInputJson('/media/playpause',{});showStatus('Play/Pause')})"],
                ['⏭', '下一首', "menuAction(function(){sendInputJson('/media/next',{});showStatus('Next')})"],
                ['⏮', '上一首', "menuAction(function(){sendInputJson('/media/prev',{});showStatus('Prev')})"],
                ['🔦', '手电筒', "menuAction(toggleFlashlight)"],
                ['📳', '振动', "menuAction(function(){sendInputJson('/vibrate',{duration:500});showStatus('Vibrate')})"],
                ['🔕', '免打扰', "menuAction(toggleDnd)"],
                ['📡', '找手机', "menuAction(toggleFindPhone)"],
                ['🔄', '自动旋转', "menuAction(toggleAutoRotate)"],
                ['💀', '关闭应用', "menuAction(function(){sendInputJson('/killapp',{});showStatus('Kill App')})"],
            ]);

            // --- 投屏设置 ---
            s += menuSection('🖥️ 投屏设置', [
                ['🎵', '音频', "menuAction(toggleAudio)"],
                ['📐', '画中画', "menuAction(togglePiP)", 'A+Sh+P'],
                ['🔲', 'VR 16:9', "menuAction(toggleCrop169)"],
                ['🎯', '1:1像素', "menuAction(togglePixelPerfect)", 'Alt+G'],
                ['🔄', '旋转', "menuAction(function(){rotateDisplay(90)})", 'Alt+→'],
                ['📊', 'FPS/延迟', "menuAction(togglePerfOverlay)", 'Alt+I'],
                ['🎮', '游戏模式', "menuAction(toggleGameMode)"],
            ]);

            // --- 远程工具 ---
            s += menuSection('🛠️ 远程工具', [
                ['☀️', '唤醒', "menuAction('/wake')"],
                ['📷', '截屏', "menuAction(captureScreenshot)", 'Alt+K'],
                ['📷', '截屏+标注', "menuAction(captureWithAnnotations)"],
                ['⏺', '录屏', "menuAction(toggleRecording)"],
                ['✏️', '标注', "menuAction(toggleAnnotation)"],
                ['📋', '剪贴板', "menuAction(showClipboard)", 'Alt+C'],
                ['📱', '应用列表', "menuAction(showAppList)"],
                ['📐', '分屏', "menuAction('/splitscreen')"],
                ['📤', '传文件', "menuAction(showFileUpload)"],
                ['📁', '文件管理', "menuAction(toggleFileManager)", 'Alt+E'],
                ['ℹ️', '设备信息', "menuAction(toggleDeviceInfoPanel)"],

        function saveTrigger(macroId) {
            var type = document.getElementById('triggerType').value;
            var trigger = { type: type, enabled: true };
            var pkg = document.getElementById('triggerPkg').value.trim();
            if (pkg) trigger.package = pkg;
            if (type === 'notification') {
                var text = document.getElementById('triggerText').value.trim();
                if (text) trigger.textMatch = text;
            }
            if (type === 'app_switch') {
                trigger.direction = document.getElementById('triggerDirection').value;
            }
            if (type === 'timer') {
                var interval = parseInt(document.getElementById('triggerInterval').value) || 60000;
                trigger.intervalMs = Math.max(10000, interval);
            }
            fetch(getInputApiBase() + '/macro/trigger/' + macroId, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(trigger)
            }).then(function (r) { return r.json(); }).then(function () {
                showStatus('触发器已保存');
                var p = document.getElementById('triggerConfigPanel');
                if (p) p.remove();
                refreshMacroList();
            }).catch(function (e) { showStatus('保存失败: ' + e.message); });
        }

        // ==================== M16: 宏导出/导入 ====================

        function exportAllMacros() {
            fetch(getInputApiBase() + '/macro/list').then(function (r) { return r.json(); }).then(function (list) {
                if (!list || list.length === 0) { showStatus('没有宏可导出'); return; }
                // Fetch full details for each macro
                var promises = list.map(function (m) {
                    return fetch(getInputApiBase() + '/macro/' + m.id).then(function (r) { return r.json(); });
                });
                Promise.all(promises).then(function (macros) {
                    var json = JSON.stringify({ version: 1, exportTime: new Date().toISOString(), macros: macros }, null, 2);
                    var blob = new Blob([json], { type: 'application/json' });
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = 'screenstream-macros-' + new Date().toISOString().slice(0, 10) + '.json';
                    a.click();
                    URL.revokeObjectURL(a.href);
                    showStatus('已导出 ' + macros.length + ' 个宏');
                });
            }).catch(function (e) { showStatus('导出失败: ' + e.message); });
        }

        function importMacrosFromFile() {
            document.getElementById('macroImportFile').click();
        }

        function handleMacroImport(input) {
            if (!input.files || !input.files[0]) return;
            var reader = new FileReader();
            reader.onload = function (e) {
                try {
                    var data = JSON.parse(e.target.result);
                    var macros = data.macros || (Array.isArray(data) ? data : [data]);
                    var count = 0;
                    var importNext = function (i) {
                        if (i >= macros.length) {
                            showStatus('已导入 ' + count + ' 个宏');
                            refreshMacroList();
                            return;
                        }
                        var m = macros[i];
                        fetch(getInputApiBase() + '/macro/create', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ name: m.name || ('导入宏' + (i + 1)), actions: m.actions || m.steps || [] })
                        }).then(function () { count++; importNext(i + 1); }).catch(function () { importNext(i + 1); });
                    };
                    importNext(0);

        // 截图功能
        function takeScreenshot() {
            // 找到当前的流元素 (IMG, CANVAS, VIDEO)
            var targetEl = activeStreamElement;
            if (!targetEl) targetEl = document.getElementById('stream');

            // 如果是在 VIDEO 模式且 videoPlayer 可见
            var videoPlayer = document.getElementById('videoPlayer');
            if (videoPlayer && videoPlayer.style.display !== 'none') {
                targetEl = videoPlayer;
            }

            // 创建离屏 canvas
            var canvas = document.createElement('canvas');
            var ctx = canvas.getContext('2d');

            var width, height;

            // 获取源尺寸
            if (targetEl.tagName === 'VIDEO') {
                width = targetEl.videoWidth;
                height = targetEl.videoHeight;
            } else if (targetEl.tagName === 'IMG') {
                width = targetEl.naturalWidth;
                height = targetEl.naturalHeight;
            } else {
                width = targetEl.width;
                height = targetEl.height;
            }

            if (!width || !height) {
                showStatus("Screenshot failed: No active stream");
                return;
            }

            canvas.width = width;
            canvas.height = height;

            // 绘制
            ctx.drawImage(targetEl, 0, 0, width, height);

            // 生成文件名
            var now = new Date();
            var filename = 'ScreenStream_' +
                now.getFullYear() +
                ('0' + (now.getMonth() + 1)).slice(-2) +
                ('0' + now.getDate()).slice(-2) + '_' +
                ('0' + now.getHours()).slice(-2) +
                ('0' + now.getMinutes()).slice(-2) +
                ('0' + now.getSeconds()).slice(-2) + '.jpg';

            // 下载
            canvas.toBlob(function (blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                setTimeout(function () {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 100);
                showStatus("Screenshot saved: " + filename);
            }, 'image/jpeg', 0.95);
        }

        updateNavButtons();

        function getStreamImagePoint(clientX, clientY) {
            var rect = activeStreamElement.getBoundingClientRect();
            var natW, natH;

            // Handle different element types
            if (activeStreamElement.tagName === 'CANVAS') {
                if (currentStreamCodec !== 0 && videoPlayerEl && videoPlayerEl.videoWidth && videoPlayerEl.videoHeight) {
                    natW = videoPlayerEl.videoWidth;
                    natH = videoPlayerEl.videoHeight;
                } else {
                    natW = activeStreamElement.width;
                    natH = activeStreamElement.height;
                }
            } else if (activeStreamElement.tagName === 'VIDEO') {
                natW = activeStreamElement.videoWidth;
                natH = activeStreamElement.videoHeight;
            } else {
                // IMG element
                natW = activeStreamElement.naturalWidth;
                natH = activeStreamElement.naturalHeight;
            }

            if (!rect.width || !rect.height || !natW) return null;

            // Calculate active image area (simulating object-fit: contain)
            var naturalRatio = natW / natH;
            var clientRatio = rect.width / rect.height;

            var displayWidth, displayHeight, offsetX, offsetY;

            if (clientRatio > naturalRatio) {
                // Client is wider (Pillarbox)
                displayHeight = rect.height;
                displayWidth = displayHeight * naturalRatio;
                offsetX = (rect.width - displayWidth) / 2;
                offsetY = 0;
            } else {
                // Client is taller (Letterbox)
                displayWidth = rect.width;
                displayHeight = displayWidth / naturalRatio;
                offsetX = 0;
                offsetY = (rect.height - displayHeight) / 2;
            }

            // Coordinates relative to the ACTIVE image area
            var x = clientX - rect.left - offsetX;
            var y = clientY - rect.top - offsetY;

            // Clamp and Normalize
            var nx = x / displayWidth;
            var ny = y / displayHeight;

            // Optional: Ignore clicks outside the active area?
            // The user says "click outside to trigger", so maybe we should clamp?
            // Clamping is safer.
            nx = Math.max(0.0, Math.min(1.0, nx));
            ny = Math.max(0.0, Math.min(1.0, ny));

            var pixelX = Math.round(nx * displayWidth);
            var pixelY = Math.round(ny * displayHeight);

            return {
                x: pixelX, y: pixelY,
                nx: nx, ny: ny,
                clientX: clientX, clientY: clientY
            };
        }

                // Typically: Wheel Up (dy<0) -> Scroll Up -> Content Down.
                // For Horizontal: Wheel Up -> Scroll Left?
                // Let's stick to standard: deltaY > 0 (Wheel Down) -> Right, deltaY < 0 (Wheel Up) -> Left

                var targetNx = Math.max(0.0, Math.min(1.0, p.nx + delta));
                sendSwipe(p.nx, p.ny, targetNx, p.ny, 100);

                // vDelta 应该是负数
                var vDelta = deltaY > 0 ? -0.05 : 0.05;

                // M18: Include annotation overlay if present and requested

                    var annoCanvas = document.getElementById('annotationCanvas');
                    if (annoCanvas) {
                        ctx.drawImage(annoCanvas, 0, 0, w, h);

                // M18: Add timestamp watermark if enabled

                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.font = Math.max(12, Math.floor(h / 40)) + 'px monospace';
                    ctx.fillText(new Date().toLocaleString(), 10, h - 10);
                }
                screenshotCount++;
                canvas.toBlob(function (blob) {
                    if (navigator.clipboard && typeof ClipboardItem !== 'undefined') {
                        navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]).then(function () {
                            showStatus('Screenshot #' + screenshotCount + ' copied!');
                        }).catch(function () {
                            downloadBlob(blob);

                showStatus('Screenshot failed: ' + e.message);

        function downloadBlob(blob) {
            var url = URL.createObjectURL(blob);

        function gpPressed(idx, pressed) {

        function pollGamepad() {
            var gamepads = navigator.getGamepads ? navigator.getGamepads() : [];
            var gp = null;
            for (var i = 0; i < gamepads.length; i++) { if (gamepads[i]) { gp = gamepads[i]; break; } }
            if (!gp || !enableButtons) return;

            // Buttons: A=0 tap center, B=1 back, X=2 home, Y=3 recents
            if (gpPressed(0, gp.buttons[0] && gp.buttons[0].pressed)) { sendTap(0.5, 0.5); showStatus('A: Tap'); }
            if (gpPressed(1, gp.buttons[1] && gp.buttons[1].pressed)) { sendNavAction('/back'); showStatus('B: Back'); }
            if (gpPressed(2, gp.buttons[2] && gp.buttons[2].pressed)) { sendNavAction('/home'); showStatus('X: Home'); }
            if (gpPressed(3, gp.buttons[3] && gp.buttons[3].pressed)) { sendNavAction('/recents'); showStatus('Y: Recents'); }
            // L1=4, R1=5 = volume
            if (gpPressed(4, gp.buttons[4] && gp.buttons[4].pressed)) { sendNavAction('/volume/down'); showStatus('L1: Vol-'); }
            if (gpPressed(5, gp.buttons[5] && gp.buttons[5].pressed)) { sendNavAction('/volume/up'); showStatus('R1: Vol+'); }
            // D-pad: 12=up, 13=down, 14=left, 15=right → swipe
            if (gpPressed(12, gp.buttons[12] && gp.buttons[12].pressed)) { sendSwipe(0.5, 0.6, 0.5, 0.4, 150); }
            if (gpPressed(13, gp.buttons[13] && gp.buttons[13].pressed)) { sendSwipe(0.5, 0.4, 0.5, 0.6, 150); }
            if (gpPressed(14, gp.buttons[14] && gp.buttons[14].pressed)) { sendSwipe(0.6, 0.5, 0.4, 0.5, 150); }
            if (gpPressed(15, gp.buttons[15] && gp.buttons[15].pressed)) { sendSwipe(0.4, 0.5, 0.6, 0.5, 150); }

            // Left stick → continuous swipe (axes 0,1)
            var lx = gp.axes[0] || 0, ly = gp.axes[1] || 0;
            if (Math.abs(lx) > 0.5 || Math.abs(ly) > 0.5) {
                var sx = 0.5, sy = 0.5;
                sendSwipe(sx, sy, Math.max(0, Math.min(1, sx + lx * 0.15)), Math.max(0, Math.min(1, sy + ly * 0.15)), 80);
            }
        }

        // ==================== Session Recording (MediaRecorder API) ====================

        var mediaRecorder = null;
        var recordedChunks = [];
        var isRecording = false;

        function toggleRecording() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            try {
                var el = activeStreamElement;
                var stream;
                if (el.tagName === 'VIDEO') {
                    stream = el.captureStream ? el.captureStream() : el.mozCaptureStream();
                } else if (el.tagName === 'CANVAS') {
                    stream = el.captureStream(30);
                } else {
                    // For MJPEG img, create canvas-based recording
                    var canvas = document.createElement('canvas');
                    canvas.width = el.naturalWidth || 1280;
                    canvas.height = el.naturalHeight || 720;
                    var ctx = canvas.getContext('2d');
                    var drawFrame = function () {
                        if (isRecording) {
                            ctx.drawImage(el, 0, 0, canvas.width, canvas.height);
                            requestAnimationFrame(drawFrame);
                        }
                    };
                    stream = canvas.captureStream(30);
                    requestAnimationFrame(drawFrame);
                }
                recordedChunks = [];
                var options = { mimeType: 'video/webm;codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm;codecs=vp8' };
                }
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm' };
                }
                mediaRecorder = new MediaRecorder(stream, options);
                mediaRecorder.ondataavailable = function (e) { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = function () {
                    var blob = new Blob(recordedChunks, { type: 'video/webm' });
                    var url = URL.createObjectURL(blob);
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'recording_' + Date.now() + '.webm';
                    a.click();
                    URL.revokeObjectURL(url);
                    showStatus('Recording saved!');
                };
                mediaRecorder.start(1000);
                isRecording = true;
                showStatus('Recording started');
            } catch (e) {
                showStatus('Recording failed: ' + e.message);
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
            }
        }

        var fmVisible = false;
        var fmCurrentPath = '';
        var fmClipboard = null; // {action:'copy'|'cut', path:'...'}
        var fmShowHidden = false;
        var fmSortBy = 'name';
        var fmViewMode = 'list'; // 'list' | 'grid'
        var fmSelectedFiles = []; // multi-select paths

        function toggleFileManager() {
            fmVisible = !fmVisible;
            var panel = document.getElementById('fileManagerPanel');
            if (!panel) {
                panel = document.createElement('div');
                panel.id = 'fileManagerPanel';
                panel.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(8,8,12,0.98);color:#e0e0e0;z-index:10001;font-family:-apple-system,system-ui,sans-serif;font-size:13px;display:flex;flex-direction:column;';
                panel.innerHTML = fmBuildShell();
                document.body.appendChild(panel);
                fmLoadStorage();
            }
            panel.style.display = fmVisible ? 'flex' : 'none';
            if (fmVisible) hideCommandMenu();
        }

        function fmBuildShell() {
            var s = '';
            // Top bar
            s += '<div id="fmTopBar" style="display:flex;align-items:center;padding:8px 12px;background:rgba(30,30,40,0.95);border-bottom:1px solid rgba(255,255,255,0.1);gap:8px;flex-shrink:0;">';
            s += '<button onclick="toggleFileManager()" style="background:none;border:none;color:#f55;font-size:18px;cursor:pointer;padding:2px 6px;" title="关闭">✕</button>';
            s += '<div id="fmBreadcrumb" style="flex:1;overflow-x:auto;white-space:nowrap;font-size:12px;color:#aaa;"></div>';
            s += '<input id="fmSearchInput" placeholder="🔍 搜索..." style="width:140px;padding:4px 8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;border-radius:6px;font-size:12px;" onkeydown="if(event.key===\'Enter\')fmSearch()">';
            s += '<button onclick="fmSearch()" style="background:#36a;color:#fff;border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;">搜索</button>';
            s += '</div>';
            // Toolbar
            s += '<div id="fmToolbar" style="display:flex;align-items:center;padding:6px 12px;background:rgba(25,25,35,0.9);border-bottom:1px solid rgba(255,255,255,0.06);gap:6px;flex-shrink:0;flex-wrap:wrap;">';
            s += '<button onclick="fmGoUp()" style="background:rgba(255,255,255,0.08);color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;" title="上级目录">⬆ 上级</button>';
            s += '<button onclick="fmRefresh()" style="background:rgba(255,255,255,0.08);color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">🔄 刷新</button>';
            s += '<button onclick="fmPromptMkdir()" style="background:rgba(255,255,255,0.08);color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">📁 新建</button>';
            s += '<button onclick="fmUploadFile()" style="background:rgba(255,255,255,0.08);color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">📤 上传</button>';
            s += '<input type="file" id="fmUploadInput" style="display:none" onchange="fmHandleUpload(this)" multiple>';
            s += '<button onclick="fmToggleHidden()" id="fmHiddenBtn" style="background:rgba(255,255,255,0.08);color:#888;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">👁 隐藏</button>';
            s += '<select id="fmSortSelect" onchange="fmSortBy=this.value;fmNavigate(fmCurrentPath)" style="background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15);padding:3px 6px;border-radius:4px;font-size:11px;">';
            s += '<option value="name">名称</option><option value="modified">时间</option><option value="size">大小</option><option value="type">类型</option></select>';
            s += '<button id="fmViewToggle" onclick="fmToggleView()" style="background:rgba(255,255,255,0.08);color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;" title="切换视图">☰ 列表</button>';
            s += '<button id="fmBatchBtn" onclick="fmBatchDelete()" style="display:none;background:#c44;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;">🗑 批量删除</button>';
            s += '<span id="fmStorageBar" style="margin-left:auto;font-size:11px;color:#888;"></span>';
            s += '</div>';
            // File list (with drag-and-drop zone)
            s += '<div id="fmFileList" style="flex:1;overflow-y:auto;padding:4px 0;" ondragover="fmDragOver(event)" ondragleave="fmDragLeave(event)" ondrop="fmDrop(event)"></div>';
            // Context menu
            s += '<div id="fmContextMenu" style="display:none;position:fixed;background:rgba(30,30,45,0.98);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:4px 0;z-index:10010;min-width:160px;box-shadow:0 8px 24px rgba(0,0,0,0.5);"></div>';
            // Status bar
            s += '<div id="fmStatusBar" style="padding:6px 12px;background:rgba(25,25,35,0.9);border-top:1px solid rgba(255,255,255,0.06);font-size:11px;color:#888;flex-shrink:0;"></div>';
            // Preview overlay
            s += '<div id="fmPreview" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:10002;flex-direction:column;"></div>';
            return s;
        }

        function fmLoadStorage() {
            fetch(getInputApiBase() + '/files/storage').then(function (r) { return r.json() }).then(function (d) {
                if (d.ok) {
                    fmCurrentPath = d.storagePath;
                    var used = d.usedBytes, total = d.totalBytes;
                    var pct = total > 0 ? (used / total * 100).toFixed(1) : 0;
                    var bar = document.getElementById('fmStorageBar');
                    if (bar) bar.innerHTML = '💾 ' + fmFormatSize(used) + ' / ' + fmFormatSize(total) + ' (' + pct + '%)';
                    fmRenderQuickAccess(d.quickAccess);
                    fmNavigate(fmCurrentPath);
                }
            }).catch(function (e) { fmStatus('加载失败: ' + e.message); });
        }

        function fmRenderQuickAccess(dirs) {
            if (!dirs || dirs.length === 0) return;
            // Add quick access buttons to toolbar
            var toolbar = document.getElementById('fmToolbar');
            if (!toolbar) return;
            var span = document.createElement('span');
            span.style.cssText = 'display:flex;gap:4px;flex-wrap:wrap;';
            for (var i = 0; i < dirs.length; i++) {
                var d = dirs[i];
                var name = typeof d === 'object' ? (d.name || '') : '';
                var path = typeof d === 'object' ? (d.path || '') : '';
                if (!name) continue;
                var btn = document.createElement('button');
                btn.textContent = fmDirIcon(name) + ' ' + name;
                btn.style.cssText = 'background:rgba(60,120,200,0.15);color:#8bf;border:none;padding:2px 8px;border-radius:4px;cursor:pointer;font-size:10px;';
                btn.setAttribute('data-path', path);
                btn.onclick = function () { fmNavigate(this.getAttribute('data-path')); };
                span.appendChild(btn);
            }
            toolbar.appendChild(span);
        }

        function fmDirIcon(name) {
            var icons = { DCIM: '📷', Download: '📥', Documents: '📄', Music: '🎵', Movies: '🎬', Pictures: '🖼', Ringtones: '🔔', Alarms: '⏰', Notifications: '🔔', Podcasts: '🎙' };
            return icons[name] || '📁';
        }

        function fmNavigate(path) {
            fmCurrentPath = path;
            fmStatus('加载中...');
            var url = getInputApiBase() + '/files/list?path=' + encodeURIComponent(path) + '&hidden=' + fmShowHidden + '&sort=' + fmSortBy;
            fetch(url).then(function (r) { return r.json() }).then(function (d) {
                if (!d.ok) { fmStatus('错误: ' + (d.error || 'unknown')); return; }
                fmCurrentPath = d.path;
                fmRenderBreadcrumb(d.path);
                fmRenderFiles(d.files, d.count);
                fmStatus(d.count + ' 项 | 可用: ' + fmFormatSize(d.freeBytes));
            }).catch(function (e) { fmStatus('加载失败: ' + e.message); });
        }

        function fmRenderBreadcrumb(path) {
            var el = document.getElementById('fmBreadcrumb');
            if (!el) return;
            var parts = path.split('/').filter(function (p) { return p; });
            var html = '';
            var acc = '';
            for (var i = 0; i < parts.length; i++) {
                acc += '/' + parts[i];
                var isLast = (i === parts.length - 1);
                if (isLast) {
                    html += '<span style="color:#fff;font-weight:600;">' + escapeHtml(parts[i]) + '</span>';
                } else {
                    html += '<span style="cursor:pointer;color:#8af;" onclick="fmNavigate(\'' + acc.replace(/'/g, "\\'") + '\')">' + escapeHtml(parts[i]) + '</span>';
                    html += '<span style="color:#555;margin:0 3px;">/</span>';
                }
            }
            el.innerHTML = html;
        }

        function fmRenderFiles(files, count) {
            var el = document.getElementById('fmFileList');
            if (!el) return;
            fmSelectedFiles = [];
            fmUpdateBatchBtn();
            if (!files || count === 0) {
                el.innerHTML = '<div style="text-align:center;padding:40px;color:#666;">📂 空文件夹</div>';
                return;
            }
            var isGrid = (fmViewMode === 'grid');
            var html = '';
            if (isGrid) html += '<div style="display:flex;flex-wrap:wrap;padding:8px;gap:8px;">';
            for (var i = 0; i < files.length; i++) {
                var f = files[i];
                var name = f.name || '';
                var isDir = f.isDir || false;
                var size = f.size || 0;
                var modified = f.modified || 0;
                var path = f.path || '';
                var ext = (f.ext || '').toLowerCase();
                var icon = isDir ? '📁' : fmFileIcon(ext);
                var sizeStr = isDir ? '' : fmFormatSize(size);
                var dateStr = modified > 0 ? new Date(modified).toLocaleDateString() + ' ' + new Date(modified).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
                var ePath = path.replace(/'/g, "\\'");
                var eName = name.replace(/'/g, "\\'");

                if (isGrid) {
                    html += '<div class="fm-row" data-path="' + path.replace(/"/g, '&quot;') + '" style="width:100px;padding:8px;text-align:center;cursor:pointer;border-radius:8px;transition:background 0.15s;position:relative;" ';
                    html += 'onmouseenter="this.style.background=\'rgba(255,255,255,0.06)\'" onmouseleave="if(!this.classList.contains(\'fm-selected\'))this.style.background=\'none\'" ';
                    html += 'oncontextmenu="fmShowContext(event,\'' + ePath + '\',\'' + eName + '\',' + isDir + ')" ';
                    html += (isDir ? 'ondblclick="fmNavigate(\'' + ePath + '\')" ' : 'ondblclick="fmPreviewFile(\'' + ePath + '\',\'' + ext + '\')" ');
                    html += 'onclick="fmSelectRow(this,\'' + ePath + '\',event)">';
                    html += '<div style="font-size:32px;margin-bottom:4px;">' + icon + '</div>';
                    html += '<div style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + name.replace(/"/g, '&quot;') + '">' + escapeHtml(name) + '</div>';
                    if (sizeStr) html += '<div style="font-size:10px;color:#888;">' + sizeStr + '</div>';
                    html += '</div>';
                } else {
                    html += '<div class="fm-row" data-path="' + path.replace(/"/g, '&quot;') + '" style="display:flex;align-items:center;padding:6px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,0.04);transition:background 0.15s;" ';
                    html += 'onmouseenter="this.style.background=\'rgba(255,255,255,0.06)\'" onmouseleave="if(!this.classList.contains(\'fm-selected\'))this.style.background=\'none\'" ';
                    html += 'oncontextmenu="fmShowContext(event,\'' + ePath + '\',\'' + eName + '\',' + isDir + ')" ';
                    html += (isDir ? 'ondblclick="fmNavigate(\'' + ePath + '\')" ' : 'ondblclick="fmPreviewFile(\'' + ePath + '\',\'' + ext + '\')" ');
                    html += 'onclick="fmSelectRow(this,\'' + ePath + '\',event)">';
                    html += '<span style="width:24px;text-align:center;font-size:16px;">' + icon + '</span>';
                    html += '<span style="flex:1;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + escapeHtml(name) + '</span>';
                    html += '<span style="width:80px;text-align:right;color:#888;font-size:11px;font-family:monospace;">' + sizeStr + '</span>';
                    html += '<span style="width:120px;text-align:right;color:#666;font-size:11px;margin-left:8px;">' + dateStr + '</span>';
                    html += '<span style="display:flex;gap:2px;margin-left:8px;">';
                    if (!isDir) html += '<button onclick="event.stopPropagation();fmDownload(\'' + ePath + '\',\'' + eName + '\')" style="background:none;border:none;color:#8af;cursor:pointer;font-size:14px;padding:2px;" title="下载">⬇</button>';
                    html += '<button onclick="event.stopPropagation();fmPromptRename(\'' + ePath + '\',\'' + eName + '\')" style="background:none;border:none;color:#fa8;cursor:pointer;font-size:14px;padding:2px;" title="重命名">✏️</button>';
                    html += '<button onclick="event.stopPropagation();fmCopy(\'' + ePath + '\')" style="background:none;border:none;color:#8f8;cursor:pointer;font-size:14px;padding:2px;" title="复制">📋</button>';
                    html += '<button onclick="event.stopPropagation();fmCut(\'' + ePath + '\')" style="background:none;border:none;color:#ff8;cursor:pointer;font-size:14px;padding:2px;" title="剪切">✂️</button>';
                    html += '<button onclick="event.stopPropagation();fmConfirmDelete(\'' + ePath + '\',\'' + eName + '\')" style="background:none;border:none;color:#f55;cursor:pointer;font-size:14px;padding:2px;" title="删除">🗑</button>';
                    html += '</span>';
                    html += '</div>';
                }
            }
            if (isGrid) html += '</div>';
            el.innerHTML = html;
        }

        var fmSelectedPath = '';
        function fmSelectRow(el, path, event) {
            fmHideContext();
            if (event && event.ctrlKey) {
                var idx = fmSelectedFiles.indexOf(path);
                if (idx >= 0) { fmSelectedFiles.splice(idx, 1); el.classList.remove('fm-selected'); el.style.background = 'none'; }
                else { fmSelectedFiles.push(path); el.classList.add('fm-selected'); el.style.background = 'rgba(60,120,200,0.15)'; }
            } else {
                var rows = document.querySelectorAll('.fm-row');
                for (var i = 0; i < rows.length; i++) { rows[i].style.background = 'none'; rows[i].classList.remove('fm-selected'); }
                fmSelectedFiles = [path];
                el.classList.add('fm-selected');
                el.style.background = 'rgba(60,120,200,0.15)';
            }
            fmSelectedPath = path;
            fmUpdateBatchBtn();
        }

        function fmFileIcon(ext) {
            var m = {
                jpg: '🖼', jpeg: '🖼', png: '🖼', gif: '🖼', webp: '🖼', bmp: '🖼', svg: '🖼',
                mp4: '🎬', mkv: '🎬', avi: '🎬', mov: '🎬', webm: '🎬',
                mp3: '🎵', wav: '🎵', ogg: '🎵', flac: '🎵', aac: '🎵',
                pdf: '📕', doc: '📘', docx: '📘', xls: '📗', xlsx: '📗', ppt: '📙', pptx: '📙',
                txt: '📝', log: '📝', md: '📝', csv: '📝', json: '📝', xml: '📝', html: '🌐',
                zip: '📦', rar: '📦', '7z': '📦', tar: '📦', gz: '📦',
                apk: '📱', exe: '⚙️', sh: '⚙️', bat: '⚙️', py: '🐍', js: '💛', kt: '🟣', java: '☕'
            };
            return m[ext] || '📄';
        }

        function fmFormatSize(bytes) {
            if (bytes === 0) return '0 B';
            var units = ['B', 'KB', 'MB', 'GB', 'TB'];
            var i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
        }

        function fmStatus(msg) {
            var el = document.getElementById('fmStatusBar');
            if (el) el.textContent = msg;
        }

        function fmGoUp() {
            if (!fmCurrentPath) return;
            var parts = fmCurrentPath.split('/');
            if (parts.length > 2) {
                parts.pop();
                fmNavigate(parts.join('/'));
            }
        }

        function fmRefresh() { fmNavigate(fmCurrentPath); }

        function fmToggleHidden() {
            fmShowHidden = !fmShowHidden;
            var btn = document.getElementById('fmHiddenBtn');
            if (btn) btn.style.color = fmShowHidden ? '#0f0' : '#888';
            fmRefresh();
        }

        function fmPromptMkdir() {
            var name = prompt('新文件夹名称:');
            if (!name) return;
            var path = fmCurrentPath + '/' + name;
            fetch(getInputApiBase() + '/files/mkdir', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path })
            }).then(function (r) { return r.json() }).then(function (d) {
                if (d.ok) { fmStatus('已创建: ' + name); fmRefresh(); }
                else fmStatus('创建失败: ' + (d.error || ''));
            }).catch(function (e) { fmStatus('错误: ' + e.message); });
        }

        function fmConfirmDelete(path, name) {
            if (!confirm('确定删除 "' + name + '"？此操作不可撤销。')) return;
            fetch(getInputApiBase() + '/files/delete', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path })
            }).then(function (r) { return r.json() }).then(function (d) {
                if (d.ok) { fmStatus('已删除: ' + name); fmRefresh(); }
                else fmStatus('删除失败: ' + (d.error || ''));
            }).catch(function (e) { fmStatus('错误: ' + e.message); });
        }

        function fmPromptRename(path, oldName) {
            var newName = prompt('重命名为:', oldName);
            if (!newName || newName === oldName) return;
            fetch(getInputApiBase() + '/files/rename', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: path, newName: newName })
            }).then(function (r) { return r.json() }).then(function (d) {
                if (d.ok) { fmStatus('已重命名: ' + oldName + ' → ' + newName); fmRefresh(); }
                else fmStatus('重命名失败: ' + (d.error || ''));
            }).catch(function (e) { fmStatus('错误: ' + e.message); });
        }

        function fmCopy(path) {
            fmClipboard = { action: 'copy', path: path };
            fmStatus('已复制路径 (按粘贴到当前目录)');
            fmAddPasteBtn();
        }

        function fmCut(path) {
            fmClipboard = { action: 'cut', path: path };
            fmStatus('已剪切路径 (按粘贴到当前目录)');
            fmAddPasteBtn();
        }

        function fmAddPasteBtn() {
            if (document.getElementById('fmPasteBtn')) return;
            var toolbar = document.getElementById('fmToolbar');
            if (!toolbar) return;
            var btn = document.createElement('button');
            btn.id = 'fmPasteBtn';
            btn.textContent = '📌 粘贴到此';
            btn.style.cssText = 'background:#4a4;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;';
            btn.onclick = fmPaste;
            toolbar.appendChild(btn);
        }

        function fmPaste() {
            if (!fmClipboard) return;
            var endpoint = fmClipboard.action === 'cut' ? '/files/move' : '/files/copy';
            fetch(getInputApiBase() + endpoint, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ src: fmClipboard.path, dest: fmCurrentPath })
            }).then(function (r) { return r.json() }).then(function (d) {
                if (d.ok) {
                    fmStatus((fmClipboard.action === 'cut' ? '已移动' : '已复制') + ' → ' + fmCurrentPath);
                    fmClipboard = null;
                    var pb = document.getElementById('fmPasteBtn');
                    if (pb) pb.remove();
                    fmRefresh();
                } else fmStatus('操作失败: ' + (d.error || ''));
            }).catch(function (e) { fmStatus('错误: ' + e.message); });
        }

        function fmDownload(path, name) {
            fmStatus('下载中: ' + name);
            fetch(getInputApiBase() + '/files/download?path=' + encodeURIComponent(path))
                .then(function (r) { return r.json() }).then(function (d) {
                    if (!d.ok) { fmStatus('下载失败: ' + (d.error || '')); return; }
                    var byteChars = atob(d.data);
                    var byteNums = new Array(byteChars.length);
                    for (var i = 0; i < byteChars.length; i++) byteNums[i] = byteChars.charCodeAt(i);
                    var blob = new Blob([new Uint8Array(byteNums)], { type: d.mime || 'application/octet-stream' });
                    var a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = d.name || name;
                    a.click();
                    URL.revokeObjectURL(a.href);
                    fmStatus('已下载: ' + name + ' (' + fmFormatSize(d.size) + ')');
                }).catch(function (e) { fmStatus('下载错误: ' + e.message); });
        }

        function fmUploadFile() {
            document.getElementById('fmUploadInput').click();
        }

        function fmHandleUpload(input) {
            if (!input.files || input.files.length === 0) return;
            var total = input.files.length;
            var done = 0;
            for (var i = 0; i < total; i++) {
                (function (file) {
                    var reader = new FileReader();
                    reader.onload = function (e) {
                        var b64 = e.target.result.split(',')[1];
                        var destPath = fmCurrentPath + '/' + file.name;
                        fetch(getInputApiBase() + '/files/upload', {
                            method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ path: destPath, data: b64 })
                        }).then(function (r) { return r.json() }).then(function (d) {
                            done++;
                            fmStatus('上传 ' + done + '/' + total + ': ' + file.name + (d.ok ? ' ✓' : ' ✗'));
                            if (done === total) fmRefresh();
                        }).catch(function () { done++; if (done === total) fmRefresh(); });
                    };
                    reader.readAsDataURL(file);
                })(input.files[i]);
            }
            input.value = '';
        }

        function fmSearch() {
            var input = document.getElementById('fmSearchInput');
            var query = input ? input.value.trim() : '';
            if (!query) return;
            fmStatus('搜索: ' + query + '...');
            fetch(getInputApiBase() + '/files/search?path=' + encodeURIComponent(fmCurrentPath) + '&q=' + encodeURIComponent(query))
                .then(function (r) { return r.json() }).then(function (d) {
                    if (!d.ok) { fmStatus('搜索失败: ' + (d.error || '')); return; }
                    fmRenderFiles(d.results, d.count);
                    fmStatus('搜索 "' + query + '": ' + d.count + ' 个结果');
                    var bc = document.getElementById('fmBreadcrumb');
                    if (bc) bc.innerHTML = '<span style="color:#fa0;">🔍 搜索结果: "' + query + '"</span> <span style="cursor:pointer;color:#8af;" onclick="fmNavigate(fmCurrentPath)">← 返回</span>';
                }).catch(function (e) { fmStatus('搜索错误: ' + e.message); });
        }

        function fmPreviewFile(path, ext) {
            var previewEl = document.getElementById('fmPreview');
            if (!previewEl) return;
            var imgExts = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'bmp', 'svg'];

                j = ascii.charCodeAt(i);
                if (j >> 8) return;

            words[words["length"]] = asciiBitLength / maxWord | 0;

            for (j = 0; j < words["length"];) {

                        e = hash[4];

                    var temp2 = (rightRotate(a, 2) ^ rightRotate(a, 13) ^ rightRotate(a, 22)) + (a & hash[1] ^ a & hash[2] ^ hash[1] & hash[2]);

                    hash[4] = hash[4] + temp1 | 0;

                for (i = 0; i < 8; i++) {

                // jMuxer feed method takes { video: Uint8Array, duration: int }
                // We can't easily extract duration from just NALs without parsing,
                // but jMuxer might be able to infer or we generally pass something reasonable.
                // Actually jMuxer example: jmuxer.feed({ video: data, duration: 500 });
                // We'll pass the raw data.

                // Note: The incoming stream has NAL units.
                // Config frame (type 0) contains SPS/PPS. jMuxer needs them.
                // Key/Delta frames contain the slice.

                // Debug: Check first frame format
                if (!this.debugDataShown) {
                    this.debugDataShown = true;
                    var hex = "";
                    var len = Math.min(8, nalData.length);
                    for (var i = 0; i < len; i++) {
                        var b = nalData[i].toString(16);
                        if (b.length < 2) b = "0" + b;
                        hex += b + " ";
                    }
                    console.log("[VideoPlayer] First NAL data:", hex);
                    showToast("Rx:" + nalData.length + " Header:" + hex, 5000);
                }

                this.jmuxer.feed({
                    video: nalData
                });
            }

            stop() {
                if (this.ws) {
                    this.ws.onmessage = null;
                    this.ws.onclose = null;
                    this.ws.onerror = null;
                    try { this.ws.close(); } catch (e) { }
                    this.ws = null;
                }
                if (this.jmuxer) {
                    try { this.jmuxer.destroy(); } catch (e) { }
                    this.jmuxer = null;
                }
            }
        }

        // ===== toggleH264 (manual toggle, now mostly unused due to auto-switching) =====
        function toggleH264() {
            // This function is now deprecated since the server controls the codec.
            console.log("H264 toggle is controlled by server settings.");
        }

        // ===== Audio =====
        var audioUnlockArmed = false;
        var audioHintDiv = null;
        var audioHintHideTimeout = null;

        function ensureAudioHintDiv() {
            if (audioHintDiv) return;
            audioHintDiv = document.createElement('div');
            audioHintDiv.style.cssText = "position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 14px;border-radius:8px;z-index:10001;font-size:14px;max-width:80%;text-align:center;pointer-events:none;display:none;";
            audioHintDiv.innerText = "点击屏幕以开启音频";
            document.body.appendChild(audioHintDiv);
        }

        function showAudioHint() {
            ensureAudioHintDiv();
            try {
                audioHintDiv.innerText = isVrEnv()
                    ? "VR：请点击底部导航栏（三大金刚键区域）以开启音频"
                    : "点击屏幕以开启音频";
            } catch (e) { }
            audioHintDiv.style.display = 'block';

            try {
                if (audioHintHideTimeout) clearTimeout(audioHintHideTimeout);
                audioHintHideTimeout = setTimeout(function () {
                    hideAudioHint();
                }, 5000);
            } catch (e) { }
        }

        function hideAudioHint() {
            if (!audioHintDiv) return;
            audioHintDiv.style.display = 'none';
            try {
                if (audioHintHideTimeout) clearTimeout(audioHintHideTimeout);
                audioHintHideTimeout = null;
            } catch (e) { }
        }

        function armAudioUnlock() {
            if (audioUnlockArmed) return;
            audioUnlockArmed = true;

            var unlockOnce = function () {
                try {
                    if (audioPlayer && audioPlayer.ctx && audioPlayer.ctx.state === 'suspended') {
                        audioPlayer.ctx.resume().then(function () {
                            if (audioPlayer && audioPlayer.resetSchedule) audioPlayer.resetSchedule();
                            try {
                                if (audioPlayer && audioPlayer.lastData) {
                                    var d = audioPlayer.lastData;
                                    audioPlayer.lastData = null;
                                    audioPlayer.handleAudio(d);
                                }
                            } catch (e) { }
                            hideAudioHint();
                        }).catch(function () { });
                    }
                } catch (e) { }
            };

            document.addEventListener('pointerdown', unlockOnce, { capture: true, once: true });
            document.addEventListener('touchstart', unlockOnce, { capture: true, once: true });
            document.addEventListener('click', unlockOnce, { capture: true, once: true });
            document.addEventListener('keydown', unlockOnce, { capture: true, once: true });
        }

        function requestAutoStartAudio() {
            if (audioPlayer) return;
            try {
                console.log("Auto-starting audio...");
                toggleAudio();
            } catch (e) {
                console.warn("Auto-start audio failed:", e);
            }

            // If autoplay policy blocks audio, arm an unlock so the FIRST user gesture will resume it.
            try {
                if (audioPlayer && audioPlayer.ctx && audioPlayer.ctx.state === 'suspended') {
                    showAudioHint();
                    armAudioUnlock();
                }
            } catch (e) { }
        }

        function toggleAudio() {
            var btn = document.getElementById('audioToggle');
            if (audioPlayer) {
                audioPlayer.stop();
                audioPlayer = null;
                btn.innerText = "AUDIO: OFF";
                btn.style.backgroundColor = "#333";
            } else {
                audioPlayer = new AudioPlayer();
                audioPlayer.start();
                btn.innerText = "AUDIO: ON";
                btn.style.backgroundColor = "#e74c3c";
            }
        }

        class AudioPlayer {
            constructor() {
                this.socket = null;
                this.ctx = null;
                this.nextTime = 0;
                this.running = false;
                this.lastData = null;
                this.resumePending = false;
            }
            resetSchedule() {
                try {
                    if (this.ctx) this.nextTime = this.ctx.currentTime;
                } catch (e) { }
            }
            start() {
                this.running = true;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext({ sampleRate: 48000 });
                this.resetSchedule();

                // Best-effort: if start() was called from a user gesture, this will immediately unlock audio.
                // If it was not, most browsers will keep it suspended; we handle that via armAudioUnlock().
                try {
                    if (this.ctx.state === 'suspended') {
                        showAudioHint();
                        this.ctx.resume().catch(function () { });
                    }
                } catch (e) { }

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                this.socket = new WebSocket(protocol + '//' + window.location.host + '/stream/audio');
                this.socket.binaryType = 'arraybuffer';

                this.socket.onmessage = (e) => {
                    if (!this.running) return;
                    this.handleAudio(e.data);
                };
                this.socket.onopen = () => console.log("Audio Connected");
                this.socket.onclose = () => console.log("Audio Disconnected");
            }
            stop() {
                this.running = false;
                if (this.socket) this.socket.close();
                if (this.ctx) this.ctx.close();
                hideAudioHint();
            }
            handleAudio(data) {
                // If audio is blocked (autoplay policy / VR), keep ONLY the latest chunk
                // and try to resume. Do NOT queue old audio.
                if (this.ctx.state !== 'running') {
                    this.lastData = data;
                    showAudioHint();
                    if (!this.resumePending) {
                        this.resumePending = true;
                        try {
                            this.ctx.resume().then(() => {
                                this.resumePending = false;
                                this.resetSchedule();
                                hideAudioHint();
                                if (this.lastData && this.ctx.state === 'running') {
                                    const d = this.lastData;
                                    this.lastData = null;
                                    this.handleAudio(d);
                                }
                            }).catch(() => {
                                this.resumePending = false;
                            });
                        } catch (e) {
                            this.resumePending = false;
                        }
                    }
                    return;
                }

                hideAudioHint();

                // Live sync: prevent building up latency
                if (this.nextTime - this.ctx.currentTime > 0.3) this.resetSchedule();

                const int16 = new Int16Array(data);
                const float32 = new Float32Array(int16.length);
                for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768.0;

                const left = new Float32Array(float32.length / 2);
                const right = new Float32Array(float32.length / 2);
                for (let i = 0; i < left.length; i++) {
                    left[i] = float32[2 * i];
                    right[i] = float32[2 * i + 1];
                }

                const buffer = this.ctx.createBuffer(2, left.length, 48000);
                buffer.copyToChannel(left, 0);
                buffer.copyToChannel(right, 1);

                const source = this.ctx.createBufferSource();
                source.buffer = buffer;
                source.connect(this.ctx.destination);

                if (this.nextTime < this.ctx.currentTime) this.nextTime = this.ctx.currentTime;
                source.start(this.nextTime);
                this.nextTime += buffer.duration;
            }
        }
    </script>
</body>
