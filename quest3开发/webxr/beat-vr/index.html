<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat VR — Quest 3 Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0012; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
    canvas { display: block; }
    #hud { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 10; pointer-events: none; }
    #score { font-size: 48px; font-weight: 900; text-shadow: 0 0 20px rgba(100,200,255,0.5); }
    #combo { font-size: 20px; color: #ff6b9d; margin-top: 4px; }
    #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10; }
    #controls button { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; backdrop-filter: blur(8px); }
    #controls button:hover { background: rgba(255,255,255,0.25); }
    #controls button.active { background: rgba(255,50,150,0.4); border-color: #ff3296; }
    #vr-btn { position: fixed; bottom: 20px; right: 20px; z-index: 20; }
  </style>
</head>
<body>
  <div id="hud">
    <div id="score">0</div>
    <div id="combo"></div>
  </div>
  <div id="controls">
    <button class="active" onclick="setSpeed('normal')">🎵 Normal</button>
    <button onclick="setSpeed('fast')">⚡ Fast</button>
    <button onclick="setSpeed('insane')">🔥 Insane</button>
    <button onclick="resetGame()">🔄 Reset</button>
  </div>
  <div id="vr-btn"></div>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.165.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    let scene, camera, renderer;
    let blocks = [], slicedBlocks = [];
    let score = 0, combo = 0, maxCombo = 0;
    let spawnTimer = 0, spawnInterval = 0.8;
    let speed = 8;
    const LANE_W = 0.8, LANES = 4, ROWS = 3;
    const COLORS = [0xff1744, 0x2979ff, 0x00e676, 0xffea00, 0xff9100, 0xd500f9];
    const clock = new THREE.Clock();

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a0012);
      scene.fog = new THREE.FogExp2(0x0a0012, 0.03);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 1.6, 2);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.xr.enabled = true;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      document.body.appendChild(renderer.domElement);

      document.getElementById('vr-btn').appendChild(VRButton.createButton(renderer));

      // Tunnel / track
      const tunnelGeo = new THREE.CylinderGeometry(4, 4, 60, 8, 1, true);
      const tunnelMat = new THREE.MeshBasicMaterial({
        color: 0x1a0033,
        side: THREE.BackSide,
        wireframe: true,
        transparent: true,
        opacity: 0.3
      });
      const tunnel = new THREE.Mesh(tunnelGeo, tunnelMat);
      tunnel.rotation.x = Math.PI / 2;
      tunnel.position.z = -25;
      scene.add(tunnel);

      // Track floor (neon grid)
      const gridHelper = new THREE.GridHelper(LANES * LANE_W * 2, LANES * 4, 0x4400aa, 0x220055);
      gridHelper.position.y = -0.5;
      scene.add(gridHelper);

      // Side rails
      const railMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.6 });
      [-1, 1].forEach(side => {
        const rail = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 50), railMat);
        rail.position.set(side * (LANES * LANE_W / 2 + 0.1), 0.5, -20);
        scene.add(rail);
      });

      // Sabers (visual only in flat mode, VR uses controllers)
      const saberColors = [0xff1744, 0x2979ff];
      [-0.3, 0.3].forEach((x, i) => {
        const group = new THREE.Group();
        // Handle
        const handle = new THREE.Mesh(
          new THREE.CylinderGeometry(0.02, 0.025, 0.2, 8),
          new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.9, roughness: 0.1 })
        );
        group.add(handle);
        // Blade
        const blade = new THREE.Mesh(
          new THREE.CylinderGeometry(0.015, 0.015, 0.8, 8),
          new THREE.MeshBasicMaterial({ color: saberColors[i], transparent: true, opacity: 0.8 })
        );
        blade.position.y = 0.5;
        group.add(blade);
        // Glow
        const glow = new THREE.PointLight(saberColors[i], 1, 2);
        glow.position.y = 0.5;
        group.add(glow);

        group.position.set(x, 1.0, 1.5);
        group.rotation.x = -0.3;
        group.name = `saber-${i}`;
        scene.add(group);
      });

      // Lighting
      scene.add(new THREE.AmbientLight(0x221133, 0.5));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
      dirLight.position.set(0, 5, 5);
      scene.add(dirLight);

      // Moving neon lights along track
      for (let i = 0; i < 10; i++) {
        const light = new THREE.PointLight(COLORS[i % COLORS.length], 0.5, 5);
        light.position.set((Math.random() - 0.5) * 6, 2 + Math.random() * 2, -i * 5);
        light.name = 'trackLight';
        scene.add(light);
      }

      window.addEventListener('resize', onResize);
      renderer.setAnimationLoop(animate);
    }

    function spawnBlock() {
      const lane = Math.floor(Math.random() * LANES) - LANES / 2 + 0.5;
      const row = Math.floor(Math.random() * ROWS);
      const colorIdx = Math.floor(Math.random() * COLORS.length);

      const group = new THREE.Group();

      // Main block
      const geo = new THREE.BoxGeometry(LANE_W * 0.7, LANE_W * 0.7, LANE_W * 0.3);
      const mat = new THREE.MeshStandardMaterial({
        color: COLORS[colorIdx],
        emissive: COLORS[colorIdx],
        emissiveIntensity: 0.3,
        metalness: 0.5,
        roughness: 0.3
      });
      const mesh = new THREE.Mesh(geo, mat);
      group.add(mesh);

      // Direction arrow
      const arrowGeo = new THREE.ConeGeometry(0.1, 0.2, 3);
      const arrowMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
      const arrow = new THREE.Mesh(arrowGeo, arrowMat);
      arrow.position.z = 0.16;
      arrow.rotation.x = Math.PI / 2;
      const dir = Math.floor(Math.random() * 4);
      arrow.rotation.z = dir * Math.PI / 2;
      group.add(arrow);

      // Glow
      const glow = new THREE.PointLight(COLORS[colorIdx], 0.8, 3);
      group.add(glow);

      group.position.set(lane * LANE_W, row * LANE_W + 0.5, -40);
      group.userData = { speed: speed, alive: true };
      scene.add(group);
      blocks.push(group);
    }

    function animate() {
      const dt = clock.getDelta();
      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer = 0;
        spawnBlock();
        // Random double blocks
        if (Math.random() > 0.6) setTimeout(spawnBlock, 100);
      }

      // Move blocks toward player
      for (let i = blocks.length - 1; i >= 0; i--) {
        const b = blocks[i];
        b.position.z += b.userData.speed * dt;
        b.rotation.z += dt * 0.5;

        // Auto-slice when close (simulate controller hit)
        if (b.position.z > 1.5 && b.userData.alive) {
          b.userData.alive = false;
          score += 100 + combo * 10;
          combo++;
          maxCombo = Math.max(maxCombo, combo);
          updateHUD();
          explodeBlock(b);
        }

        // Remove if past player
        if (b.position.z > 5) {
          if (b.userData.alive) {
            combo = 0;
            updateHUD();
          }
          scene.remove(b);
          blocks.splice(i, 1);
        }
      }

      // Animate sliced block particles
      for (let i = slicedBlocks.length - 1; i >= 0; i--) {
        const p = slicedBlocks[i];
        p.position.add(p.userData.velocity);
        p.userData.velocity.y -= 0.005;
        p.material.opacity -= 0.02;
        p.scale.multiplyScalar(0.98);
        if (p.material.opacity <= 0) {
          scene.remove(p);
          slicedBlocks.splice(i, 1);
        }
      }

      // Animate sabers
      const t = performance.now() * 0.001;
      const saber0 = scene.getObjectByName('saber-0');
      const saber1 = scene.getObjectByName('saber-1');
      if (saber0) {
        saber0.rotation.z = Math.sin(t * 2) * 0.15;
        saber0.position.y = 1.0 + Math.sin(t * 1.5) * 0.05;
      }
      if (saber1) {
        saber1.rotation.z = -Math.sin(t * 2 + 1) * 0.15;
        saber1.position.y = 1.0 + Math.sin(t * 1.5 + 1) * 0.05;
      }

      // Track lights pulse
      scene.traverse(obj => {
        if (obj.name === 'trackLight') {
          obj.intensity = 0.3 + Math.sin(t * 3 + obj.position.z) * 0.3;
        }
      });

      renderer.render(scene, camera);
    }

    function explodeBlock(block) {
      const color = block.children[0].material.color.clone();
      for (let i = 0; i < 6; i++) {
        const geo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
        const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const piece = new THREE.Mesh(geo, mat);
        piece.position.copy(block.position);
        piece.userData.velocity = new THREE.Vector3(
          (Math.random() - 0.5) * 0.15,
          Math.random() * 0.1 + 0.05,
          Math.random() * 0.1
        );
        scene.add(piece);
        slicedBlocks.push(piece);
      }
      scene.remove(block);
    }

    function updateHUD() {
      document.getElementById('score').textContent = score;
      document.getElementById('combo').textContent = combo > 1 ? `🔥 ${combo}x COMBO` : '';
    }

    window.setSpeed = function(mode) {
      document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      if (mode === 'normal') { speed = 8; spawnInterval = 0.8; }
      else if (mode === 'fast') { speed = 14; spawnInterval = 0.5; }
      else { speed = 22; spawnInterval = 0.3; }
    };

    window.resetGame = function() {
      score = 0; combo = 0; maxCombo = 0;
      blocks.forEach(b => scene.remove(b));
      blocks = [];
      slicedBlocks.forEach(p => scene.remove(p));
      slicedBlocks = [];
      updateHUD();
    };

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
  </script>
</body>
</html>
