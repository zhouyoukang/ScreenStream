<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3 AR Placement</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; }
        canvas { display: block; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            z-index: 10;
        }
        h1 { font-size: 2em; margin-bottom: 0.3em; }
        .sub { color: #94a3b8; margin-bottom: 1.5em; text-align: center; line-height: 1.6; }
        #enter-btn {
            padding: 16px 48px; font-size: 18px; border: none; border-radius: 12px; cursor: pointer;
            background: linear-gradient(135deg, #06b6d4, #8b5cf6); color: white;
        }
        #enter-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        #status { margin-top: 12px; font-size: 14px; color: #94a3b8; }
        .tag { display: inline-block; padding: 2px 10px; border-radius: 8px; font-size: 12px; margin: 2px; }
        .tag-ar { background: #06b6d4; color: white; }
        .tag-feat { background: #8b5cf6; color: white; }
        #info {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 12px;
            font-size: 14px; color: #e2e8f0; z-index: 5; display: none; text-align: center;
        }
    </style>
</head>
<body>
    <div id="overlay">
        <h1>🎯 AR Placement</h1>
        <div>
            <span class="tag tag-ar">AR</span>
            <span class="tag tag-feat">Hit Test</span>
            <span class="tag tag-feat">Plane Detection</span>
            <span class="tag tag-feat">Anchors</span>
        </div>
        <p class="sub">
            混合现实物体放置——检测真实平面，<br>
            点击放置3D物体，锚定到真实世界。<br>
            基于 Meta RATK + W3C WebXR Samples 模式。
        </p>
        <button id="enter-btn" disabled>检测中...</button>
        <div id="status"></div>
    </div>
    <div id="info">👆 点击/捏合放置物体 | ✊ 握拳清除所有</div>

    <!-- Three.js CDN (same version as IWER uses) -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        // === Pattern from: RATK example + immersive-web-samples/plane-detection.html ===
        import * as THREE from 'three';

        const overlay = document.getElementById('overlay');
        const enterBtn = document.getElementById('enter-btn');
        const statusEl = document.getElementById('status');
        const infoEl = document.getElementById('info');

        let renderer, scene, camera;
        let xrSession = null;
        let xrRefSpace = null;
        let hitTestSource = null;
        let reticle = null;
        let placedObjects = [];
        let detectedPlanes = new Map();

        // Geometries for placed objects (random selection)
        const geometries = [
            new THREE.BoxGeometry(0.1, 0.1, 0.1),
            new THREE.SphereGeometry(0.06, 16, 16),
            new THREE.ConeGeometry(0.06, 0.12, 8),
            new THREE.TorusGeometry(0.05, 0.02, 8, 16),
            new THREE.CylinderGeometry(0.04, 0.04, 0.1, 8),
            new THREE.DodecahedronGeometry(0.06),
        ];

        // === Init Scene (pattern from RATK example) ===
        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);
            camera.position.set(0, 1.6, 3);

            // Lighting (from RATK example)
            scene.add(new THREE.HemisphereLight(0x606060, 0x404040));
            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(1, 3, 1);
            light.castShadow = true;
            light.shadow.mapSize.set(1024, 1024);
            scene.add(light);

            // Renderer
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true;
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Reticle (from immersive-web-samples/hit-test-anchors.html)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.8 })
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add(reticle);

            // Add inner dot to reticle
            const dot = new THREE.Mesh(
                new THREE.CircleGeometry(0.02, 16).rotateX(-Math.PI / 2),
                new THREE.MeshBasicMaterial({ color: 0x00ff88 })
            );
            reticle.add(dot);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            // Start inline render
            renderer.setAnimationLoop(render);
        }

        // === Check XR Support ===
        async function checkXR() {
            if (!navigator.xr) {
                statusEl.textContent = 'WebXR不可用';
                return;
            }
            const arOk = await navigator.xr.isSessionSupported('immersive-ar');
            if (arOk) {
                enterBtn.disabled = false;
                enterBtn.textContent = '进入AR放置模式';
                statusEl.textContent = 'AR就绪 ✓';
            } else {
                statusEl.textContent = 'AR不可用';
            }
        }

        // === Enter AR Session (pattern from RATK ARButton) ===
        enterBtn.addEventListener('click', async () => {
            if (xrSession) return;
            try {
                // Request session with MR features (from RATK example requiredFeatures)
                xrSession = await navigator.xr.requestSession('immersive-ar', {
                    requiredFeatures: ['hit-test', 'local-floor'],
                    optionalFeatures: ['plane-detection', 'anchors', 'mesh-detection', 'hand-tracking']
                });

                overlay.style.display = 'none';
                infoEl.style.display = 'block';

                // Setup XR rendering
                renderer.xr.setReferenceSpaceType('local-floor');
                await renderer.xr.setSession(xrSession);

                xrRefSpace = renderer.xr.getReferenceSpace();

                // Setup hit-test source from viewer space (from immersive-web-samples)
                const viewerSpace = await xrSession.requestReferenceSpace('viewer');
                hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

                // Select event = place object (from RATK handleSelectStart)
                xrSession.addEventListener('select', onSelect);
                xrSession.addEventListener('squeeze', onSqueeze);

                xrSession.addEventListener('end', () => {
                    xrSession = null;
                    hitTestSource = null;
                    overlay.style.display = 'flex';
                    infoEl.style.display = 'none';
                    // Clean up placed objects and anchors
                    placedObjects.forEach(obj => {
                        scene.remove(obj);
                        if (obj.userData.anchor) obj.userData.anchor.delete?.();
                    });
                    placedObjects = [];
                    // Clean up detected plane meshes
                    detectedPlanes.forEach(mesh => scene.remove(mesh));
                    detectedPlanes.clear();
                    reticle.visible = false;
                });

            } catch(e) {
                statusEl.textContent = '启动失败: ' + e.message;
            }
        });

        // === Place Object on Select (pattern from RATK + immersive-web-samples) ===
        function onSelect(event) {
            if (!reticle.visible) return;

            const geo = geometries[Math.floor(Math.random() * geometries.length)];
            const mat = new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                roughness: 0.4,
                metalness: 0.3
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            // Position at reticle (from immersive-web-samples onSelect pattern)
            reticle.matrix.decompose(mesh.position, mesh.quaternion, new THREE.Vector3());
            mesh.position.y += 0.05; // Lift slightly above surface

            // Add spin animation
            mesh.userData.spinSpeed = (Math.random() - 0.5) * 2;

            scene.add(mesh);
            placedObjects.push(mesh);

            // Try to create anchor (from RATK createAnchor pattern)
            if (event.frame && event.frame.createAnchor) {
                const pose = new XRRigidTransform(
                    { x: mesh.position.x, y: mesh.position.y, z: mesh.position.z, w: 1 },
                    { x: mesh.quaternion.x, y: mesh.quaternion.y, z: mesh.quaternion.z, w: mesh.quaternion.w }
                );
                event.frame.createAnchor(pose, xrRefSpace).then(anchor => {
                    mesh.userData.anchor = anchor;
                }).catch(() => {});
            }
        }

        // === Clear All on Squeeze (pattern from RATK handleSqueezeStart) ===
        function onSqueeze() {
            placedObjects.forEach(obj => {
                scene.remove(obj);
                if (obj.userData.anchor) {
                    obj.userData.anchor.delete();
                }
            });
            placedObjects = [];
        }

        // === Render Loop ===
        function render(time, frame) {
            // Update hit-test reticle (from immersive-web-samples onXRFrame pattern)
            if (frame && hitTestSource) {
                const results = frame.getHitTestResults(hitTestSource);
                if (results.length > 0) {
                    const pose = results[0].getPose(xrRefSpace);
                    if (pose) {
                        reticle.visible = true;
                        reticle.matrix.fromArray(pose.transform.matrix);
                    }
                } else {
                    reticle.visible = false;
                }
            }

            // Update plane visualization (from RATK handlePlaneAdded pattern)
            if (frame && frame.detectedPlanes) {
                for (const plane of frame.detectedPlanes) {
                    if (!detectedPlanes.has(plane)) {
                        const planePose = frame.getPose(plane.planeSpace, xrRefSpace);
                        if (planePose) {
                            const polygon = plane.polygon;
                            if (polygon.length >= 3) {
                                const shape = new THREE.Shape();
                                shape.moveTo(polygon[0].x, polygon[0].z);
                                for (let i = 1; i < polygon.length; i++) {
                                    shape.lineTo(polygon[i].x, polygon[i].z);
                                }
                                const planeGeo = new THREE.ShapeGeometry(shape);
                                planeGeo.rotateX(-Math.PI / 2);
                                const planeMat = new THREE.MeshBasicMaterial({
                                    color: Math.random() * 0xffffff,
                                    transparent: true,
                                    opacity: 0.15,
                                    wireframe: true
                                });
                                const planeMesh = new THREE.Mesh(planeGeo, planeMat);
                                planeMesh.matrixAutoUpdate = false;
                                planeMesh.matrix.fromArray(planePose.transform.matrix);
                                scene.add(planeMesh);
                                detectedPlanes.set(plane, planeMesh);
                            }
                        }
                    }
                }
            }

            // Animate placed objects
            const t = time * 0.001;
            placedObjects.forEach(obj => {
                obj.rotation.y += (obj.userData.spinSpeed || 0) * 0.02;
            });

            renderer.render(scene, camera);
        }

        // === Bootstrap ===
        init();
        checkXR();
    </script>
</body>
</html>
