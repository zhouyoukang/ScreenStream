<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depth Lab — Quest 3 Simulator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000a14; color: #fff; font-family: system-ui, sans-serif; overflow: hidden; }
    canvas { display: block; }
    #info { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; font-size: 22px; opacity: 0.85; pointer-events: none; z-index: 10; }
    #info small { display: block; font-size: 13px; color: #8cf; margin-top: 4px; }
    #controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
    #controls button { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer; backdrop-filter: blur(8px); }
    #controls button:hover { background: rgba(255,255,255,0.25); }
    #controls button.active { background: rgba(0,200,150,0.4); border-color: #0f8; }
    #stats { position: fixed; top: 20px; right: 20px; font-size: 12px; color: #8cf; z-index: 10; text-align: right; line-height: 1.8; }
    #vr-btn { position: fixed; bottom: 20px; right: 20px; z-index: 20; }
  </style>
</head>
<body>
  <div id="info">
    🔬 Depth Lab — Real-time Depth Sensing
    <small>Quest 3 depth-sensing · plane-detection · mesh-detection visualization</small>
  </div>
  <div id="stats">
    <div>Planes: <span id="statPlanes">0</span></div>
    <div>Meshes: <span id="statMeshes">0</span></div>
    <div>Depth Res: <span id="statDepth">—</span></div>
    <div>Confidence: <span id="statConf">—</span></div>
  </div>
  <div id="controls">
    <button class="active" onclick="setViz('depth')">🌊 Depth Map</button>
    <button onclick="setViz('normals')">🧭 Normals</button>
    <button onclick="setViz('wireframe')">🔲 Wireframe</button>
    <button onclick="setViz('points')">⚫ Point Cloud</button>
    <button onclick="togglePlanes()">📐 Planes</button>
  </div>
  <div id="vr-btn"></div>

  <script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.165.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/" } }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    let scene, camera, renderer;
    let depthMesh, normalsMesh, wireframeMesh, pointCloud;
    let planes = [], showPlanes = true;
    let currentViz = 'depth';
    const clock = new THREE.Clock();

    // Simulated depth data (Quest 3 would provide real data)
    const DEPTH_W = 64, DEPTH_H = 48;

    function generateDepthData(t) {
      const data = new Float32Array(DEPTH_W * DEPTH_H);
      for (let y = 0; y < DEPTH_H; y++) {
        for (let x = 0; x < DEPTH_W; x++) {
          const u = x / DEPTH_W, v = y / DEPTH_H;
          // Simulate room with walls and objects
          let d = 3.0; // base distance
          // Back wall
          d = Math.min(d, 2.5 + Math.sin(u * Math.PI) * 0.3);
          // Floor slope
          if (v > 0.6) d = Math.min(d, 1.5 / (v - 0.3));
          // Moving object
          const ox = 0.5 + Math.sin(t * 0.5) * 0.3;
          const oy = 0.4 + Math.cos(t * 0.7) * 0.1;
          const dist = Math.sqrt((u - ox) ** 2 + (v - oy) ** 2);
          if (dist < 0.15) d = Math.min(d, 0.8 + dist * 2);
          // Table
          if (u > 0.2 && u < 0.8 && v > 0.5 && v < 0.65) d = Math.min(d, 1.2);
          // Add noise
          d += (Math.random() - 0.5) * 0.05;
          data[y * DEPTH_W + x] = Math.max(0.1, Math.min(5.0, d));
        }
      }
      return data;
    }

    function init() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000a14);

      camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 1.6, 3);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.xr.enabled = true;
      document.body.appendChild(renderer.domElement);

      document.getElementById('vr-btn').appendChild(VRButton.createButton(renderer));

      // Depth visualization mesh
      const depthGeo = new THREE.PlaneGeometry(4, 3, DEPTH_W - 1, DEPTH_H - 1);
      const depthMat = new THREE.ShaderMaterial({
        uniforms: {
          depthTex: { value: null },
          time: { value: 0 },
          vizMode: { value: 0 } // 0=depth, 1=normals
        },
        vertexShader: `
          attribute float depth;
          varying float vDepth;
          varying vec3 vNormal;
          varying vec3 vPosition;
          void main() {
            vDepth = depth;
            vNormal = normal;
            vPosition = position;
            vec3 pos = position;
            pos.z = -depth * 0.5;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
          }
        `,
        fragmentShader: `
          uniform float time;
          uniform int vizMode;
          varying float vDepth;
          varying vec3 vNormal;
          varying vec3 vPosition;
          
          vec3 depthColor(float d) {
            // Viridis-like colormap
            float t = clamp(d / 3.0, 0.0, 1.0);
            vec3 c0 = vec3(0.267, 0.004, 0.329);
            vec3 c1 = vec3(0.282, 0.140, 0.458);
            vec3 c2 = vec3(0.127, 0.566, 0.551);
            vec3 c3 = vec3(0.993, 0.906, 0.144);
            if (t < 0.33) return mix(c0, c1, t * 3.0);
            if (t < 0.66) return mix(c1, c2, (t - 0.33) * 3.0);
            return mix(c2, c3, (t - 0.66) * 3.0);
          }
          
          void main() {
            if (vizMode == 1) {
              // Normal visualization
              gl_FragColor = vec4(vNormal * 0.5 + 0.5, 1.0);
            } else {
              vec3 c = depthColor(vDepth);
              // Scanline effect
              float scan = sin(vPosition.y * 100.0 + time * 2.0) * 0.05 + 1.0;
              gl_FragColor = vec4(c * scan, 0.95);
            }
          }
        `,
        side: THREE.DoubleSide,
        transparent: true
      });

      depthMesh = new THREE.Mesh(depthGeo, depthMat);
      depthMesh.position.set(0, 1.5, -1);
      scene.add(depthMesh);

      // Add depth attribute
      const depthAttr = new Float32Array(depthGeo.attributes.position.count);
      depthGeo.setAttribute('depth', new THREE.BufferAttribute(depthAttr, 1));

      // Wireframe overlay
      const wireMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, wireframe: true, transparent: true, opacity: 0.4 });
      wireframeMesh = new THREE.Mesh(depthGeo.clone(), wireMat);
      wireframeMesh.position.copy(depthMesh.position);
      wireframeMesh.visible = false;
      scene.add(wireframeMesh);

      // Point cloud
      const pointsGeo = new THREE.BufferGeometry();
      const pointPositions = new Float32Array(DEPTH_W * DEPTH_H * 3);
      const pointColors = new Float32Array(DEPTH_W * DEPTH_H * 3);
      pointsGeo.setAttribute('position', new THREE.BufferAttribute(pointPositions, 3));
      pointsGeo.setAttribute('color', new THREE.BufferAttribute(pointColors, 3));
      const pointsMat = new THREE.PointsMaterial({ size: 0.03, vertexColors: true, transparent: true, opacity: 0.8 });
      pointCloud = new THREE.Points(pointsGeo, pointsMat);
      pointCloud.position.copy(depthMesh.position);
      pointCloud.visible = false;
      scene.add(pointCloud);

      // Simulated detected planes
      createPlane(new THREE.Vector3(0, 0, 0), new THREE.Vector3(4, 0, 4), 0x00ff88, 'Floor');
      createPlane(new THREE.Vector3(0, 1.5, -2), new THREE.Vector3(4, 3, 0.1), 0x4488ff, 'Back Wall');
      createPlane(new THREE.Vector3(-2, 1.5, 0), new THREE.Vector3(0.1, 3, 4), 0xff8844, 'Left Wall');
      createPlane(new THREE.Vector3(0, 0.8, -0.5), new THREE.Vector3(1.5, 0.05, 0.8), 0xffff44, 'Table');

      // Lighting
      scene.add(new THREE.AmbientLight(0x334466, 0.5));
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
      dirLight.position.set(2, 4, 3);
      scene.add(dirLight);

      // Grid
      const grid = new THREE.GridHelper(8, 16, 0x113344, 0x0a1a2a);
      scene.add(grid);

      // Axes helper
      scene.add(new THREE.AxesHelper(1));

      window.addEventListener('resize', onResize);
      renderer.setAnimationLoop(animate);
    }

    function createPlane(pos, size, color, label) {
      const geo = new THREE.BoxGeometry(size.x, size.y, size.z);
      const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.copy(pos);
      mesh.name = 'plane-' + label;

      // Wireframe border
      const edges = new THREE.EdgesGeometry(geo);
      const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color, linewidth: 2 }));
      mesh.add(line);

      scene.add(mesh);
      planes.push(mesh);
    }

    function animate() {
      const t = clock.getElapsedTime();
      const depthData = generateDepthData(t);

      // Update depth mesh vertices
      const depthAttr = depthMesh.geometry.getAttribute('depth');
      const posAttr = depthMesh.geometry.getAttribute('position');
      for (let i = 0; i < depthData.length && i < depthAttr.count; i++) {
        depthAttr.array[i] = depthData[i] || 2.0;
      }
      depthAttr.needsUpdate = true;

      // Update point cloud
      if (pointCloud.visible) {
        const pPos = pointCloud.geometry.getAttribute('position');
        const pCol = pointCloud.geometry.getAttribute('color');
        for (let y = 0; y < DEPTH_H; y++) {
          for (let x = 0; x < DEPTH_W; x++) {
            const idx = y * DEPTH_W + x;
            const d = depthData[idx];
            pPos.array[idx * 3] = (x / DEPTH_W - 0.5) * 4;
            pPos.array[idx * 3 + 1] = (0.5 - y / DEPTH_H) * 3;
            pPos.array[idx * 3 + 2] = -d * 0.5;
            // Color by depth
            const tn = d / 3.0;
            pCol.array[idx * 3] = tn < 0.5 ? 0.3 : tn;
            pCol.array[idx * 3 + 1] = 1.0 - Math.abs(tn - 0.5) * 2;
            pCol.array[idx * 3 + 2] = tn < 0.5 ? 1.0 - tn : 0.2;
          }
        }
        pPos.needsUpdate = true;
        pCol.needsUpdate = true;
      }

      // Update shader uniforms
      depthMesh.material.uniforms.time.value = t;

      // Animate planes (subtle pulse)
      planes.forEach((p, i) => {
        if (p.material) {
          p.material.opacity = 0.12 + Math.sin(t * 2 + i) * 0.05;
        }
      });

      // Update stats
      document.getElementById('statPlanes').textContent = planes.length;
      document.getElementById('statMeshes').textContent = '1';
      document.getElementById('statDepth').textContent = `${DEPTH_W}×${DEPTH_H}`;
      document.getElementById('statConf').textContent = (0.85 + Math.sin(t) * 0.1).toFixed(2);

      renderer.render(scene, camera);
    }

    window.setViz = function(mode) {
      currentViz = mode;
      document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      depthMesh.visible = mode === 'depth' || mode === 'normals';
      wireframeMesh.visible = mode === 'wireframe';
      pointCloud.visible = mode === 'points';

      if (depthMesh.material.uniforms) {
        depthMesh.material.uniforms.vizMode.value = mode === 'normals' ? 1 : 0;
      }
    };

    window.togglePlanes = function() {
      showPlanes = !showPlanes;
      planes.forEach(p => p.visible = showPlanes);
    };

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    init();
  </script>
</body>
</html>
