<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quest 3 Hand Grab Lab</title>
    <script src="/quest/libs/aframe.min.js"></script>
    <style>
        .a-enter-vr-button {
            background: linear-gradient(135deg, #22c55e, #0ea5e9) !important;
            border-radius: 12px !important;
            font-size: 16px !important;
        }
    </style>
</head>
<body>
    <a-scene
        webxr="optionalFeatures: local-floor, hand-tracking;"
        renderer="colorManagement: true; physicallyCorrectLights: true;"
        background="color: #1a1a2e"
    >
        <!-- Floor -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="8" height="8"
            material="color: #16213e; metalness: 0.1; roughness: 0.8">
        </a-plane>

        <!-- Table surface -->
        <a-box position="0 0.7 -1.5" width="2" height="0.05" depth="1"
            material="color: #2d3436; metalness: 0.3; roughness: 0.6">
        </a-box>
        <a-cylinder position="-0.8 0.35 -1.5" radius="0.05" height="0.7" color="#2d3436"></a-cylinder>
        <a-cylinder position="0.8 0.35 -1.5" radius="0.05" height="0.7" color="#2d3436"></a-cylinder>
        <a-cylinder position="-0.8 0.35 -1" radius="0.05" height="0.7" color="#2d3436"></a-cylinder>
        <a-cylinder position="0.8 0.35 -1" radius="0.05" height="0.7" color="#2d3436"></a-cylinder>

        <!-- Grabbable Objects on Table -->
        <a-box class="grabbable" position="-0.5 0.85 -1.5" width="0.12" height="0.12" depth="0.12"
            color="#e94560" material="metalness: 0.5; roughness: 0.3"
            animation="property: rotation; to: 0 360 0; dur: 6000; loop: true; easing: linear">
        </a-box>

        <a-sphere class="grabbable" position="0 0.85 -1.5" radius="0.08"
            color="#4ade80" material="metalness: 0.6; roughness: 0.2"
            animation="property: position; to: 0 0.95 -1.5; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
        </a-sphere>

        <a-cylinder class="grabbable" position="0.5 0.85 -1.5" radius="0.06" height="0.15"
            color="#38bdf8" material="metalness: 0.4; roughness: 0.4"
            animation="property: rotation; to: 360 0 360; dur: 5000; loop: true; easing: linear">
        </a-cylinder>

        <a-dodecahedron class="grabbable" position="-0.25 0.85 -1.2" radius="0.07"
            color="#f472b6" material="metalness: 0.7; roughness: 0.1"
            animation="property: rotation; to: 0 360 360; dur: 7000; loop: true; easing: linear">
        </a-dodecahedron>

        <a-torus class="grabbable" position="0.25 0.85 -1.2" radius="0.07" radius-tubular="0.02"
            color="#fbbf24" material="metalness: 0.8; roughness: 0.1"
            animation="property: rotation; to: 360 360 0; dur: 4000; loop: true; easing: linear">
        </a-torus>

        <!-- Floating Target Zones -->
        <a-ring position="-1 1.5 -2" radius-inner="0.2" radius-outer="0.25"
            color="#22c55e" opacity="0.5" side="double"
            animation="property: rotation; to: 0 360 0; dur: 8000; loop: true; easing: linear">
        </a-ring>
        <a-ring position="1 1.5 -2" radius-inner="0.2" radius-outer="0.25"
            color="#ef4444" opacity="0.5" side="double"
            animation="property: rotation; to: 0 0 360; dur: 8000; loop: true; easing: linear">
        </a-ring>

        <!-- Instructions Text -->
        <a-text
            value="Hand Grab Lab"
            position="0 2.5 -3" align="center"
            color="#ffffff" width="4"
            font="/quest/fonts/mozillavr.fnt">
        </a-text>
        <a-text
            value="捏合手指抓取物体 · 松开释放 · Quest手部追踪"
            position="0 2.2 -3" align="center"
            color="#94a3b8" width="3"
            font="/quest/fonts/mozillavr.fnt">
        </a-text>

        <!-- Lighting -->
        <a-light type="ambient" color="#404060" intensity="0.5"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.7" position="1 3 2"
            castShadow="true"></a-light>
        <a-light type="point" color="#22c55e" intensity="0.4" position="-1 1.5 -2" distance="3"></a-light>
        <a-light type="point" color="#ef4444" intensity="0.4" position="1 1.5 -2" distance="3"></a-light>
        <a-light type="point" color="#e94560" intensity="0.3" position="0 1 -1.5" distance="3"></a-light>

        <!-- Sky -->
        <a-sky color="#1a1a2e"></a-sky>

        <!-- Camera -->
        <a-entity id="rig" position="0 0 0">
            <a-camera position="0 1.6 0" look-controls="pointerLockEnabled: false">
                <a-cursor color="#ffffff" opacity="0.5" fuse="false"
                    raycaster="objects: .grabbable"></a-cursor>
            </a-camera>
        </a-entity>

        <!-- Hand Tracking with Grab Controls -->
        <a-entity hand-tracking-grab-controls="hand: left;"></a-entity>
        <a-entity hand-tracking-grab-controls="hand: right;"></a-entity>
    </a-scene>

    <script>
    // Pinch-grab component: grabs nearest .grabbable when pinch detected
    AFRAME.registerComponent('pinch-grab', {
        schema: { hand: { type: 'string', default: 'right' } },
        init() {
            this.grabbed = null;
            this.originalParent = null;
            const hand = this.el;
            hand.addEventListener('pinchstarted', () => {
                if (this.grabbed) return;
                const handPos = new THREE.Vector3();
                hand.object3D.getWorldPosition(handPos);
                let closest = null, closestDist = 0.22;
                document.querySelectorAll('.grabbable').forEach(el => {
                    const pos = new THREE.Vector3();
                    el.object3D.getWorldPosition(pos);
                    const d = handPos.distanceTo(pos);
                    if (d < closestDist) { closestDist = d; closest = el; }
                });
                if (closest) {
                    this.grabbed = closest;
                    this.originalParent = closest.parentNode;
                    closest.pauseAnimations && closest.pauseAnimations();
                    closest.setAttribute('animation', 'enabled', false);
                    hand.object3D.attach(closest.object3D);
                    closest.setAttribute('material', 'emissive', closest.getAttribute('color') || '#fff');
                    closest.setAttribute('material', 'emissiveIntensity', '0.4');
                }
            });
            hand.addEventListener('pinchended', () => {
                if (!this.grabbed) return;
                const obj = this.grabbed;
                const scene = this.el.sceneEl.object3D;
                scene.attach(obj.object3D);
                obj.setAttribute('material', 'emissiveIntensity', '0.6');
                setTimeout(() => obj.setAttribute('material', 'emissiveIntensity', '0'), 300);
                obj.setAttribute('animation', 'enabled', true);
                this.grabbed = null;
            });
        }
    });

    document.querySelector('a-scene').addEventListener('loaded', () => {
        document.querySelectorAll('[hand-tracking-grab-controls]').forEach(el => {
            const hand = el.getAttribute('hand-tracking-grab-controls').hand;
            el.setAttribute('pinch-grab', { hand: hand });
        });
    });
    </script>
</body>
</html>
