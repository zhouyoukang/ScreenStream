# Redis Caching Layer - Cycle #5 Round #11
redis:
  host: localhost
  port: 6379
  db: 0
  password: null
  
  # Caching strategy
  cache:
    enabled: true
    ttl: 300  # 5 minutes
    
    # Cache keys
    cached_data:
      - states
      - attributes
      - services
      - device_registry
  
  # Session storage
  sessions:
    use_redis: true
    ttl: 3600
  
  # Rate limiting
  rate_limit:
    use_redis: true
    window: 60
  
  # Pub/Sub
  pubsub:
    enabled: true
    channels:
      - state_changed
      - event_fired
