<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>控制中心</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>�️</text></svg>">
  <style>
    :root {
      --bg: #0d0f17;
      --surface: #151823;
      --card: #1a1e2e;
      --card-hover: #222842;
      --text: #e8eaf6;
      --dim: #6b7394;
      --accent: #7c6ff7;
      --accent-glow: rgba(124, 111, 247, .25);
      --green: #2ed8a3;
      --green-glow: rgba(46, 216, 163, .2);
      --red: #ff6b6b;
      --orange: #ffb347;
      --blue: #64b5f6;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0, 0, 0, .35);
      --panel-gap: 0px
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2f45;
      border-radius: 3px
    }

    /* ===== Top Bar ===== */
    .topbar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      gap: 16px;
      border-bottom: 1px solid #1a1f30;
      flex-shrink: 0;
      background: var(--surface)
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -.5px;
      white-space: nowrap
    }

    .topbar .clock {
      font-size: 12px;
      color: var(--dim);
      font-variant-numeric: tabular-nums
    }

    .topbar .services {
      display: flex;
      gap: 12px;
      margin-left: auto;
      font-size: 11px;
      color: var(--dim)
    }

    .svc {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .svc-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .svc-dot.on {
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite
    }

    .svc-dot.off {
      background: var(--red)
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .5
      }
    }

    /* ===== Main Layout ===== */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    /* ===== Left Panel: Smart Home ===== */
    .panel-home {
      flex: 1;
      overflow-y: auto;
      min-width: 0;
      padding-bottom: 8px
    }

    .scenes {
      display: flex;
      gap: 8px;
      padding: 12px 20px 10px;
      overflow-x: auto;
      scrollbar-width: none
    }

    .scenes::-webkit-scrollbar {
      display: none
    }

    .scene-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1.5px solid #2a2f48;
      background: var(--card);
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      transition: all .25s;
      display: flex;
      align-items: center;
      gap: 6px;
      user-select: none;
      position: relative;
      overflow: hidden
    }

    .scene-btn:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateY(-1px);
      box-shadow: var(--shadow)
    }

    .scene-btn:active {
      transform: scale(.95);
      background: var(--accent);
      border-color: var(--accent)
    }

    .scene-btn.running {
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow)
    }

    .scene-btn.running::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, var(--accent-glow), transparent);
      animation: shimmer 1.5s infinite
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%)
      }

      100% {
        transform: translateX(100%)
      }
    }

    .scene-btn .icon {
      font-size: 14px
    }

    .quick-bar {
      display: flex;
      gap: 6px;
      padding: 0 20px 10px;
      flex-wrap: wrap
    }

    .quick-btn {
      padding: 6px 12px;
      border-radius: 16px;
      font-size: 11px;
      border: 1px solid #262b42;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all .2s
    }

    .quick-btn:hover {
      color: var(--text);
      border-color: var(--accent);
      transform: translateY(-1px)
    }

    .quick-btn:active {
      background: var(--accent);
      color: #fff;
      transform: scale(.96)
    }

    .quick-btn.danger {
      border-color: #3a1a1a;
      color: var(--red)
    }

    .quick-btn.danger:hover {
      border-color: var(--red)
    }

    .quick-btn.danger:active {
      background: var(--red)
    }

    .tts-bar {
      display: flex;
      gap: 8px;
      padding: 0 20px 12px;
      align-items: center
    }

    .tts-bar input {
      flex: 1;
      padding: 9px 14px;
      border-radius: 20px;
      border: 1.5px solid #262b42;
      background: var(--card);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: all .25s
    }

    .tts-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow)
    }

    .tts-bar input::placeholder {
      color: var(--dim)
    }

    .tts-bar button {
      padding: 9px 16px;
      border-radius: 20px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      font-weight: 500
    }

    .tts-bar button:hover {
      filter: brightness(1.15);
      transform: translateY(-1px)
    }

    .tts-bar button:active {
      transform: scale(.95)
    }

    .tts-bar button:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none
    }

    .section-title {
      padding: 10px 20px 4px;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: .5px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, #262b42, transparent)
    }

    .section-count {
      font-size: 10px;
      color: var(--dim);
      opacity: .6;
      font-weight: 400
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 8px;
      padding: 0 20px 10px
    }

    .device {
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: all .25s;
      position: relative;
      overflow: hidden;
      border: 1.5px solid transparent
    }

    .device:hover {
      background: var(--card-hover);
      border-color: #3a4070;
      transform: translateY(-2px);
      box-shadow: var(--shadow)
    }

    .device:active {
      transform: scale(.97)
    }

    .device.is-on {
      border-color: var(--green);
      background: linear-gradient(135deg, #162030, #1a2838);
      box-shadow: 0 0 16px var(--green-glow)
    }

    .device.is-on .dev-icon {
      filter: drop-shadow(0 0 6px var(--green-glow))
    }

    .device.loading {
      pointer-events: none;
      opacity: .7
    }

    .device.loading::after {
      content: '';
      position: absolute;
      top: 6px;
      right: 6px;
      width: 12px;
      height: 12px;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .dev-icon {
      font-size: 22px;
      margin-bottom: 4px;
      transition: all .3s
    }

    .dev-name {
      font-size: 12px;
      font-weight: 500;
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-clamp: 2
    }

    .dev-state {
      font-size: 10px;
      color: var(--dim);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 3px
    }

    .mini-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--dim);
      transition: all .3s
    }

    .device.is-on .mini-dot {
      background: var(--green);
      box-shadow: 0 0 4px var(--green)
    }

    .speakers {
      display: flex;
      gap: 8px;
      padding: 0 20px 12px;
      flex-wrap: wrap
    }

    .speaker {
      background: var(--card);
      border-radius: 12px;
      padding: 10px 14px;
      min-width: 140px;
      border: 1.5px solid transparent;
      transition: all .25s;
      cursor: default
    }

    .speaker.online {
      border-color: var(--green);
      background: linear-gradient(135deg, #162030, #1a2838)
    }

    .speaker:hover {
      background: var(--card-hover)
    }

    .sp-name {
      font-size: 12px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .sp-model {
      font-size: 10px;
      color: var(--dim);
      margin-top: 2px
    }

    .sp-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .sp-dot.on {
      background: var(--green);
      box-shadow: 0 0 5px var(--green)
    }

    .sp-dot.off {
      background: var(--dim)
    }

    .home-footer {
      padding: 8px 20px;
      text-align: center;
      font-size: 10px;
      color: var(--dim);
      opacity: .4
    }

    /* ===== Right Panel: Phone ===== */
    .panel-phone {
      width: 420px;
      flex-shrink: 0;
      border-left: 1px solid #1a1f30;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      position: relative;
      transition: width .3s, opacity .3s
    }

    .panel-phone.collapsed {
      width: 0;
      opacity: 0;
      overflow: hidden;
      border-left: none
    }

    .phone-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid #1a1f30;
      flex-shrink: 0
    }

    .phone-header span {
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px
    }

    .phone-header .phone-status {
      font-size: 10px;
      color: var(--dim)
    }

    .phone-iframe {
      flex: 1;
      border: none;
      width: 100%;
      background: #000
    }

    .phone-offline {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--dim);
      gap: 12px;
      background: var(--bg)
    }

    .phone-offline .po-icon {
      font-size: 48px;
      opacity: .4
    }

    .phone-offline .po-text {
      font-size: 13px
    }

    .phone-offline .po-hint {
      font-size: 11px;
      opacity: .5;
      text-align: center;
      line-height: 1.6;
      max-width: 240px
    }

    .phone-toggle {
      position: absolute;
      left: -32px;
      top: 50%;
      transform: translateY(-50%);
      width: 28px;
      height: 48px;
      background: var(--surface);
      border: 1px solid #1a1f30;
      border-right: none;
      border-radius: 8px 0 0 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: var(--dim);
      transition: all .2s;
      z-index: 10
    }

    .phone-toggle:hover {
      color: var(--text);
      background: var(--card)
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30, 34, 56, .92);
      backdrop-filter: blur(16px);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      transition: all .35s cubic-bezier(.4, 0, .2, 1);
      pointer-events: none;
      z-index: 200;
      box-shadow: 0 8px 32px rgba(0, 0, 0, .5);
      border: 1px solid #2a2f48;
      max-width: 90vw;
      white-space: nowrap
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0)
    }

    /* ===== Confirm Dialog ===== */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(4px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s
    }

    .confirm-overlay.show {
      opacity: 1;
      pointer-events: auto
    }

    .confirm-box {
      background: var(--surface);
      border: 1px solid #2a2f48;
      border-radius: 20px;
      padding: 24px;
      max-width: 320px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0, 0, 0, .5)
    }

    .confirm-box .cb-icon {
      font-size: 32px;
      margin-bottom: 10px
    }

    .confirm-box .cb-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px
    }

    .confirm-box .cb-desc {
      font-size: 12px;
      color: var(--dim);
      margin-bottom: 18px;
      line-height: 1.5
    }

    .confirm-box .cb-actions {
      display: flex;
      gap: 10px;
      justify-content: center
    }

    .confirm-box button {
      padding: 9px 22px;
      border-radius: 12px;
      border: none;
      font-size: 12px;
      cursor: pointer;
      font-weight: 500;
      transition: all .15s
    }

    .confirm-box .cb-cancel {
      background: #262b42;
      color: var(--text)
    }

    .confirm-box .cb-cancel:hover {
      background: #323858
    }

    .confirm-box .cb-ok {
      background: var(--red);
      color: #fff
    }

    .confirm-box .cb-ok:hover {
      filter: brightness(1.15)
    }

    /* ===== Responsive ===== */
    @media(max-width:860px) {
      .panel-phone {
        width: 0;
        opacity: 0;
        overflow: hidden;
        border-left: none
      }

      .panel-phone.expanded {
        width: 100%;
        opacity: 1;
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
        border-left: 1px solid #1a1f30
      }

      .phone-toggle {
        display: flex
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr))
      }
    }
  </style>
</head>

<body>

  <!-- Top Bar -->
  <div class="topbar">
    <h1>�️ 控制中心</h1>
    <span class="clock" id="clock"></span>
    <div class="services">
      <div class="svc"><span class="svc-dot off" id="svcGw"></span>网关</div>
      <div class="svc"><span class="svc-dot off" id="svcPhone"></span>手机</div>
      <div class="svc" id="svcDevices"></div>
    </div>
  </div>

  <!-- Main: Two Panels -->
  <div class="main">

    <!-- Left: Smart Home -->
    <div class="panel-home">
      <div class="scenes" id="scenes"></div>
      <div class="quick-bar">
        <button class="quick-btn danger" onclick="confirmAction('all_off','⚡','全部关闭','将关闭所有设备，确认执行？')">⚡ 全部关闭</button>
        <button class="quick-btn" onclick="quickAction('all_on')">💡 全部打开</button>
        <button class="quick-btn" onclick="quickAction('lights_off')">🌙 关灯</button>
        <button class="quick-btn" onclick="quickAction('lights_on')">☀️ 开灯</button>
        <button class="quick-btn" onclick="refreshAll()" id="refreshBtn">🔄 刷新</button>
      </div>
      <div class="tts-bar">
        <input id="ttsInput" placeholder="输入文字，播报到音箱..." onkeydown="if(event.key==='Enter')sendTTS()">
        <button id="ttsBtn" onclick="sendTTS()">🔊 播报</button>
      </div>
      <div class="section-title" id="sec-light" style="display:none">💡 灯光 <span class="section-count"
          id="cnt-light"></span></div>
      <div class="grid" id="grid-light"></div>
      <div class="section-title" id="sec-switch" style="display:none">🔌 开关 <span class="section-count"
          id="cnt-switch"></span></div>
      <div class="grid" id="grid-switch"></div>
      <div class="section-title" id="sec-appliance" style="display:none">🏠 家电 <span class="section-count"
          id="cnt-appliance"></span></div>
      <div class="grid" id="grid-appliance"></div>
      <div class="section-title">🔊 音箱 <span class="section-count" id="cnt-speaker"></span></div>
      <div class="speakers" id="speakers"></div>
      <div class="home-footer" id="footer"></div>
    </div>

    <!-- Right: Phone Screen -->
    <div class="panel-phone" id="phonePanel">
      <div class="phone-toggle" id="phoneToggle" onclick="togglePhone()" title="显示/隐藏手机 (P)">📱</div>
      <div class="phone-header">
        <span>📱 手机投屏</span>
        <span class="phone-status" id="phoneStatus">连接中...</span>
      </div>
      <iframe class="phone-iframe" id="phoneFrame" src="about:blank" allow="autoplay" style="display:none"></iframe>
      <div class="phone-offline" id="phoneOffline">
        <div class="po-icon">📱</div>
        <div class="po-text">手机未连接</div>
        <div class="po-hint">请在手机上启动 ScreenStream 并开始投屏</div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <div class="confirm-overlay" id="confirmOverlay" onclick="if(event.target===this)closeConfirm()">
    <div class="confirm-box">
      <div class="cb-icon" id="cfIcon"></div>
      <div class="cb-title" id="cfTitle"></div>
      <div class="cb-desc" id="cfDesc"></div>
      <div class="cb-actions">
        <button class="cb-cancel" onclick="closeConfirm()">取消</button>
        <button class="cb-ok" id="cfOk">确认</button>
      </div>
    </div>
  </div>

  <script>
    const API = location.origin;
    const PHONE_URLS = ['http://localhost:8086', 'http://192.168.10.122:8086'];
    let PHONE_URL = PHONE_URLS[0];
    const ICONS = { light: '💡', switch: '🔌', fan: '🌀', cover: '👔', climate: '🌡️', media_player: '🔊', camera: '📷', sensor: '📡' };
    const SCENE_ICONS = { home: '🏠', away: '👋', sleep: '🌙', movie: '🎬', work: '💻' };
    const SHORT = s => s.replace(/米家智能/g, '').replace(/小米/g, '').replace(/Xiaomi /g, '')
      .replace(/直流变频循环/, '').replace(/ 电池版/, '').replace(/晾芯M1智能电动/, '');

    let _toastTimer;
    function toast(msg, ms = 2200) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(_toastTimer); _toastTimer = setTimeout(() => t.classList.remove('show'), ms) }
    async function api(path, opts = {}) { try { const r = await fetch(API + path, opts); return await r.json() } catch (e) { return null } }

    // Clock
    function updateClock() { const now = new Date(); const w = '日一二三四五六'[now.getDay()]; document.getElementById('clock').textContent = `${now.getMonth() + 1}月${now.getDate()}日 周${w} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}` }
    updateClock(); setInterval(updateClock, 10000);

    // Service health
    async function checkServices() {
      // Gateway
      const gw = await api('/');
      document.getElementById('svcGw').className = 'svc-dot ' + (gw?.gateway ? 'on' : 'off');
      if (gw?.gateway) { document.getElementById('svcDevices').innerHTML = `<span class="svc-dot on"></span>${gw.total_devices || 0}台` }
      else { document.getElementById('svcDevices').innerHTML = '' }

      // Phone — try all URLs, use first that responds
      let phoneOk = false;
      for (const url of PHONE_URLS) {
        try {
          const r = await fetch(url + '/', { signal: AbortSignal.timeout(2500) });
          if (r.ok) { PHONE_URL = url; phoneOk = true; break; }
        } catch (e) { /* try next */ }
      }
      if (phoneOk) {
        document.getElementById('svcPhone').className = 'svc-dot on';
        document.getElementById('phoneStatus').textContent = '已连接';
        document.getElementById('phoneFrame').style.display = '';
        document.getElementById('phoneOffline').style.display = 'none';
        const frame = document.getElementById('phoneFrame');
        if (frame.src === 'about:blank' || !frame.src.startsWith(PHONE_URL)) frame.src = PHONE_URL;
      } else {
        document.getElementById('svcPhone').className = 'svc-dot off';
        document.getElementById('phoneStatus').textContent = '离线';
        document.getElementById('phoneFrame').style.display = 'none';
        document.getElementById('phoneOffline').style.display = '';
      }
    }

    // Phone panel toggle
    function togglePhone() {
      const p = document.getElementById('phonePanel');
      if (window.innerWidth <= 860) { p.classList.toggle('expanded') }
      else { p.classList.toggle('collapsed') }
    }

    // Confirm dialog
    function confirmAction(action, icon, title, desc) {
      document.getElementById('cfIcon').textContent = icon;
      document.getElementById('cfTitle').textContent = title;
      document.getElementById('cfDesc').textContent = desc;
      document.getElementById('confirmOverlay').classList.add('show');
      document.getElementById('cfOk').onclick = () => { closeConfirm(); quickAction(action) };
    }
    function closeConfirm() { document.getElementById('confirmOverlay').classList.remove('show') }

    // Scenes
    async function loadScenes() {
      const d = await api('/scenes/macros'); if (!d?.scenes) return;
      const box = document.getElementById('scenes'); box.innerHTML = '';
      for (const [key, v] of Object.entries(d.scenes)) {
        const btn = document.createElement('button'); btn.className = 'scene-btn';
        btn.innerHTML = `<span class="icon">${SCENE_ICONS[key] || '🎯'}</span>${v.name}`;
        btn.onclick = () => runScene(key, v.name, btn); box.appendChild(btn);
      }
    }
    async function runScene(key, name, btn) {
      btn.classList.add('running'); toast(`🎬 ${name} 执行中...`);
      await api(`/scenes/macros/${key}`, { method: 'POST' });
      setTimeout(() => { btn.classList.remove('running'); loadDevices() }, 2000);
    }

    // Devices — load from ALL backends
    async function loadDevices() {
      const d = await api('/devices'); if (!d?.devices) return;
      const grids = { light: 'grid-light', switch: 'grid-switch', appliance: 'grid-appliance' };
      const sections = { light: 'sec-light', switch: 'sec-switch', appliance: 'sec-appliance' };
      const catMap = { light: 'light', switch: 'switch', fan: 'appliance', cover: 'appliance', climate: 'appliance' };
      for (const g of Object.values(grids)) document.getElementById(g).innerHTML = '';
      const counts = { light: 0, switch: 0, appliance: 0 };
      for (const dev of d.devices) {
        const cat = catMap[dev.domain]; if (!cat) continue;
        // 状态判断: state=on/off(实际开关) vs isOnline(网络连通)
        const isOn = dev.state === 'on';
        const isOnline = dev.isOnline || dev.state === 'on' || dev.state === 'off';
        const stateText = isOn ? '已开启' : isOnline ? '已关闭' : '离线';
        const el = document.createElement('div');
        el.className = 'device' + (isOn ? ' is-on' : '');
        el.dataset.state = dev.state || 'unknown';
        el.dataset.source = dev.source || '';
        el.innerHTML = `<div class="dev-icon">${ICONS[dev.domain] || '📦'}</div><div class="dev-name">${SHORT(dev.name)}</div><div class="dev-state"><span class="mini-dot"></span>${stateText}</div>`;
        el.onclick = () => toggleDevice(dev.id, dev.name, el);
        document.getElementById(grids[cat]).appendChild(el); counts[cat]++;
      }
      for (const [cat, sec] of Object.entries(sections)) {
        document.getElementById(sec).style.display = counts[cat] > 0 ? '' : 'none';
        const c = document.getElementById('cnt-' + cat); if (c) c.textContent = counts[cat] > 0 ? counts[cat] + '个' : '';
      }
    }

    async function toggleDevice(did, name, el) {
      if (el.classList.contains('loading')) return;
      el.classList.add('loading');
      const isOn = el.classList.contains('is-on');
      const action = isOn ? 'turn_off' : 'turn_on';
      toast(`${isOn ? '⚪ 关闭' : '🟢 打开'} ${SHORT(name)}...`);
      const r = await api(`/devices/${did}/control`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ action }) });
      el.classList.remove('loading');
      if (r?.ok) {
        el.classList.toggle('is-on');
        const on = el.classList.contains('is-on');
        el.dataset.state = on ? 'on' : 'off';
        const st = el.querySelector('.dev-state');
        st.innerHTML = `<span class="mini-dot"></span>${on ? '已开启' : '已关闭'}`;
        toast(`✅ ${SHORT(name)} ${isOn ? '已关闭' : '已打开'}`);
      } else {
        const err = r?.detail?.error || r?.detail || r?.error || '失败';
        const errStr = typeof err === 'object' ? (err.error || JSON.stringify(err)) : String(err);
        if (errStr.includes('offline') || errStr.includes('-704042011')) toast(`📴 ${SHORT(name)} 离线(未通电)`);
        else toast(`❌ ${errStr}`);
      }
    }

    // Speakers
    async function loadSpeakers() {
      const d = await api('/speakers'); if (!d?.speakers) return;
      const box = document.getElementById('speakers'); box.innerHTML = ''; let on = 0;
      for (const s of d.speakers) {
        if (s.isOnline) on++; const el = document.createElement('div');
        el.className = 'speaker' + (s.isOnline ? ' online' : '');
        el.innerHTML = `<div class="sp-name"><span class="sp-dot ${s.isOnline ? 'on' : 'off'}"></span>${SHORT(s.name)}</div><div class="sp-model">${s.model.split('.').pop()}</div>`;
        box.appendChild(el);
      }
      document.getElementById('cnt-speaker').textContent = `${on}/${d.speakers.length} 在线`;
    }

    // TTS
    async function sendTTS() {
      const input = document.getElementById('ttsInput'), btn = document.getElementById('ttsBtn'), text = input.value.trim();
      if (!text) return; btn.disabled = true; btn.textContent = '⏳ 播报中...'; toast(`🔊 播报: ${text}`); input.value = '';
      const r = await api(`/tts/${encodeURIComponent(text)}`); btn.disabled = false; btn.textContent = '🔊 播报';
      if (r?.ok) toast(`✅ 已播报: ${text}`); else toast(`❌ 播报失败`);
    }

    // Quick actions
    async function quickAction(action) {
      const names = { all_off: '全部关闭', all_on: '全部打开', lights_off: '关灯', lights_on: '开灯' };
      toast(`⚡ ${names[action] || action}...`); await api(`/quick/${action}`, { method: 'POST' }); setTimeout(loadDevices, 1500);
    }

    // Manual refresh
    async function refreshAll() {
      const btn = document.getElementById('refreshBtn'); btn.disabled = true; btn.textContent = '⏳ 刷新中...';
      await Promise.all([checkServices(), loadScenes(), loadDevices(), loadSpeakers()]);
      updateFooter(); toast('✅ 已刷新'); btn.disabled = false; btn.textContent = '🔄 刷新';
    }

    // Footer
    function updateFooter() { document.getElementById('footer').textContent = `上次刷新 ${new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}` }

    // Init
    async function init() {
      await Promise.all([checkServices(), loadScenes(), loadDevices(), loadSpeakers()]);
      updateFooter();
    }
    init();
    setInterval(init, 30000);
    setInterval(checkServices, 10000);

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeConfirm();
      if (e.key === 'p' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'IFRAME') { e.preventDefault(); togglePhone() }
      if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'IFRAME') { e.preventDefault(); document.getElementById('ttsInput').focus() }
    });
  </script>
</body>

</html>
