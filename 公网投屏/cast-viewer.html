<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>远程投屏 — P2P零服务器</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e0e0e8;font-family:-apple-system,system-ui,"Microsoft YaHei",sans-serif;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none}

/* ─── 连接页 ─── */
#connect{position:fixed;inset:0;background:#0a0a0f;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;padding:20px}
#connect.off{display:none}
#connect h1{font-size:28px;font-weight:700}
#connect h1 span{color:#22c55e}
#connect .sub{color:#8888a0;font-size:16px;text-align:center;line-height:1.5}
.form{display:flex;flex-direction:column;gap:10px;width:300px}
.form input{padding:16px 20px;background:#14141f;border:2px solid #2a2a3a;border-radius:12px;color:#fff;font-size:28px;text-align:center;letter-spacing:8px;outline:none;font-family:'Courier New',monospace}
.form input:focus{border-color:#22c55e}
.form input::placeholder{font-size:16px;letter-spacing:2px;color:#555}
.form button{padding:16px;background:#22c55e;color:#fff;border:none;border-radius:12px;font-size:20px;font-weight:700;cursor:pointer;transition:all .15s}
.form button:active{transform:scale(.97)}
.form button:disabled{opacity:.4;cursor:not-allowed}
.err{color:#f87171;font-size:14px;text-align:center;min-height:22px}
.hint{color:#555;font-size:12px;text-align:center}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(34,197,94,0.1);border:1px solid #22c55e30;border-radius:16px;padding:5px 12px;font-size:12px;color:#22c55e;margin-top:6px}

/* ─── 状态栏 ─── */
#bar{height:32px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 10px;gap:10px;font-size:12px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dg{background:#4ade80;box-shadow:0 0 5px #4ade80}.dy{background:#fbbf24}.dr{background:#f87171}.dx{background:#555}
#bar .sp{flex:1}
#bar .st{color:#888}

/* ─── 视频区 ─── */
#vid{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden;touch-action:none}
#cv{max-width:100%;max-height:100%;object-fit:contain}
#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);color:#888;font-size:16px;flex-direction:column;gap:10px}
#ov.off{display:none}
.spin{width:36px;height:36px;border:3px solid #333;border-top-color:#22c55e;border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─── 控制栏 ─── */
#ctrl{height:44px;background:#111;border-top:1px solid #222;display:flex;align-items:center;justify-content:center;gap:2px;padding:0 4px;flex-shrink:0}
.cb{padding:8px 10px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#e0e0e8;font-size:15px;cursor:pointer;transition:all .1s;white-space:nowrap}
.cb:active{background:#22c55e33;border-color:#22c55e}

@media(max-width:480px){
.cb{padding:10px 8px;font-size:17px}
#bar{font-size:11px;height:28px;gap:6px}
}
</style>
</head>
<body>

<!-- 连接页 -->
<div id="connect">
<h1>📱 <span>P2P</span> 远程投屏</h1>
<p class="sub">输入房间码，直接看到手机屏幕<br>不经任何服务器，端到端加密</p>
<div class="form">
<input id="inp" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="房间码" maxlength="6" autocomplete="off">
<button id="btn" onclick="go()">连接</button>
</div>
<div class="err" id="err"></div>
<div class="hint">房间码由手机端显示</div>
<span class="badge">🔒 P2P直连 · 数据不经服务器</span>
</div>

<!-- 主界面 -->
<div id="bar">
<span class="dot dx" id="cdot"></span>
<span id="ctxt">未连接</span>
<span class="sp"></span>
<span class="st">📊 <span id="fps">0</span>fps</span>
<span class="st" id="res">-</span>
</div>

<div id="vid">
<canvas id="cv" width="360" height="640"></canvas>
<div id="ov"><div class="spin"></div><span id="ovt">等待视频流...</span></div>
</div>

<div id="ctrl">
<button class="cb" onclick="ctl('back')">◀</button>
<button class="cb" onclick="ctl('home')">●</button>
<button class="cb" onclick="ctl('recents')">▣</button>
<button class="cb" onclick="ctl('volume_up')">🔊</button>
<button class="cb" onclick="ctl('volume_down')">🔉</button>
<button class="cb" onclick="ctl('notifications')">🔔</button>
<button class="cb" onclick="ctl('power')">⏻</button>
</div>

<!-- PeerJS: China-friendly CDN with fallback -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script>if(typeof Peer==='undefined'){document.write('<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"><\/script>')}</script>

<script>
// ═══════════════════════════════════════════════════════
//  Cast Viewer — PeerJS P2P + WebCodecs
//  零服务器：信令=PeerJS Cloud, 媒体=WebRTC DataChannel
// ═══════════════════════════════════════════════════════

const ICE = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun.miwifi.com:3478' },
    { urls: 'stun:stun.chat.bilibili.com:3478' },
    { urls: 'turn:a.relay.metered.ca:80', username: 'e8dd65b92f6dfe65e84a0e73', credential: '4F5qRhMPjmG/jKXF' },
    { urls: 'turn:a.relay.metered.ca:443', username: 'e8dd65b92f6dfe65e84a0e73', credential: '4F5qRhMPjmG/jKXF' },
    { urls: 'turn:a.relay.metered.ca:443?transport=tcp', username: 'e8dd65b92f6dfe65e84a0e73', credential: '4F5qRhMPjmG/jKXF' },
];

let conn = null, decoder = null, canvas, ctx;
let fpsCount = 0, configData = null, hasConfig = false, lastCodec = null;

window.addEventListener('DOMContentLoaded', () => {
    canvas = document.getElementById('cv');
    ctx = canvas.getContext('2d');
    const inp = document.getElementById('inp');
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
    setInterval(() => { document.getElementById('fps').textContent = fpsCount; fpsCount = 0; }, 1000);
    setupTouch();

    // URL参数自动连接
    const p = new URLSearchParams(location.search);
    if (p.get('room')) {
        inp.value = p.get('room');
        go();
    }
});

// ─── 连接 ──────────────────────────────────────────
function go() {
    const room = document.getElementById('inp').value.trim();
    const err = document.getElementById('err');
    if (!room || room.length < 4) { err.textContent = '请输入房间码'; return; }

    const bridgeId = 'ss-bridge-' + room;
    err.textContent = '连接中...';
    document.getElementById('btn').disabled = true;

    const myId = 'v-' + Math.random().toString(36).substring(2, 8);
    const peer = new Peer(myId, { config: { iceServers: ICE }, debug: 0 });

    peer.on('open', () => {
        err.textContent = '信令就绪，连接桥接端...';
        conn = peer.connect(bridgeId, { reliable: true, serialization: 'binary' });

        conn.on('open', () => {
            document.getElementById('connect').classList.add('off');
            document.getElementById('cdot').className = 'dot dg';
            document.getElementById('ctxt').textContent = '已连接 (P2P)';
            initDecoder();
        });

        conn.on('data', data => handleFrame(data));

        conn.on('close', () => {
            document.getElementById('cdot').className = 'dot dr';
            document.getElementById('ctxt').textContent = '断开';
            document.getElementById('ov').classList.remove('off');
            document.getElementById('ovt').textContent = '连接断开，请刷新重试';
        });

        conn.on('error', e => {
            err.textContent = '连接失败: ' + e.message;
            document.getElementById('btn').disabled = false;
        });
    });

    peer.on('error', e => {
        if (e.type === 'peer-unavailable') err.textContent = '房间不存在，请确认手机已打开桥接';
        else err.textContent = '错误: ' + e.message;
        document.getElementById('btn').disabled = false;
    });
}

// ─── WebCodecs解码 ─────────────────────────────────
function initDecoder() {
    if (typeof VideoDecoder === 'undefined') {
        document.getElementById('ovt').textContent = '浏览器不支持WebCodecs，请用Chrome 94+/Edge';
        return;
    }
    decoder = new VideoDecoder({
        output: frame => {
            if (canvas.width !== frame.displayWidth || canvas.height !== frame.displayHeight) {
                canvas.width = frame.displayWidth;
                canvas.height = frame.displayHeight;
                document.getElementById('res').textContent = frame.displayWidth + '×' + frame.displayHeight;
            }
            ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
            frame.close();
            fpsCount++;
            document.getElementById('ov').classList.add('off');
        },
        error: () => {
            setTimeout(() => { if (decoder) { try { decoder.close(); } catch(_){} } initDecoder(); }, 2000);
        }
    });
}

function findNALUs(d) {
    const r = []; let i = 0;
    while (i < d.length - 3) {
        if (d[i] === 0 && d[i+1] === 0) {
            let sc;
            if (d[i+2] === 1) sc = 3;
            else if (d[i+2] === 0 && i+3 < d.length && d[i+3] === 1) sc = 4;
            else { i++; continue; }
            const s = i + sc; let e = d.length;
            for (let j = s + 1; j < d.length - 2; j++) {
                if (d[j]===0 && d[j+1]===0 && (d[j+2]===1 || (d[j+2]===0 && j+3<d.length && d[j+3]===1))) { e=j; break; }
            }
            r.push({ type: d[s] & 0x1F, data: d.slice(s, e), offset: i, sc });
            i = e;
        } else i++;
    }
    return r;
}

function handleFrame(raw) {
    let data;
    if (raw instanceof ArrayBuffer) data = new Uint8Array(raw);
    else if (raw.buffer) data = new Uint8Array(raw.buffer, raw.byteOffset, raw.byteLength);
    else if (typeof Buffer !== 'undefined' && Buffer.isBuffer(raw)) data = new Uint8Array(raw);
    else return;
    if (data.length < 10) return;

    const ft = data[0];

    // MJPEG mode: type=3 is raw JPEG frame
    if (ft === 3) {
        const payload = data.slice(9);
        const blob = new Blob([payload], {type: 'image/jpeg'});
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
            if (canvas.width !== img.width || canvas.height !== img.height) {
                canvas.width = img.width; canvas.height = img.height;
                document.getElementById('res').textContent = img.width + '×' + img.height;
            }
            ctx.drawImage(img, 0, 0);
            URL.revokeObjectURL(url);
            fpsCount++;
            document.getElementById('ov').classList.add('off');
        };
        img.src = url;
        return;
    }

    const payload = data.slice(9);

    if (ft === 0) {
        configData = payload;
        hasConfig = true;
        const nalus = findNALUs(payload);
        for (const n of nalus) {
            if (n.type === 7) {
                const p = n.data[1], c = n.data[2], l = n.data[3];
                const codec = 'avc1.' + [p,c,l].map(v => v.toString(16).padStart(2,'0')).join('');
                if (decoder && decoder.state !== 'closed' && codec !== lastCodec) {
                    try { decoder.configure({ codec, optimizeForLatency: true }); lastCodec = codec; } catch(e){}
                }
            }
        }
        return;
    }

    if (!hasConfig || !decoder || decoder.state !== 'configured') return;
    if (decoder.decodeQueueSize > 3 && ft === 2) return;

    try {
        let full;
        if (ft === 1 && configData) {
            full = new Uint8Array(configData.length + payload.length);
            full.set(configData, 0);
            full.set(payload, configData.length);
        } else {
            full = payload;
        }
        decoder.decode(new EncodedVideoChunk({
            type: ft === 1 ? 'key' : 'delta',
            timestamp: performance.now() * 1000,
            data: full.buffer.slice(full.byteOffset, full.byteOffset + full.byteLength)
        }));
    } catch(e) {}
}

// ─── 触控 ──────────────────────────────────────────
function setupTouch() {
    const area = document.getElementById('vid');
    let st = 0, sp = null, lt = null;

    function pos(e) {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: Math.max(0, Math.min(1, (t.clientX - r.left) / r.width)), y: Math.max(0, Math.min(1, (t.clientY - r.top) / r.height)) };
    }

    function down(e) {
        e.preventDefault(); st = Date.now(); sp = pos(e);
        lt = setTimeout(() => { send({ type:'touch', data:{ action:'longpress', ...sp } }); sp = null; }, 600);
    }
    function up(e) {
        e.preventDefault(); clearTimeout(lt);
        if (!sp) return;
        const p2 = e.changedTouches ? (() => { const r=canvas.getBoundingClientRect(); const t=e.changedTouches[0]; return {x:Math.max(0,Math.min(1,(t.clientX-r.left)/r.width)),y:Math.max(0,Math.min(1,(t.clientY-r.top)/r.height))}; })() : pos(e);
        const dt = Date.now() - st;
        const dist = Math.sqrt((p2.x-sp.x)**2 + (p2.y-sp.y)**2);
        if (dist < 0.02 && dt < 500) send({ type:'touch', data:{ action:'tap', ...p2 } });
        else if (dist >= 0.02) send({ type:'touch', data:{ action:'swipe', fromX:sp.x, fromY:sp.y, toX:p2.x, toY:p2.y, duration:Math.max(100,dt) } });
        sp = null;
    }

    area.addEventListener('mousedown', down);
    area.addEventListener('mouseup', up);
    area.addEventListener('touchstart', down, { passive: false });
    area.addEventListener('touchend', up, { passive: false });
    area.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
    area.addEventListener('wheel', e => { e.preventDefault(); const p = pos(e); send({ type:'scroll', data:{ ...p, deltaY: e.deltaY>0?300:-300 } }); }, { passive: false });
}

function send(msg) { if (conn && conn.open) conn.send(JSON.stringify(msg)); }
function ctl(a) { send({ type:'control', data:{ action:a } }); }
</script>
</body>
</html>
