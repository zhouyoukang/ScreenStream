<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>远程投屏</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📱</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e8;font-family:-apple-system,system-ui,"Microsoft YaHei",sans-serif;height:100vh;height:100dvh;overflow:hidden;display:flex;flex-direction:column;-webkit-user-select:none;user-select:none}

#gate{position:fixed;inset:0;background:#0a0a0f;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px}
#gate.off{display:none}
#gate h1{font-size:28px;font-weight:700}
#gate h1 em{color:#22c55e;font-style:normal}
#gate .sub{color:#8888a0;font-size:15px;text-align:center;line-height:1.6}
.form{display:flex;flex-direction:column;gap:10px;width:min(340px,90vw)}
.form input{padding:16px 20px;background:#14141f;border:2px solid #2a2a3a;border-radius:12px;color:#fff;font-size:32px;text-align:center;letter-spacing:10px;outline:none;font-family:'Courier New',monospace}
.form input:focus{border-color:#22c55e}
.form input::placeholder{font-size:15px;letter-spacing:2px;color:#555}
.form button{padding:16px;background:#22c55e;color:#fff;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;transition:all .15s}
.form button:active{transform:scale(.97)}
.form button:disabled{opacity:.4;cursor:not-allowed}
.err{color:#f87171;font-size:14px;text-align:center;min-height:22px}
.hint{color:#555;font-size:12px;text-align:center}

#bar{height:30px;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 10px;gap:10px;font-size:12px;flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dg{background:#4ade80;box-shadow:0 0 5px #4ade80}.dy{background:#fbbf24}.dr{background:#f87171}.dx{background:#555}
#bar .sp{flex:1}
#bar .st{color:#888}

#vid{flex:1;display:flex;align-items:center;justify-content:center;background:#000;position:relative;overflow:hidden;touch-action:none}
#cv{max-width:100%;max-height:100%;object-fit:contain}
#ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);color:#888;font-size:15px;flex-direction:column;gap:10px}
#ov.off{display:none}
.spin{width:32px;height:32px;border:3px solid #333;border-top-color:#22c55e;border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

#ctrl{height:46px;background:#111;border-top:1px solid #222;display:flex;align-items:center;justify-content:center;gap:2px;padding:0 4px;flex-shrink:0}
.cb{padding:9px 11px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#e0e0e8;font-size:16px;cursor:pointer;transition:all .1s;white-space:nowrap}
.cb:active{background:#22c55e33;border-color:#22c55e}

#txtbar{display:none;height:44px;background:#111;border-top:1px solid #222;padding:4px 10px;gap:6px;align-items:center;flex-shrink:0}
#txtbar.on{display:flex}
#txtbar input{flex:1;padding:8px 10px;background:#1a1a1a;border:1px solid #333;border-radius:6px;color:#fff;font-size:15px;outline:none}
#txtbar button{padding:8px 14px;background:#22c55e;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600}

#reconn{position:fixed;top:0;left:0;right:0;background:#ef4444;color:#fff;text-align:center;padding:8px;font-size:13px;font-weight:600;z-index:50;display:none}

@media(max-width:480px){
.cb{padding:10px 8px;font-size:18px}
#bar{font-size:11px;height:26px;gap:6px}
}
</style>
</head>
<body>

<div id="gate">
<h1>📱 <em>远程</em>投屏</h1>
<p class="sub">输入房间码，即可看到并操控手机<br>支持触控操作 · 自动重连 · 实时画面</p>
<div class="form">
<input id="inp" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="房间码" maxlength="8" autocomplete="off">
<button id="btn" onclick="go()">连接</button>
</div>
<div class="err" id="err"></div>
<div class="hint">房间码在手机投屏启动后自动显示</div>
</div>

<div id="reconn">连接断开，正在重连...</div>

<div id="bar">
<span class="dot dx" id="cdot"></span>
<span id="ctxt">未连接</span>
<span class="sp"></span>
<span class="st">📊 <span id="fps">0</span>fps</span>
<span class="st" id="res">-</span>
<span class="st">👥 <span id="vc">0</span></span>
<span class="st" id="byt">0KB</span>
</div>

<div id="vid">
<canvas id="cv" width="360" height="640"></canvas>
<div id="ov"><div class="spin"></div><span id="ovt">等待视频流...</span></div>
</div>

<div id="ctrl">
<button class="cb" onclick="ctl('back')">◀</button>
<button class="cb" onclick="ctl('home')">●</button>
<button class="cb" onclick="ctl('recents')">▣</button>
<button class="cb" onclick="ctl('volume_up')">🔊</button>
<button class="cb" onclick="ctl('volume_down')">🔉</button>
<button class="cb" onclick="ctl('notifications')">🔔</button>
<button class="cb" onclick="ctl('power')">⏻</button>
<button class="cb" onclick="toggleTxt()">⌨</button>
</div>

<div id="txtbar">
<input id="txtinp" type="text" placeholder="输入文字发送到手机..." onkeydown="if(event.key==='Enter')sendTxt()">
<button onclick="sendTxt()">发送</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  公网投屏终极观看器 v2.0
//  H264 WebCodecs + MJPEG双模 + 触控 + 控制 + 文字输入
//  架构: 浏览器 ←WSS→ aiotvr.xyz relay ←WSS→ 手机ScreenStream
// ═══════════════════════════════════════════════════════════

const TOKEN = new URLSearchParams(location.search).get('token') || 'screenstream_2026';
let ws = null, decoder = null, canvas, ctx;
let fpsCount = 0, totalBytes = 0, totalFrames = 0;
let configData = null, hasConfig = false, lastCodec = null;
let currentRoom = '', reconnAttempt = 0, decodeErrors = 0;
const MAX_RECONN = 60;

window.addEventListener('DOMContentLoaded', () => {
    canvas = document.getElementById('cv');
    ctx = canvas.getContext('2d');
    const inp = document.getElementById('inp');
    inp.focus();
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
    setInterval(() => { document.getElementById('fps').textContent = fpsCount; fpsCount = 0; }, 1000);
    setupTouch();
    setupKeys();
    // URL参数自动连接
    const p = new URLSearchParams(location.search);
    if (p.get('room')) { inp.value = p.get('room'); go(); }
});

// ─── 连接 ──────────────────────────────────────────
function go() {
    const room = document.getElementById('inp').value.trim();
    if (!room) { document.getElementById('err').textContent = '请输入房间码'; return; }
    currentRoom = room;
    document.getElementById('err').textContent = '连接中...';
    document.getElementById('btn').disabled = true;
    reconnAttempt = 0;
    connect(room);
}

function connect(room) {
    if (ws) { try { ws.close(); } catch(e){} }
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    // Always connect to /relay/ WebSocket endpoint regardless of page path
    const wsBase = `${proto}//${location.host}/relay/`;
    ws = new WebSocket(`${wsBase}?role=viewer&token=${TOKEN}&room=${room}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
        document.getElementById('gate').classList.add('off');
        document.getElementById('reconn').style.display = 'none';
        document.getElementById('cdot').className = 'dot dg';
        document.getElementById('ctxt').textContent = '已连接';
        document.getElementById('err').textContent = '';
        reconnAttempt = 0;
        hasConfig = false; configData = null; lastCodec = null; decodeErrors = 0;
        totalBytes = 0; totalFrames = 0;
        initDecoder();
    };

    ws.onmessage = ev => {
        if (ev.data instanceof ArrayBuffer) handleFrame(new Uint8Array(ev.data));
        else { try { handleMsg(JSON.parse(ev.data)); } catch(e){} }
    };

    ws.onclose = e => {
        document.getElementById('cdot').className = 'dot dr';
        document.getElementById('ctxt').textContent = '断开';
        if (decoder) { try { decoder.close(); } catch(_){} decoder = null; }
        hasConfig = false; configData = null;

        if (e.code === 4001) {
            document.getElementById('err').textContent = '认证失败';
            document.getElementById('btn').disabled = false;
            document.getElementById('gate').classList.remove('off');
            return;
        }
        // 持续重连（含房间暂不存在的重试）
        if (reconnAttempt < MAX_RECONN) scheduleReconn();
        else {
            document.getElementById('err').textContent = '长时间无法连接，请检查手机是否已开始投屏';
            document.getElementById('btn').disabled = false;
            document.getElementById('gate').classList.remove('off');
        }
    };
    ws.onerror = () => {};
}

function scheduleReconn() {
    if (!currentRoom) return;
    reconnAttempt++;
    const delay = Math.min(2000 * Math.pow(1.3, reconnAttempt - 1), 15000);
    document.getElementById('reconn').style.display = 'block';
    document.getElementById('reconn').textContent = `连接断开，${Math.round(delay/1000)}秒后重连 (${reconnAttempt}/${MAX_RECONN})...`;
    setTimeout(() => connect(currentRoom), delay);
}

function handleMsg(msg) {
    switch (msg.type) {
        case 'joined':
            document.getElementById('vc').textContent = msg.data?.viewerCount || 1;
            document.title = '远程投屏 — ' + (msg.data?.deviceInfo?.model || '手机');
            break;
        case 'viewer_joined': case 'viewer_left':
            document.getElementById('vc').textContent = msg.data?.count || 0;
            break;
        case 'device_info':
            document.title = '远程投屏 — ' + (msg.data?.model || '手机');
            break;
        case 'provider_disconnected':
            document.getElementById('ov').classList.remove('off');
            document.getElementById('ovt').textContent = '手机已断开投屏';
            document.getElementById('cdot').className = 'dot dy';
            break;
        case 'provider_reconnected':
            document.getElementById('ov').classList.add('off');
            document.getElementById('cdot').className = 'dot dg';
            break;
    }
}

// ─── WebCodecs H264 解码器 ─────────────────────────
function initDecoder() {
    if (typeof VideoDecoder === 'undefined') {
        console.warn('[Viewer] WebCodecs not supported — H264 disabled, MJPEG only');
        return;
    }
    if (decoder && decoder.state !== 'closed') { try { decoder.close(); } catch(_){} }
    decoder = new VideoDecoder({
        output: frame => {
            if (canvas.width !== frame.displayWidth || canvas.height !== frame.displayHeight) {
                canvas.width = frame.displayWidth; canvas.height = frame.displayHeight;
                document.getElementById('res').textContent = frame.displayWidth + '×' + frame.displayHeight;
            }
            ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);
            frame.close();
            fpsCount++; totalFrames++;
            decodeErrors = 0;
            document.getElementById('ov').classList.add('off');
        },
        error: e => {
            decodeErrors++;
            if (decodeErrors > 5) {
                setTimeout(() => { if (decoder) { try { decoder.close(); } catch(_){} } initDecoder(); send({type:'request_keyframe'}); }, 3000);
            }
        }
    });
}

function findSPS(d) {
    let i = 0;
    while (i < d.length - 4) {
        if (d[i]===0 && d[i+1]===0) {
            let sc;
            if (d[i+2]===1) sc=3;
            else if (d[i+2]===0 && i+3<d.length && d[i+3]===1) sc=4;
            else { i++; continue; }
            const t = d[i+sc] & 0x1F;
            if (t === 7) {
                let e = d.length;
                for (let j=i+sc+1; j<d.length-2; j++) {
                    if (d[j]===0&&d[j+1]===0&&(d[j+2]===1||(d[j+2]===0&&j+3<d.length&&d[j+3]===1))) {e=j;break;}
                }
                return d.slice(i+sc, e);
            }
            i += sc + 1;
        } else i++;
    }
    return null;
}

function handleFrame(data) {
    if (data.length < 10) return;
    const ft = data[0]; // 0=config, 1=keyframe, 2=delta, 3=JPEG
    totalBytes += data.length;
    if (totalBytes > 1048576) document.getElementById('byt').textContent = (totalBytes/1048576).toFixed(1)+'MB';
    else document.getElementById('byt').textContent = (totalBytes/1024|0)+'KB';

    // ─── MJPEG mode: type=3 is raw JPEG ───
    if (ft === 3) {
        const payload = data.slice(9);
        const blob = new Blob([payload], {type: 'image/jpeg'});
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
            if (canvas.width !== img.width || canvas.height !== img.height) {
                canvas.width = img.width; canvas.height = img.height;
                document.getElementById('res').textContent = img.width + '×' + img.height;
            }
            ctx.drawImage(img, 0, 0);
            URL.revokeObjectURL(url);
            fpsCount++; totalFrames++;
            document.getElementById('ov').classList.add('off');
        };
        img.src = url;
        return;
    }

    // ─── H264 mode ───
    const payload = data.slice(9);

    if (ft === 0) {
        configData = payload; hasConfig = true;
        const sps = findSPS(payload);
        if (sps && sps.length >= 4) {
            const codec = 'avc1.' + [sps[1],sps[2],sps[3]].map(v=>v.toString(16).padStart(2,'0')).join('');
            if (decoder && decoder.state !== 'closed' && codec !== lastCodec) {
                try { decoder.configure({ codec, optimizeForLatency: true }); lastCodec = codec; } catch(e){}
            }
        }
        return;
    }

    if (!hasConfig || !decoder || decoder.state !== 'configured') return;
    if (decoder.decodeQueueSize > 3 && ft === 2) return;

    try {
        let full;
        if (ft === 1 && configData) {
            full = new Uint8Array(configData.length + payload.length);
            full.set(configData, 0); full.set(payload, configData.length);
        } else { full = payload; }
        decoder.decode(new EncodedVideoChunk({
            type: ft === 1 ? 'key' : 'delta',
            timestamp: performance.now() * 1000,
            data: full.buffer.slice(full.byteOffset, full.byteOffset + full.byteLength)
        }));
    } catch(e) {}
}

// ─── 触控 ──────────────────────────────────────────
function setupTouch() {
    const area = document.getElementById('vid');
    let st = 0, sp = null, lt = null;

    function pos(e) {
        const r = canvas.getBoundingClientRect();
        const t = e.touches ? e.touches[0] : e;
        return { x: Math.max(0, Math.min(1, (t.clientX-r.left)/r.width)), y: Math.max(0, Math.min(1, (t.clientY-r.top)/r.height)) };
    }

    function down(e) {
        e.preventDefault(); st = Date.now(); sp = pos(e);
        lt = setTimeout(() => { send({type:'touch',data:{action:'longpress',...sp}}); sp=null; }, 600);
    }
    function up(e) {
        e.preventDefault(); clearTimeout(lt);
        if (!sp) return;
        const p2 = e.changedTouches
            ? (()=>{const r=canvas.getBoundingClientRect(),t=e.changedTouches[0];return{x:Math.max(0,Math.min(1,(t.clientX-r.left)/r.width)),y:Math.max(0,Math.min(1,(t.clientY-r.top)/r.height))};})()
            : pos(e);
        const dt = Date.now()-st;
        const dist = Math.sqrt((p2.x-sp.x)**2+(p2.y-sp.y)**2);
        if (dist<0.02 && dt<500) send({type:'touch',data:{action:'tap',...p2}});
        else if (dist>=0.02) send({type:'touch',data:{action:'swipe',fromX:sp.x,fromY:sp.y,toX:p2.x,toY:p2.y,duration:Math.max(100,dt)}});
        sp=null;
    }

    area.addEventListener('mousedown', down);
    area.addEventListener('mouseup', up);
    area.addEventListener('touchstart', down, {passive:false});
    area.addEventListener('touchend', up, {passive:false});
    area.addEventListener('touchmove', e=>e.preventDefault(), {passive:false});
    area.addEventListener('wheel', e=>{e.preventDefault();send({type:'scroll',data:{...pos(e),deltaY:e.deltaY>0?300:-300}});}, {passive:false});
}

// ─── 键盘快捷键 ──────────────────────────────────────
function setupKeys() {
    document.addEventListener('keydown', e => {
        if (e.target.tagName === 'INPUT') return;
        switch(e.key) {
            case 'b': ctl('back'); break;
            case 'h': ctl('home'); break;
            case 'r': ctl('recents'); break;
            case 't': toggleTxt(); break;
            case 'Escape': toggleTxt(); break;
        }
    });
}

// ─── 命令发送 ──────────────────────────────────────
function send(msg) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(msg)); }
function ctl(a) { send({type:'control',data:{action:a}}); }
function toggleTxt() { document.getElementById('txtbar').classList.toggle('on'); if (document.getElementById('txtbar').classList.contains('on')) document.getElementById('txtinp').focus(); }
function sendTxt() {
    const inp = document.getElementById('txtinp');
    const text = inp.value.trim();
    if (!text) return;
    send({type:'text',data:{text}});
    inp.value = '';
}
</script>
</body>
</html>
