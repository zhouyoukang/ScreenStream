# Nginx reverse proxy for ScreenStream Relay Server
# Usage: Paste the location blocks below into the aiotvr.xyz server{} block
#   Then: nginx -t && nginx -s reload
#
# The 'map' block goes OUTSIDE server{}, at http{} level.
# Check if it already exists before adding (宝塔面板可能已有).

# ─── Paste at http{} level (if not already present) ───
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }

# ─── Paste inside server{} block for aiotvr.xyz ───

# Web client (static files served by Express)
location /screen/ {
    proxy_pass http://127.0.0.1:9100/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
}

# Socket.IO signaling (WebSocket upgrade required)
location /app/socket {
    proxy_pass http://127.0.0.1:9100/app/socket;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
    proxy_buffering off;
}

# Nonce + ping + status API endpoints
location /app/ {
    proxy_pass http://127.0.0.1:9100/app/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
