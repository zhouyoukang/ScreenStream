<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>投屏桥接 — 手机端运行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e0e0e8;font-family:-apple-system,system-ui,"Microsoft YaHei",sans-serif;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;padding:16px 12px;-webkit-user-select:none;user-select:none}
h1{font-size:22px;margin-bottom:2px}
h1 span{color:#6c8cff}
.sub{color:#8888a0;font-size:13px;margin-bottom:16px;text-align:center}

.card{background:#14141f;border:1px solid #2a2a3a;border-radius:12px;padding:16px;width:100%;max-width:420px;margin-bottom:12px}
.card label{display:block;font-size:12px;color:#8888a0;margin-bottom:4px}
.card input,.card select{width:100%;padding:10px;background:#0a0a0f;border:1px solid #2a2a3a;border-radius:8px;color:#fff;font-size:14px;outline:none;margin-bottom:8px}
.card input:focus{border-color:#6c8cff}

.btn{display:block;width:100%;max-width:420px;padding:14px;font-size:17px;font-weight:700;border:none;border-radius:12px;cursor:pointer;color:#fff;margin-bottom:10px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-go{background:linear-gradient(135deg,#6c8cff,#a855f7)}
.btn-stop{background:#ef4444}

.room-box{background:#14141f;border:2px solid #22c55e;border-radius:16px;padding:20px;text-align:center;width:100%;max-width:420px;margin:12px 0;display:none}
.room-box .code{font-size:44px;font-weight:700;letter-spacing:10px;color:#22c55e;font-family:'Courier New',monospace}
.room-box .hint{color:#8888a0;font-size:13px;margin-top:6px}
#qr-box{margin:12px auto 0;display:inline-block;background:#fff;padding:8px;border-radius:8px}
#qr-box canvas{display:block}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;width:100%;max-width:420px;margin-bottom:10px}
.stat-item{background:#14141f;border:1px solid #2a2a3a;border-radius:8px;padding:10px;text-align:center}
.stat-item .val{font-size:20px;font-weight:700;color:#e0e0e8}
.stat-item .lbl{font-size:11px;color:#8888a0;margin-top:2px}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.dot-g{background:#4ade80;box-shadow:0 0 6px #4ade80}
.dot-y{background:#fbbf24}
.dot-r{background:#f87171}
.dot-x{background:#555}

#log{background:#0a0a0f;border:1px solid #2a2a3a;border-radius:8px;width:100%;max-width:420px;height:140px;overflow-y:auto;padding:6px;font-family:'Cascadia Code',monospace;font-size:10px;line-height:1.4;color:#8888a0}
.log-ok{color:#4ade80}.log-w{color:#fbbf24}.log-e{color:#f87171}.log-i{color:#8888a0}

.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(108,140,255,0.1);border:1px solid #6c8cff30;border-radius:16px;padding:4px 10px;font-size:11px;color:#6c8cff;margin-top:8px}
</style>
</head>
<body>

<h1>📡 <span>P2P</span> 投屏桥接</h1>
<p class="sub">在手机上运行，远程家人扫码即可观看<br>零服务器 · 零成本 · 端到端加密</p>

<div class="card" id="cfg">
<label>ScreenStream地址（通常不用改）</label>
<input id="inp-addr" value="localhost:8080" placeholder="localhost:8080">
<label>房间码（6位，告诉对方）</label>
<input id="inp-room" inputmode="numeric" maxlength="6" placeholder="留空自动生成">
</div>

<button class="btn btn-go" id="btn-go" onclick="start()">开始桥接</button>
<button class="btn btn-stop" id="btn-stop" onclick="stop()" style="display:none">停止桥接</button>

<div class="room-box" id="room-box">
<div>房间码</div>
<div class="code" id="room-code">------</div>
<div class="hint">远程观看地址（长按复制/扫码）：</div>
<div style="word-break:break-all;font-size:12px;color:#6c8cff;margin-top:4px" id="viewer-url"></div>
<div id="qr-box"></div>
</div>

<div class="stats" id="stats" style="display:none">
<div class="stat-item"><div class="val" id="s-viewers">0</div><div class="lbl">观看人数</div></div>
<div class="stat-item"><div class="val" id="s-frames">0</div><div class="lbl">帧数</div></div>
<div class="stat-item"><div class="val" id="s-bytes">0KB</div><div class="lbl">流量</div></div>
</div>

<div style="width:100%;max-width:420px;margin-bottom:6px;font-size:13px">
<span class="dot dot-x" id="d-ss"></span><span id="t-ss">ScreenStream: 待连接</span><br>
<span class="dot dot-x" id="d-peer"></span><span id="t-peer">PeerJS信令: 待连接</span>
</div>

<div id="log"></div>
<span class="badge">🔒 P2P直连 · PeerJS信令 · WebRTC加密 · 数据不经服务器</span>

<!-- PeerJS from China-friendly CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<!-- Fallback: unpkg -->
<script>if(typeof Peer==='undefined'){document.write('<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"><\/script>')}</script>

<script>
// ═══════════════════════════════════════════════════════════
//  Phone Cast Bridge — 手机浏览器运行
//  ScreenStream H264 WS → PeerJS DataChannel → 远程Viewer
//  零服务器：信令=PeerJS Cloud, 媒体=WebRTC P2P
// ═══════════════════════════════════════════════════════════

// 国内可用ICE服务器（多层fallback）
const ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun.miwifi.com:3478' },
    { urls: 'stun:stun.chat.bilibili.com:3478' },
    // metered.ca免费TURN（全球CDN，国内可用）
    { urls: 'turn:a.relay.metered.ca:80', username: 'e8dd65b92f6dfe65e84a0e73', credential: '4F5qRhMPjmG/jKXF' },
    { urls: 'turn:a.relay.metered.ca:443', username: 'e8dd65b92f6dfe65e84a0e73', credential: '4F5qRhMPjmG/jKXF' },
    { urls: 'turn:a.relay.metered.ca:443?transport=tcp', username: 'e8dd65b92f6dfe65e84a0e73', credential: '4F5qRhMPjmG/jKXF' },
];

// 观看页URL（可替换为任何托管地址）
const VIEWER_BASE = location.origin + location.pathname.replace('phone-cast.html', 'cast-viewer.html');

const INPUT_API = 'http://localhost:8084';
let peer = null, ssWs = null, ctrlWs = null, viewers = new Map();
let lastConfig = null, lastKeyFrame = null;
let frameCount = 0, totalBytes = 0, running = false;
let wakeLock = null, pnaGranted = false;

function genRoom() { return String(Math.floor(100000 + Math.random() * 900000)); }

// 控制WebSocket在桥接启动时连接（WebSocket不触发Chrome PNA限制）

// ─── 启动 ──────────────────────────────────────────
async function start() {
    const addr = document.getElementById('inp-addr').value.trim() || 'localhost:8080';
    const room = document.getElementById('inp-room').value.trim() || genRoom();
    const peerId = 'ss-bridge-' + room;

    document.getElementById('btn-go').disabled = true;
    running = true;
    frameCount = 0; totalBytes = 0;
    log('启动P2P桥接...', 'i');

    // Wake Lock防息屏
    try {
        wakeLock = await navigator.wakeLock.request('screen');
        log('Wake Lock已激活（防息屏）', 'ok');
    } catch (e) { log('Wake Lock不可用: ' + e.message, 'w'); }

    // 1. PeerJS信令
    log('[1/3] 连接PeerJS信令...', 'i');
    setDot('d-peer', 'y'); setText('t-peer', 'PeerJS: 连接中...');

    try {
        peer = new Peer(peerId, { config: { iceServers: ICE_SERVERS }, debug: 0 });
        await new Promise((ok, fail) => {
            peer.on('open', ok);
            peer.on('error', e => {
                if (e.type === 'unavailable-id') log('房间码已占用，换一个', 'e');
                else log('PeerJS: ' + e.type + ' ' + e.message, 'e');
                fail(e);
            });
            setTimeout(() => fail(new Error('PeerJS超时15s')), 15000);
        });
        log('[1/3] PeerJS就绪: ' + peerId, 'ok');
        setDot('d-peer', 'g'); setText('t-peer', 'PeerJS: 已连接');
    } catch (e) {
        log('PeerJS失败: ' + e.message, 'e');
        setDot('d-peer', 'r'); setText('t-peer', 'PeerJS: 失败');
        document.getElementById('btn-go').disabled = false;
        running = false;
        return;
    }

    // 2. 连接ScreenStream
    log('[2/3] 连接ScreenStream...', 'i');
    setDot('d-ss', 'y'); setText('t-ss', 'ScreenStream: 连接中...');

    try {
        await connectSS(addr);
        log('[2/3] ScreenStream已连接', 'ok');
        setDot('d-ss', 'g'); setText('t-ss', 'ScreenStream: 已连接');
    } catch (e) {
        log('ScreenStream连接失败（确认已开始投屏）', 'e');
        setDot('d-ss', 'r'); setText('t-ss', 'ScreenStream: 失败(重试中)');
    }

    // 2.5 连接控制WebSocket（绕过Chrome PNA限制）
    connectControl();

    // 3. 监听Viewer
    log('[3/3] 等待远程连接...', 'i');

    peer.on('connection', conn => {
        log('Viewer请求: ' + conn.peer, 'i');
        conn.on('open', () => {
            viewers.set(conn.peer, conn);
            log('Viewer已连接 (共' + viewers.size + '人)', 'ok');
            updateStats();
            if (lastConfig) try { conn.send(lastConfig); } catch(e){}
            if (lastKeyFrame) try { conn.send(lastKeyFrame); } catch(e){}
        });
        conn.on('data', data => {
            try {
                const msg = typeof data === 'string' ? JSON.parse(data) : JSON.parse(new TextDecoder().decode(data));
                forwardControl(msg);
            } catch(e) {}
        });
        conn.on('close', () => {
            viewers.delete(conn.peer);
            log('Viewer断开 (剩' + viewers.size + '人)', 'w');
            updateStats();
        });
    });

    // UI更新
    document.getElementById('cfg').style.opacity = '.5';
    document.getElementById('btn-go').style.display = 'none';
    document.getElementById('btn-stop').style.display = 'block';
    document.getElementById('room-box').style.display = 'block';
    document.getElementById('room-code').textContent = room;
    document.getElementById('stats').style.display = 'grid';
    document.getElementById('inp-room').value = room;

    // 生成观看URL和QR码
    const viewerUrl = VIEWER_BASE + '?room=' + room;
    document.getElementById('viewer-url').textContent = viewerUrl;
    const qrCanvas = document.createElement('canvas');
    QRCode.toCanvas(qrCanvas, viewerUrl, { cellSize: 4, margin: 8, errorCorrectLevel: 0 });
    const qrBox = document.getElementById('qr-box');
    qrBox.innerHTML = '';
    qrBox.appendChild(qrCanvas);
}

// ─── ScreenStream连接 ──────────────────────────────
function connectSS(addr) {
    return new Promise((ok, fail) => {
        const url = 'ws://' + addr + '/stream/h264';
        ssWs = new WebSocket(url);
        ssWs.binaryType = 'arraybuffer';
        const timer = setTimeout(() => { ssWs.close(); fail(new Error('timeout')); }, 5000);

        ssWs.onopen = () => { clearTimeout(timer); ok(); };
        ssWs.onerror = () => { clearTimeout(timer); fail(new Error('connect failed')); };

        ssWs.onmessage = ev => {
            if (!(ev.data instanceof ArrayBuffer) || ev.data.byteLength < 10) return;
            const data = new Uint8Array(ev.data);
            const ft = data[0];
            frameCount++;
            totalBytes += data.byteLength;

            if (ft === 0) lastConfig = data;
            if (ft === 1) lastKeyFrame = data;

            // 广播给所有Viewer
            for (const [id, conn] of viewers) {
                if (conn.open) {
                    if (ft === 2 && conn.bufferSize > 524288) continue;
                    try { conn.send(data); } catch(e) { viewers.delete(id); }
                }
            }

            if (frameCount % 30 === 0) updateStats();
        };

        ssWs.onclose = () => {
            setDot('d-ss', 'r'); setText('t-ss', 'ScreenStream: 断开');
            if (running) {
                log('ScreenStream断开，5s后重连...', 'w');
                setTimeout(() => { if (running) connectSS(addr).catch(() => {}); }, 5000);
            }
        };
    });
}

// ─── 停止 ──────────────────────────────────────────
function stop() {
    running = false;
    if (ssWs) { try { ssWs.close(); } catch(e){} ssWs = null; }
    for (const [, c] of viewers) { try { c.close(); } catch(e){} }
    viewers.clear();
    if (peer) { try { peer.destroy(); } catch(e){} peer = null; }
    if (wakeLock) { try { wakeLock.release(); } catch(e){} wakeLock = null; }

    document.getElementById('cfg').style.opacity = '1';
    document.getElementById('btn-go').style.display = 'block';
    document.getElementById('btn-go').disabled = false;
    document.getElementById('btn-stop').style.display = 'none';
    document.getElementById('room-box').style.display = 'none';
    document.getElementById('stats').style.display = 'none';
    setDot('d-ss', 'x'); setText('t-ss', 'ScreenStream: 已停止');
    setDot('d-peer', 'x'); setText('t-peer', 'PeerJS: 已停止');
    log('桥接已停止', 'w');
}

// ─── 控制WebSocket连接 → InputService /ws/control ─
function connectControl() {
    const url = 'ws://localhost:8084/ws/control';
    log('连接控制通道...', 'i');
    ctrlWs = new WebSocket(url);
    ctrlWs.onopen = () => log('控制通道已连接 (WS)', 'ok');
    ctrlWs.onmessage = ev => {
        try {
            const r = JSON.parse(ev.data);
            if (r.type === 'connected') log('InputService就绪', 'ok');
            else if (r.ok) log('→ ' + r.type, 'ok');
            else log('→ ' + r.type + ' 失败', 'e');
        } catch(e) {}
    };
    ctrlWs.onclose = () => {
        if (running) { log('控制通道断开，3s后重连...', 'w'); setTimeout(connectControl, 3000); }
    };
    ctrlWs.onerror = () => log('控制通道连接失败', 'e');
}

function forwardControl(msg) {
    if (!ctrlWs || ctrlWs.readyState !== 1) { log('控制通道未就绪', 'w'); return; }
    const d = msg.data || {};
    let cmd = null;

    if (msg.type === 'control') {
        cmd = { type: d.action, data: {} };
    } else if (msg.type === 'touch') {
        if (d.action === 'tap') cmd = { type: 'tap', data: { nx: d.x, ny: d.y } };
        else if (d.action === 'swipe') cmd = { type: 'swipe', data: { nx1: d.fromX, ny1: d.fromY, nx2: d.toX, ny2: d.toY, duration: d.duration || 300 } };
        else if (d.action === 'longpress') cmd = { type: 'longpress', data: { nx: d.x, ny: d.y, duration: d.duration || 800 } };
    } else if (msg.type === 'scroll') {
        cmd = { type: 'scroll', data: { direction: (d.deltaY||0) > 0 ? 'down' : 'up', distance: 500, cx: d.x||0.5, cy: d.y||0.5 } };
    } else if (msg.type === 'text') {
        cmd = { type: 'text', data: { text: d.text || '' } };
    }

    if (cmd) ctrlWs.send(JSON.stringify(cmd));
}

// ─── 工具 ──────────────────────────────────────────
function updateStats() {
    document.getElementById('s-viewers').textContent = viewers.size;
    document.getElementById('s-frames').textContent = frameCount;
    const mb = totalBytes / 1048576;
    document.getElementById('s-bytes').textContent = mb > 1 ? mb.toFixed(1) + 'MB' : (totalBytes / 1024).toFixed(0) + 'KB';
}

function setDot(id, c) { document.getElementById(id).className = 'dot dot-' + c; }
function setText(id, t) { document.getElementById(id).textContent = t; }
function log(msg, t) {
    const el = document.getElementById('log');
    const ts = new Date().toLocaleTimeString('en', { hour12: false });
    el.innerHTML += '<div class="log-' + (t || 'i') + '">[' + ts + '] ' + msg + '</div>';
    el.scrollTop = el.scrollHeight;
    while (el.children.length > 150) el.removeChild(el.firstChild);
}
</script>
</body>
